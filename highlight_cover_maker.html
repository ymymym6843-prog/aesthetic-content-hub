<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AESTHETIC - Highlight Covers</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8703A;
    --cream: #FFF8F0;
    --warm-beige: #F5EDE0;
    --dark: #3D2E24;
    --warm-bg: #FAF6F1;
    --text-muted: #9B8A7A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    background: var(--warm-bg);
    color: var(--dark);
    min-height: 100vh;
    padding: 0 0 100px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,112,58,0.06), transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(232,112,58,0.04), transparent 50%);
    pointer-events: none;
  }

  .page-header {
    background: #FFF8F0;
    padding: 40px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 56px;
    border-bottom: 1px solid rgba(232,112,58,0.12);
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(232,112,58,0.06) 0%, transparent 70%),
      radial-gradient(ellipse at 70% 50%, rgba(232,112,58,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E8703A, transparent);
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: #3D2E24;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .page-header p {
    color: #9B8A7A;
    font-size: 13px;
    letter-spacing: 2px;
    line-height: 1.7;
    position: relative; z-index: 1;
  }
  .page-header .badge {
    display: inline-block;
    margin-top: 12px;
    padding: 5px 16px;
    background: #E8703A;
    border: 1px solid #E8703A;
    color: #fff;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    position: relative; z-index: 1;
  }

  .covers-grid {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }

  .cover-card {
    background: #fff;
    border-radius: 24px;
    padding: 28px 20px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(26,20,16,0.06);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(0,0,0,0.03);
  }
  .cover-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 16px 48px rgba(26,20,16,0.1);
  }

  .cover-card h3 {
    font-size: 15px;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }

  .cover-preview {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 20px;
  }
  .ig-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    background: linear-gradient(#fff, #fff) padding-box,
                linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888) border-box;
  }
  .cover-circle {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #fff;
    z-index: 2;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .cover-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cover-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  .btn-download {
    width: 100%;
    padding: 12px;
    background: var(--warm-bg);
    border: 1px solid rgba(232,112,58,0.15);
    color: var(--dark);
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-download:hover {
    background: var(--orange);
    color: #fff;
    border-color: var(--orange);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(232,112,58,0.25);
  }
  .btn-download svg {
    width: 16px; height: 16px;
  }

  .download-all-section {
    max-width: 960px;
    margin: 48px auto 0;
    text-align: center;
    padding-top: 40px;
    border-top: 1px solid rgba(0,0,0,0.05);
  }
  .btn-download-all {
    background: var(--dark);
    color: #fff;
    border: none;
    padding: 18px 48px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 10px 30px rgba(26,20,16,0.2);
  }
  .btn-download-all:hover {
    background: var(--orange);
    transform: scale(1.05);
  }

  .usage-guide {
    max-width: 960px;
    margin: 56px auto 0;
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(26,20,16,0.04);
  }
  .usage-guide h3 {
    font-family: 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 16px;
  }
  .usage-guide ol {
    padding-left: 20px;
    color: #5D544D;
    font-size: 14px;
    line-height: 2.2;
  }
  .usage-guide li strong {
    color: var(--orange);
  }

  @media (max-width: 768px) {
    .covers-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .page-header h1 { font-size: 24px; letter-spacing: 4px; }
  }
  @media (max-width: 480px) {
    .covers-grid { grid-template-columns: 1fr; max-width: 280px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Highlight Covers</h1>
  <p>IM AESTHETIC 인스타그램 하이라이트 커버 이미지<br>1:1 정사각형 · 오렌지 브랜드 컬러 · 라인아트 아이콘</p>
  <div class="badge">1080 x 1080px</div>
</div>

<div style="padding: 0 24px;">

<div class="covers-grid" id="coversGrid"></div>

<div class="download-all-section">
  <button class="btn-download-all" onclick="downloadAll()">전체 다운로드</button>
</div>

<div class="usage-guide">
  <h3>How to Use</h3>
  <ol>
    <li>원하는 커버의 <strong>다운로드</strong> 버튼을 클릭합니다</li>
    <li>인스타그램 앱 → 프로필 → 해당 하이라이트 → <strong>하이라이트 편집</strong></li>
    <li><strong>커버 변경</strong> → 다운로드한 이미지를 선택합니다</li>
    <li>원형 크롭 영역을 조절하여 아이콘이 중앙에 오도록 맞춥니다</li>
    <li>모든 하이라이트에 동일한 스타일을 적용하면 <strong>프리미엄 통일감</strong>이 완성됩니다</li>
  </ol>
</div>

</div>

<script>
const COVERS = [
  { name: '웨딩케어', file: '01_wedding_care.jpeg', desc: 'Wedding Care' },
  { name: '비포&애프터', file: '02_before_after.jpeg', desc: 'Before & After' },
  { name: '후기', file: '03_review.jpeg', desc: 'Reviews' },
  { name: '오시는길', file: '04_location.jpeg', desc: 'Location' },
  { name: '예약', file: '05_reservation.jpeg', desc: 'Reservation' },
  { name: '이벤트', file: '06_event.jpeg', desc: 'Event' },
];

const grid = document.getElementById('coversGrid');

COVERS.forEach((cover, i) => {
  const card = document.createElement('div');
  card.className = 'cover-card';
  card.innerHTML = `
    <h3>${cover.name}</h3>
    <div class="cover-preview">
      <div class="ig-ring"></div>
      <div class="cover-circle">
        <img src="/highlight_covers/${cover.file}" alt="${cover.name}" loading="lazy">
      </div>
    </div>
    <div class="cover-info">${cover.desc}</div>
    <button class="btn-download" onclick="downloadCover('${cover.file}', '${cover.name}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      다운로드
    </button>
  `;
  grid.appendChild(card);
});

function downloadCover(file, name) {
  const link = document.createElement('a');
  link.href = `/highlight_covers/${file}`;
  link.download = `IM_Highlight_${name}.jpeg`;
  link.click();
}

function downloadAll() {
  COVERS.forEach((cover, i) => {
    setTimeout(() => downloadCover(cover.file, cover.name), i * 300);
  });
}
</script>
<script src="/nav-shared.js"></script>
</body>
</html>
