<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AESTHETIC - 리뷰 오버레이 메이커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --orange: #E8703A;
    --orange-light: #F5A070;
    --cream: #FFF8F0;
    --warm-beige: #F5EDE0;
    --dark: #3D2E24;
    --dark-mid: #3D2E24;
    --text-muted: #9B8A7A;
    --warm-bg: #FAF6F1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    background: var(--warm-bg);
    color: var(--dark);
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,112,58,0.06), transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(232,112,58,0.04), transparent 50%);
    pointer-events: none;
  }

  /* ===== PAGE HEADER ===== */
  .page-header {
    background: #FFF8F0;
    padding: 40px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(232,112,58,0.12);
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(232,112,58,0.06) 0%, transparent 70%),
      radial-gradient(ellipse at 70% 50%, rgba(232,112,58,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E8703A, transparent);
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 400;
    color: #3D2E24;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .page-header p {
    color: #9B8A7A;
    font-size: 13px;
    letter-spacing: 2px;
    position: relative; z-index: 1;
  }

  .app { display: flex; min-height: calc(100vh - 140px); }

  /* ===== EDITOR ===== */
  .editor {
    width: 380px; flex-shrink: 0;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(232,112,58,0.08);
    padding: 36px 28px;
    overflow-y: auto; max-height: calc(100vh - 140px);
    position: sticky; top: 0;
  }
  .editor h1 {
    font-family: 'Pretendard', system-ui, sans-serif;
    font-size: 24px; font-weight: 700;
    margin-bottom: 4px;
  }
  .editor .sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; letter-spacing: 0.5px; }

  .section-label {
    font-size: 10px; font-weight: 800; color: var(--orange);
    letter-spacing: 3px; text-transform: uppercase;
    margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(232,112,58,0.1);
  }

  /* Review type tabs */
  .type-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-tab {
    flex: 1; padding: 12px 8px; border: 1.5px solid rgba(232,112,58,0.15);
    border-radius: 14px; background: #fff; font-family: inherit;
    font-size: 12px; font-weight: 700; color: var(--dark-mid);
    cursor: pointer; text-align: center; transition: all 0.3s;
  }
  .type-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; box-shadow: 0 4px 12px rgba(232,112,58,0.25); }
  .type-tab:hover:not(.active) { border-color: var(--orange-light); }

  /* Upload box */
  .upload-box {
    border: 2px dashed rgba(232,112,58,0.2); border-radius: 16px;
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: all 0.3s; position: relative; overflow: hidden;
    min-height: 140px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: rgba(255,255,255,0.5);
  }
  .upload-box:hover { border-color: var(--orange); background: rgba(232,112,58,0.03); }
  .upload-box.has-image { border-style: solid; border-color: var(--orange-light); padding: 6px; }
  .upload-box .icon { color: var(--orange); opacity: 0.5; }
  .upload-box .label { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }
  .upload-box .hint { font-size: 10px; color: #bbb; }
  .upload-box img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; max-height: 200px; }
  .upload-box input[type="file"] { position:absolute; width:1px; height:1px; opacity:0; overflow:hidden; pointer-events:none; }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #5D544D; margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 14px; border: 1px solid rgba(44,24,16,0.1);
    border-radius: 12px; font-size: 13px; font-family: inherit; background: #fff;
    transition: all 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,112,58,0.1);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  /* Background style selector */
  .bg-styles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .bg-style {
    height: 56px; border-radius: 12px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .bg-style.active { border-color: var(--dark); transform: scale(1.05); }
  .bg-style:hover { transform: scale(1.03); }

  /* Source badge selector */
  .source-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .source-btn {
    flex: 1; padding: 10px; border: 1.5px solid rgba(44,24,16,0.1);
    border-radius: 10px; background: #fff; font-family: inherit;
    font-size: 11px; font-weight: 700; color: var(--dark-mid);
    cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .source-btn.active { background: var(--dark-mid); color: #fff; border-color: var(--dark-mid); }

  /* Export */
  .btn-export {
    width: 100%; padding: 16px; margin-top: 16px;
    background: linear-gradient(135deg, var(--orange), #D4612E);
    color: #fff; border: none; border-radius: 16px;
    font-size: 15px; font-weight: 800; font-family: inherit;
    cursor: pointer; transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .btn-export:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,112,58,0.35);
  }

  /* ===== PREVIEW ===== */
  .preview-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px; min-height: 100vh;
  }
  .preview-wrapper {
    box-shadow: 0 12px 48px rgba(26,20,16,0.12);
    border-radius: 4px; overflow: hidden;
  }

  /* ===== SLIDE (1080x1350 → 540x675 preview) ===== */
  .slide {
    width: 540px; height: 675px;
    position: relative; overflow: hidden;
    font-family: 'Pretendard', sans-serif;
  }

  /* Textured backgrounds */
  .slide .bg-layer {
    position: absolute; inset: 0; z-index: 0;
  }
  /* BG 1: Cream Classic — clean, bright base */
  .slide .bg-layer.orange-linen {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(232,112,58,0.04) 0%, transparent 60%),
      #FFF8F0;
  }
  .slide .bg-layer.orange-linen::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
  }
  /* BG 2: Warm Beige — natural, linen texture */
  .slide .bg-layer.orange-silk {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(232,112,58,0.05) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C8A882' fill-opacity='0.05'%3E%3Cpath fill-rule='evenodd' d='M0 38.59l2.83-2.83 1.41 1.41L1.41 40H0v-1.41zM0 1.4l2.83 2.83 1.41-1.41L1.41 0H0v1.41zM38.59 40l-2.83-2.83 1.41-1.41L40 38.59V40h-1.41zM40 1.41l-2.83 2.83-1.41-1.41L38.59 0H40v1.41z'/%3E%3C/g%3E%3C/svg%3E"),
      #F5EDE0;
  }
  .slide .bg-layer.orange-silk::after { display: none; }
  /* BG 3: Brand Orange — rich depth with subtle warmth */
  .slide .bg-layer.cream-paper {
    background:
      radial-gradient(ellipse 70% 50% at 20% 30%, rgba(255,200,150,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 80% 70%, rgba(160,50,15,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(255,255,255,0.06) 0%, transparent 50%),
      linear-gradient(165deg, #E8703A 0%, #D4612E 40%, #E8703A 70%, #EB7E4A 100%);
  }
  .slide .bg-layer.cream-paper::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }
  /* BG 4: Cream→Beige gradient — soft transition with warmth */
  .slide .bg-layer.dark-velvet {
    background:
      radial-gradient(ellipse 80% 60% at 25% 20%, rgba(232,112,58,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 75% 80%, rgba(212,160,74,0.04) 0%, transparent 50%),
      linear-gradient(160deg, #FFF8F0 0%, #F5EDE0 50%, #FFF8F0 100%);
  }
  /* BG 5: Orange Soft — mesh gradient with light play */
  .slide .bg-layer.beige-fabric {
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(255,220,180,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 75%, rgba(180,60,20,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(245,160,112,0.3) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 75% 15%, rgba(255,255,255,0.1) 0%, transparent 50%),
      linear-gradient(155deg, #E8703A 0%, #EB7E4A 25%, #F5A070 55%, #E8703A 100%);
  }
  .slide .bg-layer.beige-fabric::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }
  /* BG 6: Gold Premium — warm beige with gold shimmer */
  .slide .bg-layer.orange-gradient {
    background:
      radial-gradient(ellipse 80% 40% at 50% 15%, rgba(212,160,74,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 85%, rgba(212,160,74,0.08) 0%, transparent 55%),
      linear-gradient(180deg, #F5EDE0 0%, #FFF8F0 30%, #FFF8F0 70%, #F5EDE0 100%);
  }
  .slide .bg-layer.orange-gradient::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, transparent 10%, #D4A04A 30%, #D4A04A 70%, transparent 90%);
  }
  .slide .bg-layer.orange-gradient::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, transparent 10%, #D4A04A 30%, #D4A04A 70%, transparent 90%);
  }

  /* Top label */
  .slide .top-label {
    position: absolute; top: 28px; left: 0; right: 0; z-index: 10;
    text-align: center;
  }
  .slide .top-label .source-badge {
    display: inline-block; padding: 5px 16px;
    border-radius: 50px; font-size: 9px; font-weight: 800;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .slide .top-label .source-badge.light {
    background: rgba(255,255,255,0.2); color: #fff;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
  }
  .slide .top-label .source-badge.dark {
    background: rgba(61,46,36,0.1); color: var(--dark);
    border: 1px solid rgba(61,46,36,0.1);
  }
  .slide .review-title {
    position: absolute; top: 56px; left: 0; right: 0; z-index: 10;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700; font-style: normal;
    letter-spacing: 6px; text-transform: uppercase;
  }

  /* Screenshot frame */
  .slide .screenshot-frame {
    position: absolute; z-index: 5;
    top: 100px; left: 40px; right: 40px; bottom: 120px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.1);
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-1deg);
  }
  .slide .screenshot-frame img {
    width: 100%; height: 100%; object-fit: contain;
  }
  .slide .screenshot-frame .placeholder {
    color: #ccc; font-size: 12px; text-align: center;
  }

  /* Text review frame */
  .slide .text-review-frame {
    position: absolute; z-index: 5;
    top: 100px; left: 36px; right: 36px; bottom: 120px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .slide .text-review-frame .quote-mark {
    font-family: 'Pretendard', system-ui, sans-serif;
    font-size: 60px; font-weight: 700; line-height: 1;
    opacity: 0.15;
  }
  .slide .text-review-frame .review-text {
    font-size: 16px; line-height: 2; text-align: center;
    font-weight: 500; letter-spacing: 0.3px;
    max-width: 400px;
  }
  .slide .text-review-frame .reviewer {
    margin-top: 16px; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; opacity: 0.6;
  }

  /* Bottom bar */
  .slide .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 28px 24px; text-align: center;
  }
  .slide .bottom-bar .client-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
    opacity: 0.7; margin-bottom: 4px;
  }
  .slide .bottom-bar .brand {
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 600; font-style: normal;
    letter-spacing: 6px; opacity: 0.5; text-transform: uppercase;
  }

  /* Color classes */
  .text-light { color: #fff; }
  .text-light .review-text { color: rgba(255,255,255,0.9); }
  .text-light .reviewer { color: rgba(255,255,255,0.5); }
  .text-light .quote-mark { color: #fff; }
  .text-dark { color: var(--dark); }
  .text-dark .review-text { color: var(--dark-mid); }
  .text-dark .reviewer { color: var(--text-muted); }
  .text-dark .quote-mark { color: var(--dark); }

  /* AutoSave Toast */
  .autosave-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #3D2E24; color: #FFF8F0; padding: 12px 24px; border-radius: 30px;
    font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .autosave-toast.show { opacity: 1; }

  /* ---- Server Load Modal ---- */
  .modal-overlay {
    position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:10000;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-content {
    background:#FFF8F0;border-radius:16px;width:360px;max-height:70vh;
    overflow:hidden;box-shadow:0 20px 60px rgba(61,46,36,0.15);
  }
  .modal-header {
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid rgba(232,112,58,0.1);
  }
  .modal-header h3 { font-size:16px;font-weight:700;color:#3D2E24;margin:0; }
  .modal-body { max-height:50vh;overflow-y:auto; }
  .session-item:hover { background:rgba(232,112,58,0.04); }

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .editor { width: 100%; max-height: none; position: static; }
    .preview-area { padding: 24px; }
    .slide { width: 340px; height: 425px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Review Overlay Maker</h1>
  <p>IM AESTHETIC · 리뷰 피드 이미지 제작 도구</p>
</div>

<div class="app">
  <!-- Editor -->
  <div class="editor">
    <h1>Review Overlay</h1>
    <p class="sub">리뷰 피드 이미지 제작 도구</p>

    <div class="section-label">리뷰 유형</div>
    <div class="type-tabs">
      <button class="type-tab active" onclick="setType('screenshot')">스크린샷</button>
      <button class="type-tab" onclick="setType('text')">텍스트 인용</button>
    </div>

    <!-- Screenshot upload -->
    <div id="screenshotSection">
      <div class="section-label">리뷰 스크린샷</div>
      <label class="upload-box" id="reviewBox" for="reviewInput" style="cursor:pointer">
        <svg class="icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <span class="label">리뷰 스크린샷</span>
        <span class="hint">클릭 또는 드래그하여 업로드</span>
        <input type="file" id="reviewInput" accept="image/*" onchange="handleReviewImage(this)">
      </label>
    </div>

    <!-- Text review -->
    <div id="textSection" style="display:none">
      <div class="section-label">리뷰 내용</div>
      <div class="field">
        <textarea id="reviewContent" oninput="updatePreview();autoSave()" placeholder="고객 리뷰 내용을 입력하세요,,,">3번 받고 나서 피부가 진짜 달라졌어요,,, 원장님들이 매번 꼼꼼하게 봐주셔서 믿음이 갔습니다</textarea>
      </div>
    </div>

    <div class="section-label">리뷰 출처</div>
    <div class="source-row">
      <button class="source-btn active" onclick="setSource('naver')">네이버</button>
      <button class="source-btn" onclick="setSource('kakao')">카카오톡</button>
      <button class="source-btn" onclick="setSource('dm')">DM</button>
    </div>

    <div class="section-label">정보</div>
    <div class="field">
      <label>고객 표기 (익명)</label>
      <input type="text" id="clientLabel" value="30대 예비신부님" oninput="updatePreview();autoSave()">
    </div>

    <div class="section-label">배경 스타일</div>
    <div class="bg-styles">
      <div class="bg-style active" data-bg="orange-linen" onclick="setBg('orange-linen')" style="background:#FFF8F0;border:1px solid #EDE4D8;"></div>
      <div class="bg-style" data-bg="orange-silk" onclick="setBg('orange-silk')" style="background:#F5EDE0;"></div>
      <div class="bg-style" data-bg="cream-paper" onclick="setBg('cream-paper')" style="background:#E8703A;"></div>
      <div class="bg-style" data-bg="dark-velvet" onclick="setBg('dark-velvet')" style="background:linear-gradient(160deg,#FFF8F0,#F5EDE0);"></div>
      <div class="bg-style" data-bg="beige-fabric" onclick="setBg('beige-fabric')" style="background:linear-gradient(135deg,#E8703A,#F5A070);"></div>
      <div class="bg-style" data-bg="orange-gradient" onclick="setBg('orange-gradient')" style="background:linear-gradient(180deg,#F5EDE0,#FFF8F0,#F5EDE0);border-top:2px solid #D4A04A;border-bottom:2px solid #D4A04A;"></div>
    </div>

    <button class="btn-export" onclick="exportPNG()">PNG 내보내기 (1080x1350)</button>
    <button onclick="clearSaved()" style="padding:12px 24px;border-radius:12px;border:1px solid rgba(232,112,58,0.3);background:transparent;color:#9B8A7A;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;width:100%">새로 시작</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="serverSave()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #E8703A;background:rgba(232,112,58,0.05);color:#E8703A;font-size:13px;font-weight:600;cursor:pointer">서버에 저장</button>
      <button onclick="serverLoad()" style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(232,112,58,0.3);background:transparent;color:#9B8A7A;font-size:13px;font-weight:600;cursor:pointer">불러오기</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-area">
    <div class="preview-wrapper">
      <div class="slide" id="slide">
        <div class="bg-layer orange-linen" id="bgLayer"></div>

        <div class="top-label">
          <span class="source-badge dark" id="sourceBadge">NAVER REVIEW</span>
        </div>
        <div class="review-title text-dark" id="reviewTitle">REAL REVIEW</div>

        <!-- Screenshot mode -->
        <div class="screenshot-frame" id="screenshotFrame">
          <div class="placeholder">리뷰 스크린샷을<br>업로드하세요</div>
        </div>

        <!-- Text mode (hidden) -->
        <div class="text-review-frame text-dark" id="textFrame" style="display:none">
          <div class="quote-mark">"</div>
          <div class="review-text" id="previewReviewText">3번 받고 나서 피부가 진짜 달라졌어요,,, 원장님들이 매번 꼼꼼하게 봐주셔서 믿음이 갔습니다</div>
          <div class="reviewer" id="previewReviewer">— 30대 예비신부님</div>
        </div>

        <div class="bottom-bar text-dark" id="bottomBar">
          <div class="client-label" id="previewClient">30대 예비신부님</div>
          <div class="brand">IM AESTHETIC</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let state = {
  type: 'screenshot', // 'screenshot' | 'text'
  source: 'naver',
  bg: 'orange-linen',
  reviewImage: null,
};

const SOURCES = {
  naver: 'NAVER REVIEW',
  kakao: 'KAKAO REVIEW',
  dm: 'CUSTOMER DM',
};

// Dark text on light backgrounds, light text on orange backgrounds
const DARK_BGS = ['orange-linen', 'orange-silk', 'dark-velvet', 'orange-gradient'];

function isDarkText() { return DARK_BGS.includes(state.bg); }

function setType(type) {
  state.type = type;
  document.querySelectorAll('.type-tab').forEach((t, i) =>
    t.classList.toggle('active', ['screenshot','text'][i] === type));
  document.getElementById('screenshotSection').style.display = type === 'screenshot' ? 'block' : 'none';
  document.getElementById('textSection').style.display = type === 'text' ? 'block' : 'none';
  document.getElementById('screenshotFrame').style.display = type === 'screenshot' ? 'flex' : 'none';
  document.getElementById('textFrame').style.display = type === 'text' ? 'flex' : 'none';
  // Hide client label in bottom bar for screenshot mode (it's redundant)
  document.getElementById('previewClient').style.display = type === 'screenshot' ? 'block' : 'none';
  updateColors();
  autoSave();
}

function setSource(source) {
  state.source = source;
  document.querySelectorAll('.source-btn').forEach((b, i) =>
    b.classList.toggle('active', ['naver','kakao','dm'][i] === source));
  document.getElementById('sourceBadge').textContent = SOURCES[source];
  autoSave();
}

function setBg(bg) {
  state.bg = bg;
  document.querySelectorAll('.bg-style').forEach(b =>
    b.classList.toggle('active', b.dataset.bg === bg));
  const layer = document.getElementById('bgLayer');
  layer.className = 'bg-layer ' + bg;
  updateColors();
  autoSave();
}

function updateColors() {
  const dark = isDarkText();
  const badge = document.getElementById('sourceBadge');
  badge.className = 'source-badge ' + (dark ? 'dark' : 'light');
  const title = document.getElementById('reviewTitle');
  title.className = 'review-title ' + (dark ? 'text-dark' : 'text-light');
  const textFrame = document.getElementById('textFrame');
  textFrame.className = 'text-review-frame ' + (dark ? 'text-dark' : 'text-light');
  const bottom = document.getElementById('bottomBar');
  bottom.className = 'bottom-bar ' + (dark ? 'text-dark' : 'text-light');
}

function handleReviewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state.reviewImage = reader.result;
    const frame = document.getElementById('screenshotFrame');
    frame.innerHTML = `<img src="${reader.result}" alt="review">`;
    const box = document.getElementById('reviewBox');
    box.classList.add('has-image');
    box.innerHTML = `<img src="${reader.result}" alt="review" style="width:100%;height:100%;object-fit:cover;border-radius:8px"><input type="file" id="reviewInput" accept="image/*" onchange="handleReviewImage(this)">`;
    autoSave();
  };
  reader.readAsDataURL(file);
}

function updatePreview() {
  const client = document.getElementById('clientLabel').value;
  const content = document.getElementById('reviewContent')?.value || '';
  document.getElementById('previewClient').textContent = client;
  document.getElementById('previewReviewText').textContent = content;
  document.getElementById('previewReviewer').textContent = '— ' + client;
}

async function exportPNG() {
  const btn = document.querySelector('.btn-export');
  btn.disabled = true; btn.textContent = '생성 중...';
  try {
    const el = document.getElementById('slide');
    const canvas = await html2canvas(el, {
      scale: 2, useCORS: true, allowTaint: true, backgroundColor: null,
    });
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `IM_Review_${state.source}_${state.bg}.png`;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }, 'image/png');
  } catch (e) {
    alert('내보내기 실패: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'PNG 내보내기 (1080x1350)';
  }
}

// Drag & drop
const reviewBox = document.getElementById('reviewBox');
reviewBox.addEventListener('dragover', e => { e.preventDefault(); reviewBox.style.borderColor = '#E8703A'; });
reviewBox.addEventListener('dragleave', () => { reviewBox.style.borderColor = ''; });
reviewBox.addEventListener('drop', e => {
  e.preventDefault(); reviewBox.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = () => {
      state.reviewImage = reader.result;
      document.getElementById('screenshotFrame').innerHTML = `<img src="${reader.result}" alt="리뷰 스크린샷">`;
      reviewBox.classList.add('has-image');
      reviewBox.innerHTML = `<img src="${reader.result}" alt="리뷰 스크린샷" style="width:100%;height:100%;object-fit:cover;border-radius:8px"><input type="file" id="reviewInput" accept="image/*" onchange="handleReviewImage(this)">`;
    };
    reader.readAsDataURL(file);
  }
});

// ===== AutoSave / AutoLoad =====
const STORAGE_KEY = 'im_review_state';
const TOOL_NAME = 'review';
let _currentSessionId = null;
let _saveTimer;
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    const data = collectState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch(e) {
      try {
        const lite = {...data};
        delete lite.reviewImage;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lite));
      } catch(e2) { console.warn('AutoSave failed:', e2); }
    }
  }, 1000);
}
function collectState() {
  return {
    type: state.type,
    source: state.source,
    bg: state.bg,
    clientLabel: document.getElementById('clientLabel').value,
    reviewContent: document.getElementById('reviewContent')?.value || '',
    reviewImage: state.reviewImage
  };
}
function autoLoad() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const data = JSON.parse(saved);
    restoreState(data);
    return true;
  } catch(e) { console.warn('AutoLoad failed:', e); return false; }
}
function restoreState(data) {
  if (data.type) setType(data.type);
  if (data.source) setSource(data.source);
  if (data.bg) setBg(data.bg);
  if (data.clientLabel) document.getElementById('clientLabel').value = data.clientLabel;
  if (data.reviewContent) {
    const rc = document.getElementById('reviewContent');
    if (rc) rc.value = data.reviewContent;
  }
  if (data.reviewImage) {
    state.reviewImage = data.reviewImage;
    document.getElementById('screenshotFrame').innerHTML = `<img src="${data.reviewImage}" alt="리뷰 스크린샷">`;
    const box = document.getElementById('reviewBox');
    if (box) { box.classList.add('has-image'); box.innerHTML = `<img src="${data.reviewImage}" alt="리뷰 스크린샷" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`; }
  }
  updatePreview();
}
function clearSaved() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
function showToast(msg) {
  const t = document.getElementById('autoToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Server Session Management =====
async function serverSave() {
  const data = collectState();
  const serverData = {...data};
  delete serverData.reviewImage; delete serverData.bgImg;
  delete serverData.uploadedImage; delete serverData.imgs;

  const name = prompt('세션 이름을 입력하세요:', '') || '이름없음';

  try {
    if (_currentSessionId) {
      await fetch('/api/db/maker-sessions/' + _currentSessionId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ work_data: serverData, session_name: name })
      });
      showToast('서버에 저장되었습니다');
    } else {
      const res = await fetch('/api/db/maker-sessions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ tool: TOOL_NAME, session_name: name, work_data: serverData })
      });
      const result = await res.json();
      _currentSessionId = result.id;
      showToast('서버에 저장되었습니다');
    }
  } catch(e) {
    showToast('서버 저장 실패: ' + e.message);
  }
}

async function serverLoad() {
  try {
    const res = await fetch('/api/db/maker-sessions?tool=' + TOOL_NAME);
    const sessions = await res.json();
    if (!sessions.length) { showToast('저장된 작업이 없습니다'); return; }
    showLoadModal(sessions);
  } catch(e) {
    showToast('불러오기 실패: ' + e.message);
  }
}

async function loadSession(id) {
  try {
    const res = await fetch('/api/db/maker-sessions/' + id);
    const session = await res.json();
    _currentSessionId = session.id;
    restoreState(session.work_data);
    closeLoadModal();
    showToast('"' + (session.session_name || '이름없음') + '" 불러왔습니다');
  } catch(e) {
    showToast('불러오기 실패');
  }
}

async function deleteSession(id, el) {
  if (!confirm('이 세션을 삭제하시겠습니까?')) return;
  try {
    await fetch('/api/db/maker-sessions/' + id, { method: 'DELETE' });
    el.closest('.session-item').remove();
    if (_currentSessionId === id) _currentSessionId = null;
  } catch(e) { showToast('삭제 실패'); }
}

function showLoadModal(sessions) {
  let modal = document.getElementById('loadModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'loadModal';
    modal.innerHTML = '<div class="modal-overlay" onclick="closeLoadModal()"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><h3>저장된 작업</h3><button onclick="closeLoadModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9B8A7A">&times;</button></div><div class="modal-body" id="sessionList"></div></div></div>';
    document.body.appendChild(modal);
  }

  const list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<p style="color:#9B8A7A;text-align:center;padding:24px">저장된 작업이 없습니다</p>';
  } else {
    list.innerHTML = sessions.map(s => {
      const date = new Date(s.updated_at);
      const ago = timeAgo(date);
      return '<div class="session-item" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(232,112,58,0.08);cursor:pointer" onclick="loadSession(\'' + s.id + '\')">' +
        '<div style="flex:1">' +
        '<div style="font-weight:600;color:#3D2E24;font-size:14px">' + (s.session_name || '이름없음') + '</div>' +
        '<div style="font-size:11px;color:#9B8A7A;margin-top:2px">' + ago + '</div>' +
        '</div>' +
        '<button onclick="event.stopPropagation();deleteSession(\'' + s.id + '\',this)" style="background:none;border:none;color:#9B8A7A;cursor:pointer;font-size:16px;padding:4px 8px" title="삭제">&times;</button>' +
        '</div>';
    }).join('');
  }
  modal.style.display = 'block';
}

function closeLoadModal() {
  const m = document.getElementById('loadModal');
  if (m) m.style.display = 'none';
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return '방금 전';
  if (s < 3600) return Math.floor(s/60) + '분 전';
  if (s < 86400) return Math.floor(s/3600) + '시간 전';
  return Math.floor(s/86400) + '일 전';
}

// Initialize colors on load
updateColors();
if (autoLoad()) showToast('이전 작업을 불러왔습니다');
</script>
<div class="autosave-toast" id="autoToast"></div>
<script src="/nav-shared.js"></script>
</body>
</html>
