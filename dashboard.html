                <main className="lg:col-span-9 bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden min-h-[600px] flex flex-col">
                    <div className="p-8 md:p-10 border-b border-gray-50 bg-gray-800 text-white">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div>
                                <div className="flex items-center gap-2 mb-2" style={{color:'#FF8C42'}}>
                                    <Sparkles size={16} />
                                    <span className="text-xs font-black uppercase tracking-widest italic">{strategyData[activeWeek - 1].phase}</span>
                                </div>
                                <h2 className="text-3xl font-bold tracking-tight">{strategyData[activeWeek - 1].theme}</h2>
                            </div>
                            <div className="flex items-center gap-2 px-4 py-2 bg-white/10 rounded-xl backdrop-blur-md border border-white/5">
                                <Clock size={16} style={{color:'#FF8C42'}} />
                                <span className="text-sm font-bold tracking-tight">화·목·토 실전 업로드</span>
                            </div>
                        </div>
                    </div>

                    <div className="p-8 md:p-10 flex-grow">
                        <div className="mb-10 p-6 rounded-3xl border relative overflow-hidden group" style={{background:'#FFF8F0', borderColor:'rgba(255,140,66,0.1)'}}>
                            <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity"><Award size={80} /></div>
                            <div className="flex items-center gap-2 mb-2 font-black text-xs tracking-widest uppercase" style={{color:'#FF8C42'}}>
                                <CheckCircle2 size={16} /><span>Strategy Goal</span>
                            </div>
                            <p className="text-gray-700 text-lg font-medium leading-relaxed italic">
                                "{strategyData[activeWeek - 1].goal}"
                            </p>
                        </div>

                        <div className="flex items-center justify-between mb-6">
                            <h3 className="text-xl font-bold flex items-center gap-2">
                                <LayoutGrid size={22} style={{color:'#FF8C42'}} />
                                콘텐츠 상세 기획 (클릭하여 확인)
                            </h3>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                            {strategyData[activeWeek - 1].posts.map((post, idx) => (
                                <button key={idx} onClick={() => setSelectedPost(post)}
                                    className="flex flex-col text-left h-full bg-gray-50/50 rounded-3xl border border-gray-100 overflow-hidden hover:bg-white transition-all duration-300 group shadow-sm hover:shadow-xl relative">
                                    {post.image && (
                                        <div className="w-full h-36 bg-gray-100 overflow-hidden">
                                            <img src={post.image} alt={post.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                                        </div>
                                    )}
                                    <div className="p-6 flex flex-col flex-grow">
                                        <div className="flex items-center justify-between mb-4">
                                            <span className="text-2xl font-black text-gray-200 group-hover:text-orange-100 transition-colors">0{idx + 1}</span>
                                            <div className={`px-2.5 py-1 rounded-lg text-[10px] font-black tracking-widest uppercase border ${post.day === '토' && activeWeek >= 3 ? 'bg-purple-50 text-purple-600 border-purple-100' : 'bg-gray-100 text-gray-500 border-gray-200'}`}>
                                                {post.day}요일
                                            </div>
                                        </div>
                                        <div className="mb-3">
                                            <div className="flex items-center gap-1.5 mb-1.5">
                                                <div className={`w-1.5 h-1.5 rounded-full ${post.type === '릴스' ? 'bg-purple-500' : post.type === '캐러셀' ? 'bg-blue-500' : ''}`}
                                                    style={post.type !== '릴스' && post.type !== '캐러셀' ? {background:'#FF8C42'} : {}}></div>
                                                <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{post.type}</span>
                                            </div>
                                            <h4 className="text-lg font-bold transition-colors leading-snug group-hover:text-orange-500">{post.title}</h4>
                                        </div>
                                        <p className="text-sm text-gray-500 leading-relaxed flex-grow">{post.desc}</p>
                                        {post.slideCount > 0 && (
                                            <div className="mt-3 flex items-center gap-2 flex-wrap">
                                                <span className="px-2 py-0.5 rounded-full text-[10px] font-black text-white" style={{background:'#FF8C42'}}>{post.slideCount}장</span>
                                                <span className="px-2 py-0.5 rounded-full text-[10px] font-bold border" style={{color:'#FF8C42', borderColor:'rgba(255,140,66,0.3)', background:'rgba(255,140,66,0.05)'}}>{post.templateType}</span>
                                            </div>
                                        )}
                                        {post.slideCount > 0 && (
                                            <a href={`card_news_maker.html?post=${strategyData[activeWeek - 1].week}W_Thu`}
                                                onClick={(e) => e.stopPropagation()}
                                                className="mt-2 inline-flex items-center gap-1 text-[11px] font-bold px-3 py-1.5 rounded-lg transition-colors hover:bg-orange-50"
                                                style={{color:'#FF8C42'}}>
                                                카드뉴스 만들기 <span style={{fontSize:'14px'}}>&rarr;</span>
                                            </a>
                                        )}
                                        <div className="mt-5 pt-4 border-t border-gray-100 flex items-center justify-between text-gray-300 group-hover:text-orange-400 transition-all">
                                            <span className="text-[10px] font-bold opacity-0 group-hover:opacity-100">가이드 & 본문 확인하기</span>
                                            <ChevronRight size={18} />
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="px-10 py-6 bg-gray-50 border-t border-gray-100 flex flex-wrap gap-8 items-center justify-center">
                        {[{code:'Yu',role:'Skin Expert',name:'유수정 전문가'},{code:'Woo',role:'Body Expert',name:'우연우 전문가'},{code:'Kim',role:'Wellness Dir',name:'김은경 디렉터'}].map((e,i) => (
                            <div key={i} className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center shadow-sm font-bold text-[10px]" style={{color:'#FF8C42'}}>{e.code}</div>
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-gray-400 uppercase tracking-tighter italic">{e.role}</span>
                                    <span className="text-xs font-bold">{e.name}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </main>
            </div>

            {selectedPost && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(51,51,51,0.6)'}}
                    onClick={(e) => { if (e.target === e.currentTarget) setSelectedPost(null); }}>
                    <div className="bg-white w-full max-w-4xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col">
                        <div className="p-6 md:p-8 bg-gray-800 text-white flex items-center justify-between shrink-0">
                            <div className="flex items-center gap-4">
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${selectedPost.type === '릴스' ? 'bg-purple-500' : selectedPost.type === '캐러셀' ? 'bg-blue-500' : ''}`}
                                    style={selectedPost.type !== '릴스' && selectedPost.type !== '캐러셀' ? {background:'#FF8C42'} : {}}>
                                    {selectedPost.type === '릴스' ? <Camera size={24} /> : selectedPost.type === '캐러셀' ? <LayoutGrid size={24} /> : <MessageSquare size={24} />}
                                </div>
                                <div>
                                    <div className="flex items-center gap-2 text-xs font-black uppercase tracking-widest" style={{color:'#FF8C42'}}>
                                        <span>Week {activeWeek}</span><span className="opacity-30">|</span><span>{selectedPost.day}요일 {selectedPost.type}</span>
                                    </div>
                                    <h2 className="text-2xl font-bold">{selectedPost.title}</h2>
                                </div>
                            </div>
                            <button onClick={() => setSelectedPost(null)} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center"><X size={20} /></button>
                        </div>

                        <div className="flex-grow overflow-y-auto p-8 md:p-10 space-y-8 no-scrollbar">
                            {/* Image Preview */}
                            {selectedPost.image && (
                                <section>
                                    <div className="rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
                                        <img src={selectedPost.image} alt={selectedPost.title} className="w-full max-h-80 object-cover" />
                                    </div>
                                </section>
                            )}

                            <section className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="space-y-4">
                                    <h3 className="text-sm font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                                        <Palette size={16} /> 이미지 제작 가이드
                                    </h3>
                                    <div className="space-y-3">
                                        <div className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                            <div className="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-tight">📸 권장 사진 에셋</div>
                                            <div className="text-sm font-semibold">{selectedPost.asset}</div>
                                        </div>
                                        <div className="p-4 rounded-2xl border" style={{background:'rgba(255,140,66,0.05)', borderColor:'rgba(255,140,66,0.2)'}}>
                                            <div className="text-[10px] font-bold uppercase mb-1 tracking-tight" style={{color:'#FF8C42'}}>🎨 디자인 스타일</div>
                                            <div className="text-sm font-semibold">{selectedPost.design}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-gray-900 rounded-3xl text-white">
                                    <div className="text-[10px] font-bold text-gray-500 uppercase mb-2 tracking-widest">🪄 AI GENERATION PROMPT</div>
                                    <div className="text-xs leading-relaxed font-mono opacity-80 italic">{selectedPost.aiGuide}</div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <h3 className="text-sm font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                                        <BookOpen size={16} /> 업로드용 본문 (수정본)
                                    </h3>
                                    <button onClick={() => handleCopy(selectedPost.caption)}
                                        className="flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full hover:bg-orange-50" style={{color:'#FF8C42'}}>
                                        {copied ? <Check size={14} /> : <Copy size={14} />}
                                        {copied ? "복사됨!" : "텍스트 복사"}
                                    </button>
                                </div>
                                <div className="p-6 rounded-3xl border relative" style={{background:'#FFF8F0', borderColor:'rgba(255,140,66,0.2)'}}>
                                    <div className="absolute top-4 right-4 text-orange-200"><Star size={24} /></div>
                                    <div className="text-base leading-relaxed whitespace-pre-line text-gray-700 font-medium">{selectedPost.caption}</div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <h3 className="text-sm font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                                    <Hash size={16} /> 추천 해시태그
                                </h3>
                                <div className="p-5 bg-gray-50 rounded-2xl border border-gray-100 flex flex-wrap gap-2">
                                    {selectedPost.tags.split(' ').map((tag, i) => (
                                        <span key={i} className="px-3 py-1 bg-white border border-gray-200 rounded-full text-xs font-bold text-gray-500">{tag}</span>
                                    ))}
                                </div>
                            </section>
                        </div>

                        <div className="p-6 border-t border-gray-100 bg-gray-50 text-center shrink-0">
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                Tip: 2026년 인스타그램 그리드 비율(3:4)을 고려하여 핵심 요소는 수직 중앙에 배치하세요.
                            </p>
                        </div>
                    </div>
                </div>
            )}

            <footer className="max-w-6xl mx-auto mt-16 text-center text-gray-400">
                <p className="text-xs font-bold uppercase tracking-widest mb-2 italic opacity-60">Professional Aesthetics Content Strategy</p>
                <div className="text-[10px] flex justify-center gap-4">
                    <span>&copy; 2026 IM AESTHETIC</span><span>|</span><span>수성구 범어동 마크팰리스</span>
                </div>
            </footer>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
