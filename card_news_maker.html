<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IM 에스테틱 카드뉴스 메이커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ---- CSS 변수 / 색상 시스템 ---- */
:root{
  --bg:#FFF8F0;
  --dark:#4A3728;
  --ch:#333;
  --or:#FF8C42;
  --gr:#888;
  --bd:#e8d5c0;
  --glass-light:rgba(255,248,240,0.72);
  --glass-border:rgba(232,213,192,0.5);
  --shadow-or:0 2px 12px rgba(255,140,66,0.08);
  --transition:.2s ease;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f5ede0;color:var(--ch);min-height:100vh}

/* ---- 헤더 글래스모피즘 ---- */
header{
  background:linear-gradient(to right,#3E2D1F,#4A3728,#5C4635);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:#fff;
  padding:0 24px;
  border-bottom:2px solid #FF8C42;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 20px rgba(62,45,31,0.35);
}
.header-inner{display:flex;align-items:center;gap:16px;padding:18px 0}
header h1{font-size:18px;font-weight:300;letter-spacing:0.05em}
header span{font-size:12px;opacity:.65}

/* ---- 탭 바 ---- */
.tabs{
  display:flex;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:2px solid var(--bd);
  position:sticky;
  top:62px;
  z-index:99;
}
.tab{
  padding:11px 22px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  color:var(--gr);
  position:relative;
  min-height:44px;
  display:flex;
  align-items:center;
  transition:color var(--transition);
}
/* 탭 언더라인 애니메이션 */
.tab::after{
  content:'';
  position:absolute;
  bottom:-2px;
  left:0;
  right:0;
  height:3px;
  background:var(--or);
  transform:scaleX(0);
  transition:transform var(--transition);
  transform-origin:left center;
}
.tab.active{color:var(--or)}
.tab.active::after{transform:scaleX(1)}

/* ---- 메인 그리드 ---- */
.main{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 110px)}

/* ---- 에디터 사이드바 글래스모피즘 ---- */
.editor{
  background:var(--glass-light);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-right:1px solid var(--glass-border);
  overflow-y:auto;
  max-height:calc(100vh - 110px);
  box-shadow:2px 0 16px rgba(255,140,66,0.06);
}
.pnl{
  background:#eee4d5;
  overflow-y:auto;
  max-height:calc(100vh - 110px);
  padding:18px;
}
.panel{display:none;padding:14px}
.panel.active{display:block}

/* ---- 캘린더 그리드 ---- */
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}

/* ---- 콘텐츠 카드 ---- */
.cc{
  background:rgba(255,248,240,0.85);
  border:2px solid var(--bd);
  border-radius:9px;
  padding:10px;
  cursor:pointer;
  transition:border-color var(--transition), transform var(--transition), box-shadow var(--transition), background var(--transition);
  box-shadow:var(--shadow-or);
}
.cc:hover{
  border-color:var(--or);
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(255,140,66,0.15);
}
.cc.sel{
  border-color:var(--or);
  background:rgba(255,243,234,0.95);
  box-shadow:0 4px 16px rgba(255,140,66,0.2);
  transform:translateY(-1px);
}
.cc .wk{font-size:11px;color:var(--or);font-weight:700}
.cc .ti{font-size:13px;font-weight:600;margin-top:3px}
.cc .tp{font-size:10px;color:var(--gr);margin-top:1px}

/* ---- 폼 요소 ---- */
.frow{margin-bottom:10px}
label{display:block;font-size:11px;font-weight:600;color:var(--dark);margin-bottom:3px}
input[type=text],textarea,select{
  width:100%;
  padding:7px 10px;
  border:1.5px solid var(--bd);
  border-radius:7px;
  font-family:inherit;
  font-size:13px;
  background:rgba(255,248,240,0.8);
  color:var(--ch);
  outline:none;
  transition:border-color var(--transition), box-shadow var(--transition);
}
input[type=text]:focus,textarea:focus,select:focus{
  border-color:var(--or);
  box-shadow:0 0 0 3px rgba(255,140,66,0.1);
}
textarea{resize:vertical;min-height:54px}

/* ---- 슬라이드 에디터 카드 글래스모피즘 ---- */
.se{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1.5px solid var(--glass-border);
  border-radius:9px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:var(--shadow-or);
  transition:box-shadow var(--transition);
}
.se:hover{box-shadow:0 4px 16px rgba(255,140,66,0.12)}
.se-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.badge{background:var(--or);color:#fff;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700}
.rl{font-size:11px;color:var(--gr);font-weight:600}

/* ---- 컬러 피커 ---- */
.cr{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:7px}
.cd{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition), transform var(--transition);position:relative}
.cd:hover{transform:scale(1.15)}
.cd:hover,.cd.sel{border-color:var(--ch)}
.cd input[type=color]{opacity:0;position:absolute;inset:0;cursor:pointer;width:100%;height:100%}

/* ---- 미리보기 그리드 ---- */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.pi{
  background:#fff;
  border-radius:9px;
  overflow:hidden;
  box-shadow:var(--shadow-or);
  transition:box-shadow var(--transition), transform var(--transition);
}
.pi:hover{
  box-shadow:0 6px 20px rgba(255,140,66,0.16);
  transform:translateY(-2px);
}
.pilbl{padding:7px 11px;font-size:11px;font-weight:600;color:var(--gr);display:flex;justify-content:space-between;align-items:center}
.pw{width:270px;height:337px;overflow:hidden;cursor:pointer}
.pw>div{transform:scale(0.25);transform-origin:top left;width:1080px;height:1080px}

/* ---- 슬라이드 실제 크기 ---- */
.sf{width:1080px;height:1350px;position:relative;overflow:hidden;font-family:'Pretendard',sans-serif}
.stb{position:absolute;top:0;left:0;right:0;height:6px;background:var(--or)}
.sind{position:absolute;top:18px;right:34px;font-size:20px;color:#ccc;font-weight:600}
.sp{padding:80px;height:100%;display:flex;flex-direction:column;justify-content:center}

/* ---- 버튼 ---- */
.btn{
  padding:7px 14px;
  border-radius:7px;
  border:none;
  cursor:pointer;
  font-family:inherit;
  font-size:12px;
  font-weight:600;
  transition:background var(--transition), border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  min-height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--or);color:#fff;box-shadow:0 2px 8px rgba(255,140,66,0.25)}
.btn-p:hover{background:#d96e28;box-shadow:0 4px 12px rgba(255,140,66,0.35)}
.btn-o{background:rgba(255,255,255,0.8);border:1.5px solid var(--bd);color:var(--ch)}
.btn-o:hover{border-color:var(--or);background:#fff}
.btn-sm{padding:4px 9px;font-size:11px;min-height:32px}

/* ---- 액션바 글래스모피즘 ---- */
.acts{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  padding:14px;
  border-top:1px solid var(--glass-border);
  background:rgba(255,248,240,0.8);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

/* ---- 내보내기 영역 ---- */
#export-area{position:fixed;left:-9999px;top:0;pointer-events:none}

/* ---- 진행 바 (렌더링 중 펄스 애니메이션) ---- */
.pb{background:var(--bd);border-radius:3px;height:5px;overflow:hidden;margin-top:7px}
.pf{
  height:100%;
  background:var(--or);
  transition:width .3s ease;
}
.pf.rendering{
  animation:progress-pulse 1.2s ease-in-out infinite;
}
@keyframes progress-pulse{
  0%,100%{opacity:1}
  50%{opacity:0.6}
}

/* ---- 인포 박스 ---- */
.ib{
  background:rgba(255,248,240,0.8);
  border:1px solid var(--bd);
  border-radius:7px;
  padding:10px;
  font-size:12px;
  color:var(--gr);
  margin-bottom:10px;
  box-shadow:var(--shadow-or);
}

/* ---- 이미지 자동 매칭 ---- */
.img-match-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:6px;border:1.5px solid var(--or);
  background:rgba(255,140,66,0.08);color:var(--or);
  font-family:inherit;font-size:11px;font-weight:600;
  cursor:pointer;transition:all var(--transition);
  margin-top:4px;
}
.img-match-btn:hover{background:var(--or);color:#fff}
.img-match-btn svg{width:14px;height:14px;flex-shrink:0}

.img-picker{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
  margin-top:6px;max-height:0;overflow:hidden;
  transition:max-height .3s ease,opacity .3s ease;opacity:0;
}
.img-picker.open{max-height:400px;opacity:1}
.img-picker img{
  width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:6px;
  cursor:pointer;border:2px solid transparent;
  transition:border-color var(--transition),transform var(--transition);
}
.img-picker img:hover{border-color:var(--or);transform:scale(1.03)}
.img-picker img.selected{border-color:var(--or);box-shadow:0 0 0 2px rgba(255,140,66,0.3)}
.img-picker .img-credit{
  grid-column:1/-1;font-size:9px;color:var(--gr);text-align:right;
  margin-top:-2px;
}

/* ---- 플로팅 홈 버튼 ---- */
.home-btn{
  position:fixed;
  bottom:24px;
  left:24px;
  width:44px;
  height:44px;
  background:#4A3728;
  color:#fff;
  border:none;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  box-shadow:0 4px 16px rgba(74,55,40,0.4);
  transition:background var(--transition), transform var(--transition), box-shadow var(--transition);
  text-decoration:none;
}
.home-btn:hover{
  background:#FF8C42;
  transform:scale(1.1);
  box-shadow:0 6px 20px rgba(255,140,66,0.4);
}
.home-btn:active{transform:scale(0.95)}
.home-btn svg{width:20px;height:20px;flex-shrink:0}

/* ---- 모바일 패널 토글 ---- */
.mobile-toggle{
  display:none;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--bd);
  padding:8px 16px;
  gap:8px;
  position:sticky;
  top:108px;
  z-index:98;
}
.mobile-toggle button{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1.5px solid var(--bd);
  background:transparent;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  color:var(--gr);
  cursor:pointer;
  min-height:44px;
  transition:background var(--transition), color var(--transition), border-color var(--transition);
}
.mobile-toggle button.active{
  background:var(--or);
  color:#fff;
  border-color:var(--or);
}
.mobile-toggle button:active{transform:scale(0.97)}

/* ---- 반응형 레이아웃 ---- */
@media(max-width:860px){
  .main{
    grid-template-columns:1fr;
    min-height:auto;
  }
  .mobile-toggle{display:flex}

  .editor{
    max-height:none;
    overflow-y:visible;
    border-right:none;
    border-bottom:1px solid var(--glass-border);
  }
  .pnl{
    max-height:none;
    overflow-y:visible;
    overflow-x:auto;
  }

  /* 모바일에서 패널 전환 */
  .main.show-preview .editor{display:none}
  .main.show-editor .pnl{display:none}

  .cal-grid{grid-template-columns:repeat(2,1fr)}

  /* 미리보기 그리드: 모바일에서 가로 스크롤 */
  .pgrid{
    display:flex;
    flex-direction:row;
    overflow-x:auto;
    gap:12px;
    padding-bottom:8px;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x mandatory;
  }
  .pgrid .pi{
    flex-shrink:0;
    scroll-snap-align:start;
    width:270px;
  }
  .pw{width:270px;height:337px}
}

@media(max-width:480px){
  .cal-grid{grid-template-columns:1fr}
  header h1{font-size:15px}
  header span{display:none}
}
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="header-inner">
    <div>
      <h1>IM 에스테틱 카드뉴스 메이커</h1>
      <span>053-241-3855 | 범어마크팰리스 2층</span>
    </div>
  </div>
</header>

<!-- 상단 탭 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">캘린더에서 선택</div>
  <div class="tab" onclick="switchTab(1)">직접 입력</div>
</div>

<!-- 모바일 전용 에디터/프리뷰 토글 -->
<div class="mobile-toggle" id="mobile-toggle">
  <button class="active" id="mob-editor-btn" onclick="switchMobilePanel('editor')">에디터</button>
  <button id="mob-preview-btn" onclick="switchMobilePanel('preview')">프리뷰</button>
</div>

<!-- 메인 레이아웃 -->
<div class="main show-editor" id="main-grid">

  <!-- 에디터 사이드바 -->
  <div class="editor">
    <div class="panel active" id="panel-a">
      <div class="ib">Thursday 인포그래픽 목록입니다. 클릭하면 에디터가 채워집니다.</div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="seds-a" style="margin-top:14px"></div>
    </div>
    <div class="panel" id="panel-b">
      <div class="frow">
        <label>주제 / 키워드</label>
        <input type="text" id="topic" placeholder="예: 수분 케어, 비대칭, 결 관리..." oninput="autoRec()">
      </div>
      <div class="frow">
        <label>템플릿 타입</label>
        <select id="tpl">
          <option value="auto">자동 추천</option>
          <option value="infographic">Infographic</option>
          <option value="qa_flip">Q&amp;A Flip</option>
          <option value="program">Program</option>
          <option value="ugc">UGC / 후기</option>
        </select>
      </div>
      <div id="rec-lbl" style="font-size:11px;color:var(--or);margin-bottom:8px;min-height:16px"></div>
      <button class="btn btn-p" style="width:100%;margin-bottom:4px" onclick="genTopic()">슬라이드 생성</button>
      <div id="seds-b" style="margin-top:10px"></div>
    </div>

    <!-- 액션바 -->
    <div class="acts" id="actbar" style="display:none">
      <button class="btn btn-p" onclick="dlAll()">전체 다운로드</button>
      <button class="btn btn-o" onclick="cpCanva()">Canva 가이드 복사</button>
      <div style="width:100%;display:none" id="prog-wrap">
        <div style="font-size:11px;color:var(--gr)" id="prog-txt">준비중...</div>
        <div class="pb"><div class="pf" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- 미리보기 패널 -->
  <div class="pnl">
    <div id="pgrid" class="pgrid"></div>
    <div id="empty" style="text-align:center;padding:60px 20px;color:var(--gr)">
      <div style="font-size:40px;margin-bottom:10px">  </div>
      <div style="font-weight:600;font-size:14px">포스팅을 선택하거나 주제를 입력해<br>슬라이드를 생성하세요</div>
    </div>
  </div>
</div>

<!-- html2canvas 렌더링 영역 -->
<div id="export-area"></div>

<!-- 플로팅 홈 버튼 -->
<a href="index.html" class="home-btn" title="홈으로">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
</a>

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i===j));
}

/* ---- 모바일 패널 전환 ---- */
function switchMobilePanel(panel){
  const main=document.getElementById('main-grid');
  const edBtn=document.getElementById('mob-editor-btn');
  const pvBtn=document.getElementById('mob-preview-btn');
  if(panel==='preview'){
    main.classList.remove('show-editor');
    main.classList.add('show-preview');
    edBtn.classList.remove('active');
    pvBtn.classList.add('active');
  }else{
    main.classList.remove('show-preview');
    main.classList.add('show-editor');
    pvBtn.classList.remove('active');
    edBtn.classList.add('active');
  }
}

/* ---- 포스팅 선택 ---- */
function selPost(id){
  const p=CP.find(c=>c.id===id);if(!p)return;
  POST=p;SLIDES=p.s.map(s=>({...s,items:s.items?[...s.items]:undefined}));IMGS={};
  document.querySelectorAll('.cc').forEach(c=>c.classList.remove('sel'));
  document.getElementById('cc-'+id)?.classList.add('sel');
  buildEditors('seds-a');render();show();
}

/* ---- 에디터 빌드 ---- */
const RL={hook:'훅',step:'스텝',content:'내용',cta:'CTA',myth:'미스',fact:'팩트',checklist:'체크리스트',program:'프로그램',cause:'원인',recommend:'추천대상',highlight:'강조',ugc:'후기'};
const BGP=['#FFF8F0','#FFFFFF','#4A3728','#F5EDE0'];

function buildEditors(cid){
  document.getElementById(cid).innerHTML=SLIDES.map((s,i)=>edHTML(s,i,cid)).join('');
}

function edHTML(s,i,cid){
  const n=SLIDES.length;
  const dots=BGP.map(c=>`<div class="cd" style="background:${c}" onclick="setBg(${i},'${c}','${cid}')" title="${c}"></div>`).join('');
  return`<div class="se">
    <div class="se-hd"><span class="badge">${i+1}/${n}</span><span class="rl">${RL[s.r]||s.r}</span></div>
    ${fields(s,i)}
    <div style="margin-top:7px"><label>배경색</label>
    <div class="cr">${dots}<div class="cd" style="background:linear-gradient(135deg,#f00,#0f0,#00f)" title="직접선택"><input type="color" value="${s.bg||'#FFF8F0'}" oninput="setBg(${i},this.value,'${cid}')"></div></div></div>
    <div style="margin-top:7px"><label>이미지</label>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <input type="file" accept="image/*" onchange="upImg(${i},this,'${cid}')" style="flex:1;min-width:0">
        <button class="img-match-btn" onclick="autoMatchImg(${i})" title="키워드 기반 무료 이미지 검색">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          자동 매칭
        </button>
      </div>
      <div class="img-picker" id="imgpick-${i}"></div>
    </div>
  </div>`;
}

function fi(lbl,k,v,multi,idx){
  const attr=`data-idx="${idx}" data-k="${k}"`;
  return multi
    ?`<div class="frow"><label>${lbl}</label><textarea ${attr} oninput="upd(this)">${v||''}</textarea></div>`
    :`<div class="frow"><label>${lbl}</label><input type="text" ${attr} value="${(v||'').replace(/"/g,'&quot;')}" oninput="upd(this)"></div>`;
}

function fields(s,i){
  const f=(l,k,v,m=false)=>fi(l,k,v,m,i);
  const ta=(l,k,arr)=>`<div class="frow"><label>${l}</label><textarea data-idx="${i}" data-k="${k}" oninput="upd(this)">${(arr||[]).join('\n')}</textarea></div>`;
  switch(s.r){
    case'hook':return f('훅 문구','tx',s.tx,true);
    case'step':return f('번호','n',s.n)+f('제목','tt',s.tt)+f('설명','tx',s.tx,true);
    case'content':return f('제목','tt',s.tt)+f('설명','tx',s.tx,true);
    case'cta':return f('CTA 문구','tx',s.tx,true);
    case'myth':return f('미스 문구','tx',s.tx,true);
    case'fact':return f('팩트 문구','tx',s.tx,true);
    case'highlight':return f('강조 문구','tx',s.tx,true);
    case'cause':return f('제목','tt',s.tt)+f('내용','tx',s.tx,true);
    case'program':return f('프로그램명','name',s.name)+f('태그라인','tag',s.tag);
    case'checklist':return f('제목','tt',s.tt)+ta('항목 (줄바꿈 구분)','items',s.items);
    case'recommend':return ta('추천 대상 (줄바꿈 구분)','items',s.items);
    case'ugc':return f('후기 내용','tx',s.tx,true)+f('작성자','author',s.author);
    default:return f('내용','tx',s.tx,true);
  }
}

function upd(el){
  const idx=+el.dataset.idx,k=el.dataset.k;
  SLIDES[idx][k]=k==='items'?el.value.split('\n').filter(x=>x.trim()):el.value;
  refreshPrev(idx);
}
function setBg(idx,c,cid){SLIDES[idx].bg=c;refreshPrev(idx);}
function upImg(idx,inp,cid){
  const r=new FileReader();r.onload=e=>{IMGS[idx]=e.target.result;refreshPrev(idx);};
  r.readAsDataURL(inp.files[0]);
}

/* ---- 미리보기 렌더링 ---- */
function render(){
  const g=document.getElementById('pgrid');
  const n=SLIDES.length;
  g.innerHTML=SLIDES.map((s,i)=>`
    <div class="pi">
      <div class="pilbl"><span>${i+1}/${n} · ${RL[s.r]||s.r}</span>
        <button class="btn btn-o btn-sm" onclick="dlOne(${i})">다운로드</button></div>
      <div class="pw" onclick="dlOne(${i})" title="클릭하면 다운로드">
        <div id="pw${i}"></div></div>
    </div>`).join('');
  SLIDES.forEach((_,i)=>refreshPrev(i));
}

function refreshPrev(idx){
  const el=document.getElementById('pw'+idx);
  if(!el)return;
  el.innerHTML=slideHTML(SLIDES[idx],idx,SLIDES.length);
}

function show(){
  document.getElementById('actbar').style.display='flex';
  document.getElementById('empty').style.display='none';
}

/* ---- 슬라이드 HTML 생성 ---- */
const darkBg=new Set(['myth','program']);
function defBg(s){
  if(s.bg)return s.bg;
  if(s.r==='myth')return'#5C4A3A';
  if(s.r==='program')return'#4A3728';
  if(s.r==='hook'&&POST?.tp==='qa_flip')return'#4A3728';
  return'#FFF8F0';
}
function lum(hex){
  if(!hex||hex[0]!=='#')return 200;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b;
}

function slideHTML(s,i,n){
  const bg=defBg(s);
  const light=lum(bg)>128;
  const dc=light?'#333':'#fff';
  const sc=light?'#888':'rgba(255,255,255,.65)';
  const img=IMGS[i]?`<div style="position:absolute;inset:0;background:url('${IMGS[i]}') center/cover;opacity:.12"></div>`:'';
  return`<div class="sf" style="background:${bg}">
    <div class="stb"></div>${img}
    <div class="sind">${i+1}/${n}</div>
    <div class="sp">${inner(s,dc,sc,bg,i,n)}</div>
    ${i===n-1?footer():''}
  </div>`;
}

function inner(s,dc,sc,bg,i,n){
  switch(s.r){
    case'hook':return`
      <div style="color:rgba(255,140,66,.13);font-size:200px;font-weight:900;line-height:1;position:absolute;top:50px;left:55px;pointer-events:none">"</div>
      <div style="text-align:center;color:${dc}">
        <div style="font-size:66px;font-weight:800;line-height:1.35;white-space:pre-wrap">${e(s.tx)}</div>
      </div>
      <div style="color:rgba(255,140,66,.13);font-size:200px;font-weight:900;position:absolute;bottom:110px;right:55px;transform:rotate(180deg)">"</div>`;
    case'step':return`
      <div style="display:flex;align-items:flex-start;gap:44px">
        <div style="background:#FF8C42;color:#fff;width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;flex-shrink:0">${e(s.n)}</div>
        <div style="border-left:6px solid #FF8C42;padding-left:36px;flex:1">
          <div style="font-size:40px;font-weight:800;color:${dc};margin-bottom:18px">${e(s.tt)}</div>
          <div style="font-size:28px;color:${sc};line-height:1.65;white-space:pre-wrap">${e(s.tx)}</div>
        </div>
      </div>`;

function genTopic(){
  const topic=document.getElementById('topic').value.trim();
  if(!topic){alert('주제를 입력하세요');return;}
  let tpv=document.getElementById('tpl').value,matched=null;
  if(tpv==='auto'){
    const tv=topic.toLowerCase();
    for(const m of KM){if(m.k.some(kw=>tv.includes(kw))){matched=m.tpl;break;}}
  }
  if(!matched){
    const tp=tpv==='auto'?'infographic':tpv;
    matched=(DEF_TPLS[tp]||DEF_TPLS.infographic)(topic);
  }
  POST=matched;SLIDES=matched.s.map(s=>({...s,items:s.items?[...s.items]:undefined}));IMGS={};
  buildEditors('seds-b');render();show();
}

/* ---- 내보내기 ---- */
async function dlOne(idx){
  const el=document.getElementById('pw'+idx);if(!el)return;
  const sf=el.querySelector('.sf');if(!sf)return;
  setP(true,`슬라이드 ${idx+1} 렌더링...`,0,true);
  try{
    const c=await html2canvas(sf,{scale:1,useCORS:true,allowTaint:true,width:1080,height:1350});
    dl(c,`IM_카드뉴스_${POST?.id||'custom'}_${idx+1}.png`);
  }catch(ex){alert('렌더링 실패: '+ex.message);}
  setP(false);
}

async function dlAll(){
  if(!SLIDES.length)return;
  for(let i=0;i<SLIDES.length;i++){
    setP(true,`${i+1}/${SLIDES.length} 렌더링...`,Math.round(i/SLIDES.length*100),true);
    const sf=document.getElementById('pw'+i)?.querySelector('.sf');
    if(!sf)continue;
    try{
      const c=await html2canvas(sf,{scale:1,useCORS:true,allowTaint:true,width:1080,height:1350});
      dl(c,`IM_카드뉴스_${POST?.id||'custom'}_${i+1}.png`);
      await new Promise(r=>setTimeout(r,200));
    }catch(ex){console.error(ex);}
  }
  setP(false);
}

function cpCanva(){
  const lines=[`IM 에스테틱 카드뉴스 — ${POST?.t||''}`,`총 ${SLIDES.length}장`,''];
  SLIDES.forEach((s,i)=>{
    lines.push(`[슬라이드 ${i+1}] ${RL[s.r]||s.r}`);
    ['tt','tx','name','tag','n','author'].forEach(k=>{if(s[k])lines.push(`${k}: ${s[k]}`);});
    if(s.items)lines.push('항목:\n'+s.items.map(x=>'• '+x).join('\n'));
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>alert('Canva 가이드가 클립보드에 복사되었습니다!'))
    .catch(()=>alert('복사 실패. 브라우저 권한을 확인하세요.'));
}

function dl(canvas,name){const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=name;a.click();}

function setP(show,txt='',pct=0,rendering=false){
  const w=document.getElementById('prog-wrap');
  w.style.display=show?'block':'none';
  if(show){
    document.getElementById('prog-txt').textContent=txt;
    const fill=document.getElementById('prog-fill');
    fill.style.width=pct+'%';
    if(rendering)fill.classList.add('rendering');
    else fill.classList.remove('rendering');
  }
}

  {keys:['피로','스트레스','숙면','두통','나른','뭉침'],cat:'wellness'},
  {keys:['프로모션','이벤트','할인','예약','캘린더','4월'],cat:'promo'},
  {keys:['힐링','웰니스','명상','차','릴렉스'],cat:'wellness'},
  {keys:['관리','케어','프로그램'],cat:'spa'},
];

function matchCategory(slide){
  const parts=[slide.tx,slide.tt,slide.name,slide.tag];
  if(slide.items)parts.push(...slide.items);
  const text=parts.filter(Boolean).join(' ');

  for(const m of KEYWORD_MAP){
    if(m.keys.some(k=>text.includes(k)))return m.cat;
  }
  return 'spa';
}

/* ---- 자동 매칭 실행 ---- */
function autoMatchImg(idx){
  const slide=SLIDES[idx];
  const picker=document.getElementById('imgpick-'+idx);
  if(!picker)return;

  if(picker.classList.contains('open')){
    picker.classList.remove('open');
    return;
  }

  const cat=matchCategory(slide);
  const imgs=IMG_BANK[cat]||IMG_BANK.spa;

  picker.innerHTML=imgs.map(url=>
    `<img src="${url}" data-full="${url.replace('w=600','w=1200')}" alt="${cat}" onclick="pickImg(${idx},this)" loading="lazy">`
  ).join('')+`<div class="img-credit">Unsplash 무료 이미지</div>`;
  picker.classList.add('open');
}

/* ---- 이미지 선택 적용 ---- */
function pickImg(idx,imgEl){
  imgEl.parentElement.querySelectorAll('img').forEach(i=>i.classList.remove('selected'));
  imgEl.classList.add('selected');
  IMGS[idx]=imgEl.dataset.full||imgEl.src;
  refreshPrev(idx);
}
</script>
