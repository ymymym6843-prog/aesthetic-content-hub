<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IM 에스테틱 카드뉴스 메이커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Noto+Serif+KR:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ---- Premium 3-Layer 디자인 토큰 시스템 ---- */
:root{
  /* Layer 1: Brand Primitives */
  --brand-warm-white:#FAF8F5;
  --brand-orange:#EF7D31;
  --brand-charcoal:#1A1714;
  --brand-dark:#3D3229;
  --brand-gray:#8C8279;
  --brand-border:#E8E2DA;
  --brand-cream:#F3EFEA;
  --brand-dark-mid:#5C4A3A;
  --brand-orange-light:#FFB085;

  /* Layer 2: Semantic Tokens */
  --color-bg:var(--brand-warm-white);
  --color-accent:var(--brand-orange);
  --color-text:var(--brand-charcoal);
  --color-text-light:var(--brand-gray);
  --color-primary:var(--brand-dark);
  --color-border:var(--brand-border);
  --color-card-bg:#FFFFFF;

  /* Layer 3: Component Tokens */
  --glass-light:rgba(250,248,245,0.82);
  --shadow-soft: 0 4px 20px rgba(61, 50, 41, 0.06);
  --shadow-hover: 0 12px 30px rgba(61, 50, 41, 0.12);
  --shadow-accent:0 2px 12px rgba(239,125,49,0.1);
  --transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
  --radius: 14px;
  --radius-lg: 20px;
  --radius-pill:100px;

  /* Typography */
  --fs-hook:60px;
  --fs-title:38px;
  --fs-body:28px;
  --fs-min:26px;
  --fs-caption:22px;

  /* Spacing */
  --pad-slide:80px;
  --pad-inner:40px;

  /* Slide dimensions */
  --slide-w:1080px;
  --slide-h:1350px;

  /* Legacy aliases (backward compat) */
  --bg:var(--color-bg);
  --dark:var(--color-primary);
  --ch:var(--color-text);
  --or:var(--color-accent);
  --gr:var(--color-text-light);
  --bd:var(--color-border);
  --shadow-or:var(--shadow-accent);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Pretendard',system-ui,-apple-system,sans-serif;
  background:var(--brand-cream);
  color:var(--ch);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-feature-settings:'cv11','ss01';
}

/* ---- 헤더 — 클린 프리미엄 ---- */
header{
  background:var(--brand-dark);
  color:#fff;
  padding:0 28px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 1px 0 rgba(0,0,0,0.08);
}
.header-inner{
  display:flex;align-items:center;gap:14px;padding:16px 0;
  max-width:1600px;margin:0 auto;
}
.header-inner::before{
  content:'';width:3px;height:28px;background:var(--or);border-radius:4px;flex-shrink:0;
}
header h1{font-size:16px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
header span{font-size:11px;opacity:.45;font-weight:400;letter-spacing:0.03em}

/* ---- 탭 바 — pill 스타일 ---- */
.tabs{
  display:flex;align-items:center;
  background:#fff;
  border-bottom:1px solid var(--bd);
  position:sticky;
  top:56px;
  z-index:99;
  padding:8px 20px;
  gap:4px;
}
.tab{
  padding:8px 18px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  color:var(--gr);
  position:relative;
  min-height:36px;
  display:flex;
  align-items:center;
  border-radius:var(--radius-pill);
  transition:all var(--transition);
  border:1.5px solid transparent;
}
.tab:hover{color:var(--ch);background:var(--brand-cream)}
.tab::after{display:none}
.tab.active{
  color:#fff;
  background:var(--or);
  border-color:var(--or);
}

/* ---- 메인 그리드 ---- */
.main{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 104px)}

/* ---- 에디터 사이드바 ---- */
.editor{
  background:#fff;
  border-right:1px solid var(--bd);
  overflow-y:auto;
  max-height:calc(100vh - 104px);
}
.pnl{
  background:var(--brand-cream);
  overflow-y:auto;
  max-height:calc(100vh - 104px);
  padding:20px;
}
.panel{display:none;padding:16px}
.panel.active{display:block}

/* ---- 캘린더 그리드 ---- */
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}

/* ---- 콘텐츠 카드 ---- */
.cc{
  background:#fff;
  border:1.5px solid var(--bd);
  border-radius:var(--radius);
  padding:12px;
  cursor:pointer;
  transition:all var(--transition);
  box-shadow:var(--shadow-soft);
}
.cc:hover{
  border-color:var(--or);
  transform:translateY(-2px);
  box-shadow:var(--shadow-hover);
}
.cc.sel{
  border-color:var(--or);
  background:rgba(239,125,49,0.04);
  box-shadow:0 0 0 3px rgba(239,125,49,0.12),var(--shadow-soft);
}
.cc .wk{font-size:10px;color:var(--or);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.cc .ti{font-size:13px;font-weight:700;margin-top:4px;color:var(--ch)}
.cc .tp{font-size:10px;color:var(--gr);margin-top:2px;font-weight:500}

/* ---- 폼 요소 ---- */
.frow{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:700;color:var(--gr);margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase}
input[type=text],textarea,select{
  width:100%;
  padding:9px 12px;
  border:1.5px solid var(--bd);
  border-radius:10px;
  font-family:inherit;
  font-size:13px;
  background:#fff;
  color:var(--ch);
  outline:none;
  transition:all var(--transition);
}
input[type=text]:focus,textarea:focus,select:focus{
  border-color:var(--or);
  box-shadow:0 0 0 3px rgba(239,125,49,0.1);
}
textarea{resize:vertical;min-height:58px}

/* ---- 슬라이드 에디터 카드 ---- */
.se{
  background:#fff;
  border:1.5px solid var(--bd);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:10px;
  box-shadow:var(--shadow-soft);
  transition:all var(--transition);
}
.se:hover{box-shadow:var(--shadow-hover)}
.se-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.badge{background:var(--brand-dark);color:#fff;border-radius:var(--radius-pill);padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:0.03em}
.rl{font-size:11px;color:var(--gr);font-weight:600}

/* ---- 컬러 피커 ---- */
.cr{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
.cd{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--transition);position:relative}
.cd:hover{transform:scale(1.2)}
.cd:hover,.cd.sel{border-color:var(--ch);box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.cd input[type=color]{opacity:0;position:absolute;inset:0;cursor:pointer;width:100%;height:100%}

/* ---- 미리보기 그리드 ---- */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.pi{
  background:#fff;
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:var(--shadow-soft);
  transition:all var(--transition);
  border:1px solid var(--bd);
}
.pi:hover{
  box-shadow:var(--shadow-hover);
  transform:translateY(-3px);
}
.pilbl{padding:10px 14px;font-size:11px;font-weight:600;color:var(--gr);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd)}
.pw{width:270px;height:337px;overflow:hidden;cursor:pointer}
.pw>div{transform:scale(0.25);transform-origin:top left;width:1080px;height:1080px}

/* ---- 슬라이드 실제 크기 ---- */
.sf{width:var(--slide-w);height:var(--slide-h);position:relative;overflow:hidden;font-family:'Pretendard',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.sp{padding:100px 88px;height:100%;display:flex;flex-direction:column;justify-content:center;word-break:keep-all;overflow-wrap:break-word;line-height:1.6}

/* ---- 버튼 ---- */
.btn{
  padding:8px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-family:inherit;
  font-size:12px;
  font-weight:700;
  transition:all var(--transition);
  min-height:40px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  letter-spacing:0.02em;
}
.btn:active{transform:scale(0.97)}
.btn-p{
  background:var(--or);color:#fff;
  box-shadow:0 2px 8px rgba(239,125,49,0.3);
}
.btn-p:hover{background:#D96B20;box-shadow:0 4px 16px rgba(239,125,49,0.35);transform:translateY(-1px)}
.btn-o{background:#fff;border:1.5px solid var(--bd);color:var(--ch)}
.btn-o:hover{border-color:var(--or);color:var(--or)}
.btn-sm{padding:5px 10px;font-size:11px;min-height:32px}

/* ---- 액션바 ---- */
.acts{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding:16px;
  border-top:1px solid var(--bd);
  background:#fff;
}

/* ---- 내보내기 영역 ---- */
#export-area{position:fixed;left:-9999px;top:0;pointer-events:none}

/* ---- 진행 바 ---- */
.pb{background:var(--bd);border-radius:var(--radius-pill);height:4px;overflow:hidden;margin-top:8px}
.pf{
  height:100%;
  background:var(--or);
  border-radius:var(--radius-pill);
  transition:width .3s ease;
}
.pf.rendering{
  animation:progress-pulse 1.2s ease-in-out infinite;
}
@keyframes progress-pulse{
  0%,100%{opacity:1}
  50%{opacity:0.5}
}

/* ---- 인포 박스 ---- */
.ib{
  background:rgba(239,125,49,0.04);
  border:1px solid rgba(239,125,49,0.12);
  border-radius:var(--radius);
  padding:12px 14px;
  font-size:12px;
  color:var(--gr);
  margin-bottom:12px;
  line-height:1.6;
}

/* ---- 이미지 자동 매칭 ---- */
.img-match-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:10px;border:1.5px solid var(--or);
  background:rgba(239,125,49,0.06);color:var(--or);
  font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;transition:all var(--transition);
  margin-top:4px;
}
.img-match-btn:hover{background:var(--or);color:#fff;box-shadow:0 4px 12px rgba(239,125,49,0.25)}
.img-match-btn svg{width:14px;height:14px;flex-shrink:0}

.img-picker{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
  margin-top:8px;max-height:0;overflow:hidden;
  transition:max-height .3s ease,opacity .3s ease;opacity:0;
}
.img-picker.open{max-height:400px;opacity:1}
.img-picker img{
  width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:8px;
  cursor:pointer;border:2px solid transparent;
  transition:all var(--transition);
}
.img-picker img:hover{border-color:var(--or);transform:scale(1.03)}
.img-picker img.selected{border-color:var(--or);box-shadow:0 0 0 3px rgba(239,125,49,0.2)}
.img-picker .img-credit{
  grid-column:1/-1;font-size:9px;color:var(--gr);text-align:right;
  margin-top:-2px;
}

/* ---- 플로팅 홈 버튼 ---- */
.home-btn{
  position:fixed;
  bottom:24px;
  left:24px;
  width:48px;
  height:48px;
  background:var(--brand-dark);
  color:#fff;
  border:none;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  transition:all var(--transition);
  text-decoration:none;
}
.home-btn:hover{
  background:var(--or);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(239,125,49,0.35);
}
.home-btn:active{transform:scale(0.95)}
.home-btn svg{width:20px;height:20px;flex-shrink:0}

/* ---- 모바일 패널 토글 ---- */
.mobile-toggle{
  display:none;
  background:#fff;
  border-bottom:1px solid var(--bd);
  padding:10px 16px;
  gap:8px;
  position:sticky;
  top:100px;
  z-index:98;
}
.mobile-toggle button{
  flex:1;
  padding:10px;
  border-radius:var(--radius);
  border:1.5px solid var(--bd);
  background:#fff;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  color:var(--gr);
  cursor:pointer;
  min-height:44px;
  transition:all var(--transition);
}
.mobile-toggle button.active{
  background:var(--brand-dark);
  color:#fff;
  border-color:var(--brand-dark);
}
.mobile-toggle button:active{transform:scale(0.97)}

/* ---- 반응형 레이아웃 ---- */
@media(max-width:860px){
  .main{
    grid-template-columns:1fr;
    min-height:auto;
  }
  .mobile-toggle{display:flex}

  .editor{
    max-height:none;
    overflow-y:visible;
    border-right:none;
    border-bottom:1px solid var(--bd);
  }
  .pnl{
    max-height:none;
    overflow-y:visible;
    overflow-x:auto;
  }

  .main.show-preview .editor{display:none}
  .main.show-editor .pnl{display:none}

  .cal-grid{grid-template-columns:repeat(2,1fr)}

  .pgrid{
    display:flex;
    flex-direction:row;
    overflow-x:auto;
    gap:12px;
    padding-bottom:8px;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x mandatory;
  }
  .pgrid .pi{
    flex-shrink:0;
    scroll-snap-align:start;
    width:270px;
  }
  .pw{width:270px;height:337px}
}

/* ---- 프리셋 카드 ---- */
.preset-card{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;border-radius:var(--radius-lg);
  border:1.5px solid var(--bd);background:#fff;
  cursor:pointer;transition:all var(--transition);
  box-shadow:var(--shadow-soft);
}
.preset-card:hover{border-color:var(--or);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.preset-icon{font-size:26px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);background:rgba(239,125,49,0.06);flex-shrink:0}
.preset-title{font-size:14px;font-weight:700;color:var(--ch)}
.preset-desc{font-size:11px;color:var(--gr);margin-top:3px;line-height:1.5}
.preset-slides{font-size:10px;color:var(--or);font-weight:700;margin-top:4px}

/* ---- 슬라이드 가이드 ---- */
.slide-guide{
  background:rgba(239,125,49,0.04);border:1px solid rgba(239,125,49,0.15);
  border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;
  font-size:11px;color:var(--or);font-weight:600;
  display:flex;align-items:center;gap:6px;
}

/* ---- 브랜드 모드 컬러 팔레트 ---- */
.brand-palette{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.brand-swatch{
  width:28px;height:28px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:all var(--transition);
}
.brand-swatch:hover,.brand-swatch.active{border-color:var(--or);transform:scale(1.15)}

/* ---- 폰트 프리셋 ---- */
.font-presets{display:flex;gap:6px;margin-top:6px}
.font-preset-btn{
  padding:5px 12px;border-radius:var(--radius-pill);font-size:10px;font-weight:700;
  border:1.5px solid var(--bd);background:#fff;color:var(--ch);
  cursor:pointer;transition:all var(--transition);
}
.font-preset-btn:hover,.font-preset-btn.active{border-color:var(--or);color:var(--or);background:rgba(239,125,49,0.04)}

@media(max-width:480px){
  .cal-grid{grid-template-columns:1fr}
  header h1{font-size:14px}
  header span{display:none}
}
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="header-inner">
    <div>
      <h1>IM 에스테틱 카드뉴스 메이커</h1>
      <span>053-241-3855 | 범어마크팰리스 2층</span>
    </div>
  </div>
</header>

<!-- 상단 탭 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">캘린더에서 선택</div>
  <div class="tab" onclick="switchTab(1)">직접 입력</div>
  <div class="tab" onclick="switchTab(2)">템플릿 프리셋</div>
  <div style="margin-left:auto;display:flex;align-items:center;padding-right:16px;gap:10px">
    <label style="font-size:11px;color:var(--color-primary);font-weight:700;white-space:nowrap">테마</label>
    <select id="theme-select" onchange="applyTheme(this.value)" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1.5px solid var(--color-border);background:var(--color-bg);color:var(--color-text);font-family:inherit;cursor:pointer;min-width:100px">
      <option value="warm" selected>IM 기본(웜)</option>
      <option value="dark">IM 다크</option>
      <option value="clean">IM 클린</option>
      <option value="spring">IM 벚꽃</option>
    </select>
    <label style="font-size:11px;color:var(--color-primary);font-weight:700;white-space:nowrap">사이즈</label>
    <select id="size-select" onchange="applySize(this.value)" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1.5px solid var(--color-border);background:var(--color-bg);color:var(--color-text);font-family:inherit;cursor:pointer;min-width:90px">
      <option value="4:5" selected>피드 4:5</option>
      <option value="1:1">정사각 1:1</option>
      <option value="9:16">스토리 9:16</option>
    </select>
  </div>
</div>

<!-- 모바일 전용 에디터/프리뷰 토글 -->
<div class="mobile-toggle" id="mobile-toggle">
  <button class="active" id="mob-editor-btn" onclick="switchMobilePanel('editor')">에디터</button>
  <button id="mob-preview-btn" onclick="switchMobilePanel('preview')">프리뷰</button>
</div>

<!-- 메인 레이아웃 -->
<div class="main show-editor" id="main-grid">

  <!-- 에디터 사이드바 -->
  <div class="editor">
    <div class="panel active" id="panel-a">
      <div class="ib">Thursday 인포그래픽 목록입니다. 클릭하면 에디터가 채워집니다.</div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="seds-a" style="margin-top:14px"></div>
    </div>
    <div class="panel" id="panel-b">
      <div class="frow">
        <label>주제 / 키워드</label>
        <input type="text" id="topic" placeholder="예: 수분 케어, 비대칭, 결 관리..." oninput="autoRec()">
      </div>
      <div class="frow">
        <label>템플릿 타입</label>
        <select id="tpl">
          <option value="auto">자동 추천</option>
          <option value="infographic">Infographic</option>
          <option value="qa_flip">Q&amp;A Flip</option>
          <option value="program">Program</option>
          <option value="ugc">UGC / 후기</option>
        </select>
      </div>
      <div id="rec-lbl" style="font-size:11px;color:var(--or);margin-bottom:8px;min-height:16px"></div>
      <button class="btn btn-p" style="width:100%;margin-bottom:4px" onclick="genTopic()">슬라이드 생성</button>
      <div id="seds-b" style="margin-top:10px"></div>
    </div>

    <!-- Phase 2: 템플릿 프리셋 패널 -->
    <div class="panel" id="panel-c">
      <div class="ib" style="margin-bottom:12px">템플릿을 선택하면 슬라이드가 자동으로 구성됩니다.</div>
      <div id="presets-container" style="display:grid;gap:10px"></div>
      <div id="seds-c" style="margin-top:10px"></div>
    </div>

    <!-- 액션바 -->
    <div class="acts" id="actbar" style="display:none">

function applyTheme(name){
  currentTheme=name;
  const t=THEMES[name];if(!t)return;
  const root=document.documentElement;
  for(const[k,v] of Object.entries(t))root.style.setProperty(k,v);
  if(SLIDES.length)SLIDES.forEach((_,i)=>refreshPrev(i));
}

const SIZES={'4:5':{w:1080,h:1350},'1:1':{w:1080,h:1080},'9:16':{w:1080,h:1920}};
let currentSize='4:5';

function applySize(ratio){
  currentSize=ratio;
  const s=SIZES[ratio];if(!s)return;
  const root=document.documentElement;
  root.style.setProperty('--slide-w',s.w+'px');
  root.style.setProperty('--slide-h',s.h+'px');
  /* update preview wrapper height */
  document.querySelectorAll('.pw').forEach(el=>{
    el.style.height=Math.round(s.h*270/s.w)+'px';
  });
  if(SLIDES.length)SLIDES.forEach((_,i)=>refreshPrev(i));
}

function upImgBa(idx,inp,type){

}


function fi(lbl,k,v,multi,idx){
  const attr=`data-idx="${idx}" data-k="${k}"`;
  return multi
    ?`<div class="frow"><label>${lbl}</label><textarea ${attr} oninput="upd(this)">${v||''}</textarea></div>`
    :`<div class="frow"><label>${lbl}</label><input type="text" ${attr} value="${(v||'').replace(/"/g,'&quot;')}" oninput="upd(this)"></div>`;
}

function fields(s,i){
  const f=(l,k,v,m=false)=>fi(l,k,v,m,i);
  const ta=(l,k,arr)=>`<div class="frow"><label>${l}</label><textarea data-idx="${i}" data-k="${k}" oninput="upd(this)">${(arr||[]).join('\n')}</textarea></div>`;
  switch(s.r){
    case'hook':return f('상단 문구','eyebrow',s.eyebrow)+f('훅 문구','tx',s.tx,true)+f('하단 문구','swipe',s.swipe);
    case'step':return f('번호','n',s.n)+f('제목','tt',s.tt)+f('설명','tx',s.tx,true);
    case'content':return f('라벨','label',s.label)+f('제목','tt',s.tt)+f('설명','tx',s.tx,true);
    case'cta':return f('CTA 문구','tx',s.tx,true);
    case'myth':return f('미스 문구','tx',s.tx,true);
    case'fact':return f('제목','tt',s.tt)+f('팩트 문구','tx',s.tx,true);
    case'highlight':return f('강조 문구','tx',s.tx,true);
    case'cause':return f('라벨','label',s.label)+f('제목','tt',s.tt)+f('내용','tx',s.tx,true);
    case'program':return f('프로그램명','name',s.name)+f('태그라인','tag',s.tag);
    case'checklist':return f('라벨','label',s.label)+f('제목','tt',s.tt)+ta('항목 (줄바꿈 구분)','items',s.items);
    case'recommend':return f('라벨','label',s.label)+ta('추천 대상 (줄바꿈 구분)','items',s.items);
    case'ugc':return f('라벨','label',s.label)+f('후기 내용','tx',s.tx,true)+f('작성자','author',s.author);
    case'ba':return f('라벨','label',s.label)+f('Before 설명','tx',s.tx)+f('After 설명','tt',s.tt);
    default:return f('내용','tx',s.tx,true);
  }
}

function upd(el){
  const idx=+el.dataset.idx,k=el.dataset.k;
  SLIDES[idx][k]=k==='items'?el.value.split('\n').filter(x=>x.trim()):el.value;
  refreshPrev(idx);
}
function setBg(idx,c,cid){SLIDES[idx].bg=c;refreshPrev(idx);}
function upImg(idx,inp,cid){
  const r=new FileReader();r.onload=e=>{IMGS[idx]=e.target.result;refreshPrev(idx);};
  r.readAsDataURL(inp.files[0]);
}

/* ---- 슬라이드 HTML 생성 ---- */
const darkBg=new Set(['myth','program']);

/* 테마 인식 기본 배경색 */
function defBg(s){
  if(s.bg)return s.bg;
  const t=THEMES[currentTheme]||THEMES.warm;
  if(s.r==='myth')return t['--brand-dark-mid']||'#5C4A3A';
  if(s.r==='program')return t['--color-primary']||'#3D3229';
  if(s.r==='hook'&&POST?.tp==='qa_flip')return t['--color-primary']||'#3D3229';
  return t['--color-bg']||'#FAF8F5';
}

/* 테마 인식 luminance - CSS var() 해석 */
function lum(hex){
  if(!hex||hex[0]!=='#')return 200;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b;
}

/* 현재 테마의 accent 색상 */
function themeAccent(){return(THEMES[currentTheme]||THEMES.warm)['--color-accent']||'#EF7D31';}
function themePrimary(){return(THEMES[currentTheme]||THEMES.warm)['--color-primary']||'#3D3229';}

/* ---- 프리미엄 헬퍼 ---- */
function grainOverlay(opacity=0.03){
  return`<div style="position:absolute;inset:0;opacity:${opacity};pointer-events:none;mix-blend-mode:multiply;z-index:1;background-image:url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E&quot;)"></div>`;
}
function botanicalMotif(color,pos='tr',scale=1){
  const s=100*scale;const positions={tr:'top:40px;right:40px',bl:'bottom:120px;left:40px'};
  return`<div style="position:absolute;${positions[pos]||positions.tr};width:${s}px;height:${s}px;opacity:0.06;pointer-events:none;z-index:1"><svg viewBox="0 0 100 100" fill="none" stroke="${color}" stroke-width="0.5"><path d="M80,10 Q50,30 30,60 Q20,80 10,90" opacity="0.8"/><path d="M85,15 Q60,25 40,50 Q30,70 20,85" opacity="0.5"/><path d="M75,5 Q45,35 25,65 Q15,85 5,95" opacity="0.3"/></svg></div>`;

function genTopic(){
  const topic=document.getElementById('topic').value.trim();
  if(!topic){alert('주제를 입력하세요');return;}
  let tpv=document.getElementById('tpl').value,matched=null;
  if(tpv==='auto'){
    const tv=topic.toLowerCase();
    for(const m of KM){if(m.k.some(kw=>tv.includes(kw))){matched=m.tpl;break;}}
  }
  if(!matched){
    const tp=tpv==='auto'?'infographic':tpv;
    matched=(DEF_TPLS[tp]||DEF_TPLS.infographic)(topic);
  }
  POST=matched;SLIDES=matched.s.map(s=>({...s,items:s.items?[...s.items]:undefined}));IMGS={};
  buildEditors('seds-b');render();show();
}

async function dlOne(idx){
  const el=document.getElementById('pw'+idx);if(!el)return;
  const sf=el.querySelector('.sf');if(!sf)return;
  const sz=SIZES[currentSize]||SIZES['4:5'];
  setP(true,`슬라이드 ${idx+1} 렌더링...`,0,true);
  try{
    const c=await html2canvas(sf,{scale:1,useCORS:true,allowTaint:true,width:sz.w,height:sz.h});
    dl(c,`IM_카드뉴스_${POST?.id||'custom'}_${idx+1}.png`);
  }catch(ex){alert('렌더링 실패: '+ex.message);}
  setP(false);
}

async function dlAll(){
  if(!SLIDES.length)return;
  for(let i=0;i<SLIDES.length;i++){
    setP(true,`${i+1}/${SLIDES.length} 렌더링...`,Math.round(i/SLIDES.length*100),true);
    const sf=document.getElementById('pw'+i)?.querySelector('.sf');
    if(!sf)continue;
    try{
      const sz=SIZES[currentSize]||SIZES['4:5'];
      const c=await html2canvas(sf,{scale:1,useCORS:true,allowTaint:true,width:sz.w,height:sz.h});
      dl(c,`IM_카드뉴스_${POST?.id||'custom'}_${i+1}.png`);
      await new Promise(r=>setTimeout(r,200));
    }catch(ex){console.error(ex);}
  }
  setP(false);
}

function cpCanva(){
  const lines=[`IM 에스테틱 카드뉴스 — ${POST?.t||''}`,`총 ${SLIDES.length}장`,''];
  SLIDES.forEach((s,i)=>{
    lines.push(`[슬라이드 ${i+1}] ${RL[s.r]||s.r}`);
    ['tt','tx','name','tag','n','author'].forEach(k=>{if(s[k])lines.push(`${k}: ${s[k]}`);});
    if(s.items)lines.push('항목:\n'+s.items.map(x=>'• '+x).join('\n'));
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>alert('Canva 가이드가 클립보드에 복사되었습니다!'))
    .catch(()=>alert('복사 실패. 브라우저 권한을 확인하세요.'));
}

function setP(show,txt='',pct=0,rendering=false){
  const w=document.getElementById('prog-wrap');
  w.style.display=show?'block':'none';
  if(show){
    document.getElementById('prog-txt').textContent=txt;
    const fill=document.getElementById('prog-fill');
    fill.style.width=pct+'%';
    if(rendering)fill.classList.add('rendering');
    else fill.classList.remove('rendering');
  }
}

];

function matchCategory(slide){
  const parts=[slide.tx,slide.tt,slide.name,slide.tag];
  if(slide.items)parts.push(...slide.items);
  const text=parts.filter(Boolean).join(' ');

  for(const m of KEYWORD_MAP){
    if(m.keys.some(k=>text.includes(k)))return m.cat;
  }
  return 'spa';
}

/* ---- 자동 매칭 실행 ---- */
function autoMatchImg(idx){
  const slide=SLIDES[idx];
  const picker=document.getElementById('imgpick-'+idx);
  if(!picker)return;

  if(picker.classList.contains('open')){
    picker.classList.remove('open');
    return;
  }

  const cat=matchCategory(slide);
  const imgs=IMG_BANK[cat]||IMG_BANK.spa;

  picker.innerHTML=imgs.map(url=>
    `<img src="${url}" data-full="${url.replace('w=600','w=1200')}" alt="${cat}" onclick="pickImg(${idx},this)" loading="lazy">`
  ).join('')+`<div class="img-credit">Unsplash 무료 이미지</div>`;
  picker.classList.add('open');
}

/* ---- 이미지 선택 적용 ---- */
function pickImg(idx,imgEl){
  imgEl.parentElement.querySelectorAll('img').forEach(i=>i.classList.remove('selected'));
  imgEl.classList.add('selected');
  IMGS[idx]=imgEl.dataset.full||imgEl.src;
  refreshPrev(idx);
}

function buildPresets(){
  const container=document.getElementById('presets-container');
  if(!container)return;
  container.innerHTML=Object.keys(PRESET_TEMPLATES).map(key=>{
    const p=PRESET_TEMPLATES[key];
    return `
      <div class="preset-card" onclick="applyPreset('${key}')" id="preset-${key}">
        <div class="preset-icon">${p.icon||'📋'}</div>
        <div>
          <div class="preset-title">${p.t}</div>
          <div class="preset-desc">${p.desc||''}</div>
          <div class="preset-slides">${p.s.length}장</div>
        </div>
      </div>
    `;
  }).join('');
}

// 프리셋 빌드 실행 (PRESET_TEMPLATES 정의 후)
buildPresets();

let currentPresetType=null;

function applyPreset(type){
  const tpl=PRESET_TEMPLATES[type];
  if(!tpl)return;
  currentPresetType=type;
  POST={...tpl};
  SLIDES=tpl.s.map(s=>({...s,items:s.items?[...s.items]:undefined}));
  IMGS={};
  buildEditorsWithGuides('seds-c',type);
  render();show();
}

function buildEditorsWithGuides(cid,presetType){
  const guides=SLIDE_GUIDES[presetType]||[];
  const el=document.getElementById(cid);
  el.innerHTML=SLIDES.map((s,i)=>{
    const guide=guides[i]?`<div class="slide-guide">💡 ${guides[i]}</div>`:'';
    return guide+edHTML(s,i,cid);
  }).join('');
}
