<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin MBTI Templates · MBTI 16 + Prakriti 9 + Fragrance 16 = 41 Templates</title>
<link rel="icon" type="image/svg+xml" href="/logo-symbol-only.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E8703A;
  --cream: #FFF8F0;
  --warm-beige: #F5EDE0;
  --gold: #D4A04A;
  --dark: #3D2E24;
  --muted: #9B8A7A;
  --ok: #4A7C59;
  --ng: #C0392B;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Pretendard', system-ui, sans-serif;
  background: #FAF6F1;
  color: var(--dark);
  padding: 40px 20px 80px;
  -webkit-font-smoothing: antialiased;
  word-break: keep-all;
}

/* ──── HEADER ──── */
.page-header {
  max-width: 1400px;
  margin: 0 auto 24px;
  text-align: center;
  padding: 40px 0 28px;
  border-bottom: 2px solid var(--warm-beige);
}
.page-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 400;
  letter-spacing: 6px; color: var(--dark);
}
.page-header .sub { font-size: 13px; color: var(--muted); letter-spacing: 2px; margin-top: 8px; }
.page-header .kr {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px; font-weight: 300;
  color: var(--dark); margin-top: 14px; line-height: 1.6;
}
.page-header .kr strong { color: var(--orange); font-weight: 500; }

/* ──── TAB NAV ──── */
.tabs {
  max-width: 1400px; margin: 0 auto 28px;
  display: flex; gap: 4px;
  padding: 6px; background: #FFF;
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(26,20,16,0.06);
}
.tab-btn {
  flex: 1;
  font-family: 'Pretendard'; font-size: 14px; font-weight: 600;
  padding: 14px 20px;
  border: none; background: transparent;
  color: var(--muted); cursor: pointer;
  border-radius: 8px; transition: all 0.2s;
}
.tab-btn:hover { background: var(--warm-beige); color: var(--dark); }
.tab-btn.active {
  background: var(--orange); color: #FFF;
  box-shadow: 0 4px 12px rgba(232,112,58,0.25);
}
.tab-btn span { opacity: 0.7; margin-left: 6px; font-weight: 400; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ──── CONTROLS ──── */
.controls {
  max-width: 1400px; margin: 0 auto 28px;
  display: flex; gap: 10px;
  flex-wrap: wrap; align-items: center;
  padding: 16px 20px; background: #FFF;
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(26,20,16,0.05);
}
.controls label { font-weight: 600; font-size: 13px; color: var(--dark); }
.controls select {
  font-family: 'Pretendard'; font-size: 13px;
  padding: 8px 14px; border: 1px solid var(--gold);
  border-radius: 6px; background: #FFF; color: var(--dark);
  min-width: 280px; cursor: pointer;
}
.controls button {
  font-family: 'Pretendard'; font-weight: 600; font-size: 13px;
  padding: 8px 18px; border: none; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: var(--orange); color: #FFF; }
.btn-primary:hover { background: #d4612e; }
.btn-secondary { background: var(--warm-beige); color: var(--dark); }
.btn-secondary:hover { background: #ebe3d6; }
.btn-all { background: var(--dark); color: #FFF; }
.btn-all:hover { background: #2a1f18; }
.progress { font-size: 12px; color: var(--muted); margin-left: auto; }

/* ──── TEMPLATE SET BOX ──── */
.template-set {
  max-width: 1400px; margin: 0 auto;
  background: #FFF; border-radius: 16px;
  padding: 32px; box-shadow: 0 8px 32px rgba(26,20,16,0.06);
}
.set-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--warm-beige);
}
.set-header .code-badge {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 600; color: #FFF;
  background: var(--orange); padding: 8px 16px;
  border-radius: 6px; letter-spacing: 0.12em;
}
.set-header .set-name {
  font-family: 'Noto Serif KR', serif;
  font-weight: 400; font-size: 24px; color: var(--dark);
}
.set-header .set-cat {
  font-size: 12px; color: var(--muted); letter-spacing: 0.08em;
}

/* ──── SLIDE GRID ──── */
.slide-grid {
  display: grid; gap: 40px;
  justify-items: center;
}
.slide-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.slide-grid.cols-1 { grid-template-columns: 1fr; }
@media (max-width: 1200px) {
  .slide-grid.cols-2 { grid-template-columns: 1fr; }
}

.slide-item {
  display: flex; flex-direction: column;
  gap: 12px; align-items: center;
  width: 100%; max-width: 540px;
}
.slide-label {
  font-size: 12px; font-weight: 700; color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase;
  align-self: flex-start;
}
.slide-btn {
  font-family: 'Pretendard'; font-size: 12px; font-weight: 600;
  padding: 8px 16px; border: 1px solid var(--orange);
  background: #FFF; color: var(--orange);
  border-radius: 4px; cursor: pointer;
  align-self: flex-start;
}
.slide-btn:hover { background: var(--orange); color: #FFF; }

/* ══════════ SLIDE MOCKUP (540×675 = 1080×1350 @ scale:2 · Instagram Feed 4:5) ══════════ */
.slide-mockup {
  width: 540px; height: 675px;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  font-family: 'Pretendard', sans-serif;
  color: var(--dark);
}
@media (max-width: 1200px) {
  .slide-mockup { transform: scale(0.85); transform-origin: top left; margin-bottom: -101px; }
}

/* Corner brackets */
.slide-mockup .brk {
  position: absolute; width: 36px; height: 36px;
  border: 2px solid var(--gold); opacity: 0.55;
  pointer-events: none;
}
.slide-mockup .brk.tl { top: 18px; left: 18px; border-right: none; border-bottom: none; }
.slide-mockup .brk.tr { top: 18px; right: 18px; border-left: none; border-bottom: none; }
.slide-mockup .brk.bl { bottom: 18px; left: 18px; border-right: none; border-top: none; }
.slide-mockup .brk.br { bottom: 18px; right: 18px; border-left: none; border-top: none; }

/* Brand bar */
.mk-bar {
  position: absolute; top: 30px; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 44px; z-index: 2;
}
.mk-bar-logo {
  font-family: 'Playfair Display', serif;
  font-size: 14px; font-weight: 500;
  letter-spacing: 0.28em; color: var(--gold);
}
.mk-bar-acc {
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.06em; font-weight: 500;
}
.mk-bar-badge {
  color: #FFF; font-size: 13px; font-weight: 700;
  padding: 4px 12px; border-radius: 3px;
  letter-spacing: 0.14em; background: var(--orange);
}

/* Footer */
.mk-tagline {
  position: absolute; bottom: 50px; left: 0; right: 0;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 10px; letter-spacing: 0.32em;
  color: var(--gold); text-transform: uppercase;
}
.mk-tagline::before, .mk-tagline::after {
  content: '—'; color: var(--gold); opacity: 0.6;
  margin: 0 10px; font-weight: 300;
}
.mk-footer {
  position: absolute; bottom: 30px; left: 0; right: 0;
  text-align: center; font-size: 10px; color: var(--muted);
  letter-spacing: 0.05em; font-weight: 500;
}

/* ───── MBTI SLIDE 1: COVER (fullscreen + left-bottom text) ───── */
/* Override brackets & brand bar for dark video backgrounds */
.mk-cover .brk { border-color: rgba(255,248,240,0.5); }
.mk-cover .mk-bar-logo { color: rgba(255,248,240,0.85); text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.mk-cover .mk-bar-acc { color: rgba(255,248,240,0.65); font-weight: 400; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.mk-cover { background: linear-gradient(180deg, #FFF8F0 0%, #FEF3E4 100%); overflow: hidden; }
/* Upper text: cream/white with shadow for dark video backgrounds */
.mk-cover .cover-label {
  position: absolute; top: 82px; left: 32px;
  font-family: 'Playfair Display', serif;
  font-size: 10px; letter-spacing: 0.36em;
  color: rgba(255,248,240,0.75); text-transform: uppercase;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  z-index: 3;
}
.mk-cover .cover-title {
  position: absolute; top: 108px; left: 32px;
  font-family: 'Noto Serif KR', serif;
  font-weight: 300; font-size: 22px;
  color: #FFF8F0; letter-spacing: 0.08em;
  text-shadow: 0 1px 6px rgba(0,0,0,0.35);
  z-index: 3;
}
.mk-cover .cover-divider {
  position: absolute; top: 150px; left: 32px;
  width: 44px; height: 0;
  border-top: 1.5px solid rgba(255,248,240,0.6);
  z-index: 3;
}
.mk-cover .cover-emoji-wrap {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
}
.mk-cover .cover-emoji {
  font-size: 200px; line-height: 1;
  filter: drop-shadow(0 6px 18px rgba(232,112,58,0.10)); z-index: 1;
  opacity: 0.9;
}
.mk-cover .cover-emoji-ring { display: none; }
/* Bottom overlay: no gradient — text-shadow only for readability */
.mk-cover .cover-overlay {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 80px 32px 68px;
  z-index: 2;
}
.mk-cover .cover-name-box {
  text-align: left;
}
.mk-cover .cover-name-ko {
  font-family: 'Noto Serif KR', serif;
  font-weight: 400; font-size: 36px;
  color: #FFF8F0; letter-spacing: 0.04em; line-height: 1.1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
}
.mk-cover .cover-name-en {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 14px;
  color: rgba(255,248,240,0.70); margin-top: 2px; letter-spacing: 0.04em;
  text-shadow: 0 1px 6px rgba(0,0,0,0.4);
}
.mk-cover .cover-code-box {
  margin-top: 10px; text-align: left;
}
.mk-cover .cover-code-box span {
  font-family: 'Pretendard', sans-serif;
  background: var(--orange); color: #FFF;
  font-size: 12px; font-weight: 700; padding: 5px 14px;
  border-radius: 3px; letter-spacing: 0.2em;
  box-shadow: 0 4px 12px rgba(232,112,58,0.35);
}
.mk-cover .cover-cat {
  margin-top: 8px; text-align: left;
  font-size: 11px; color: rgba(255,248,240,0.65);
  letter-spacing: 0.08em; font-weight: 500;
  text-shadow: 0 1px 6px rgba(0,0,0,0.4);
}

/* ───── MBTI SLIDE 2: PRESCRIPTION ───── */
.mk-rx { background: var(--cream); padding: 72px 44px 72px; }
.mk-rx .rx-sub {
  text-align: center; font-family: 'Noto Serif KR', serif;
  font-weight: 300; font-size: 15px; color: var(--dark);
  letter-spacing: 0.04em; margin-bottom: 6px;
}
.mk-rx .rx-sub em {
  font-family: 'Playfair Display', serif; font-style: italic;
  color: var(--muted); margin-left: 6px;
}
.mk-rx .rx-label {
  font-family: 'Playfair Display', serif;
  font-size: 10px; letter-spacing: 0.32em; color: var(--gold);
  text-align: center; margin-bottom: 10px; text-transform: uppercase;
}
.mk-rx .rx-title {
  font-family: 'Noto Serif KR', serif;
  font-weight: 300; font-size: 26px; line-height: 1.35;
  text-align: center; color: var(--dark); letter-spacing: 0.02em;
}
.mk-rx .rx-title-quote { color: var(--muted); opacity: 0.7; }
.mk-rx .rx-title em {
  color: var(--orange); font-style: normal; font-weight: 500;
  display: block; margin-top: 2px;
}
.mk-rx .rx-divider {
  width: 48px; height: 0; border-top: 1px solid var(--gold);
  margin: 16px auto; opacity: 0.6;
}
.mk-rx .rx-quote {
  font-family: 'Noto Serif KR', serif;
  font-weight: 300; font-style: italic; font-size: 12px;
  line-height: 1.65; color: var(--dark);
  text-align: left; margin-bottom: 20px; padding: 12px 14px 12px 18px;
  background: var(--beige); border-left: 2px solid var(--orange);
  border-radius: 4px; position: relative;
}
.mk-rx .rx-cols {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.mk-rx .rx-col { padding: 12px; border-radius: 6px; }
.mk-rx .rx-col.good { background: rgba(143,174,106,0.12); border: 1px solid rgba(143,174,106,0.35); }
.mk-rx .rx-col.bad { background: rgba(220,100,80,0.1); border: 1px solid rgba(220,100,80,0.35); }
.mk-rx .rx-col-title {
  font-size: 12px; font-weight: 700; margin-bottom: 8px;
  text-align: center; letter-spacing: 0.05em;
  padding-bottom: 5px; border-bottom: 1px solid currentColor; opacity: 0.9;
}
.mk-rx .rx-col.good .rx-col-title { color: var(--ok); }
.mk-rx .rx-col.bad .rx-col-title { color: var(--ng); }
.mk-rx .rx-item {
  font-size: 10.5px; line-height: 1.8; color: var(--dark);
  display: flex; align-items: flex-start; gap: 5px;
}
.mk-rx .rx-item::before { font-weight: 700; flex-shrink: 0; font-size: 10px; }
.mk-rx .rx-col.good .rx-item::before { content: '✓'; color: var(--ok); }
.mk-rx .rx-col.bad .rx-item::before { content: '✗'; color: var(--ng); }

/* ───── PRAKRITI SLIDE: TRIANGLE + LIFESTYLE ───── */
.mk-dosha { background: linear-gradient(180deg, #F5EDE0 0%, #EEE0CC 100%); padding: 66px 40px 66px; }
.mk-dosha .d-label {
  font-family: 'Playfair Display', serif;
  font-size: 9.5px; letter-spacing: 0.32em;
  text-align: center; text-transform: uppercase;
  margin-bottom: 3px;
}
.mk-dosha .d-title {
  font-family: 'Noto Serif KR', serif; font-weight: 300;
  font-size: 13px; color: var(--dark);
  text-align: center; letter-spacing: 0.08em; margin-bottom: 4px;
}
.mk-dosha .d-name {
  font-family: 'Noto Serif KR', serif; font-weight: 400;
  font-size: 26px; text-align: center; letter-spacing: 0.06em;
}
.mk-dosha .d-name-en {
  font-family: 'Playfair Display', serif;
  font-size: 10px; letter-spacing: 0.42em;
  color: var(--muted); text-align: center;
  margin-top: 3px; text-transform: uppercase;
}
.mk-dosha .triangle-wrap {
  width: 190px; height: 160px;
  margin: 8px auto 4px; position: relative;
}
.mk-dosha .d-comment {
  font-family: 'Noto Serif KR', serif;
  font-weight: 300; font-style: italic;
  font-size: 10.5px; line-height: 1.55;
  color: var(--dark); text-align: center;
  padding: 6px 12px 0;
  border-top: 1px solid rgba(212,160,74,0.3);
  margin: 6px 24px 10px;
}
.mk-dosha .d-cols {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.mk-dosha .d-col { padding: 10px 12px 12px; border-radius: 6px; }
.mk-dosha .d-col.good { background: rgba(143,174,106,0.15); border: 1px solid rgba(143,174,106,0.4); }
.mk-dosha .d-col.bad { background: rgba(220,100,80,0.1); border: 1px solid rgba(220,100,80,0.35); }
.mk-dosha .d-col-title {
  font-size: 11px; font-weight: 700; margin-bottom: 6px;
  text-align: center; letter-spacing: 0.05em;
  padding-bottom: 4px; border-bottom: 1px solid currentColor;
  opacity: 0.9;
}
.mk-dosha .d-col.good .d-col-title { color: var(--ok); }
.mk-dosha .d-col.bad .d-col-title { color: var(--ng); }
.mk-dosha .d-item {
  font-size: 9.5px; line-height: 1.7; color: var(--dark);
  display: flex; align-items: flex-start; gap: 4px;
}
.mk-dosha .d-item::before { font-weight: 700; flex-shrink: 0; font-size: 9px; }
.mk-dosha .d-col.good .d-item::before { content: '✓'; color: var(--ok); }
.mk-dosha .d-col.bad .d-item::before { content: '✗'; color: var(--ng); }

/* ───── FRAGRANCE SLIDE ───── */
.mk-fr { background: linear-gradient(180deg, #FFF8F0 0%, #F5EDE0 100%); padding: 72px 44px 72px; }
.mk-fr .fr-label {
  font-family: 'Playfair Display', serif;
  font-size: 10px; letter-spacing: 0.34em;
  text-align: center; text-transform: uppercase; margin-bottom: 4px;
}
.mk-fr .fr-title {
  font-family: 'Noto Serif KR', serif; font-weight: 300;
  font-size: 15px; text-align: center;
  letter-spacing: 0.06em; margin-bottom: 6px;
}
.mk-fr .fr-divider {
  width: 44px; height: 0; border-top: 1px solid;
  margin: 12px auto; opacity: 0.6;
}
.mk-fr .fr-flower-wrap {
  text-align: center; margin-top: 16px; position: relative;
  height: 160px; display: flex; align-items: center; justify-content: center;
}
.mk-fr .fr-flower {
  width: 130px; height: 130px; object-fit: cover;
  border-radius: 50%;
  filter: drop-shadow(0 4px 16px rgba(212,160,74,0.22));
  z-index: 2; position: relative;
}
.mk-fr .fr-flower-ring {
  width: 140px; height: 140px; border-radius: 50%;
  border: 1px solid; opacity: 0.25;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.mk-fr .fr-name {
  font-family: 'Noto Serif KR', serif; font-weight: 400;
  font-size: 32px; color: var(--dark);
  text-align: center; margin-top: 14px; letter-spacing: 0.02em;
}
.mk-fr .fr-name-en {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 16px; color: var(--muted);
  text-align: center; margin-top: 4px; letter-spacing: 0.08em;
}
.mk-fr .fr-desc {
  font-family: 'Noto Serif KR', serif;
  font-weight: 300; font-style: italic;
  font-size: 12px; line-height: 1.7;
  color: var(--dark); text-align: center;
  padding: 0 12px; margin-top: 16px;
}
.mk-fr .fr-pk-tag {
  display: inline-block;
  background: rgba(212,160,74,0.1); border: 1px solid rgba(212,160,74,0.3);
  padding: 4px 12px; border-radius: 3px;
  font-size: 9px; letter-spacing: 0.15em;
  color: var(--muted); margin-top: 14px; text-transform: uppercase;
}
.mk-fr .fr-tag-wrap { text-align: center; }
</style>
</head>
<body>

<div class="page-header">
  <h1>SKIN MBTI TEMPLATES</h1>
  <div class="sub">INDEPENDENT TEMPLATES · MIX & MATCH</div>
  <div class="kr">
    <strong>MBTI 16</strong> × <strong>프라크리티 9</strong> × <strong>향기 16</strong> = 총 <strong>41개 독립 템플릿</strong><br>
    고객의 테스트 결과에 따라 원장님이 자유롭게 조합 (4장 1세트)
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="mbti">MBTI 템플릿 <span>16</span></button>
  <button class="tab-btn" data-tab="prakriti">프라크리티 템플릿 <span>9</span></button>
  <button class="tab-btn" data-tab="fragrance">향기 템플릿 <span>16</span></button>
</div>

<!-- ══════════ MBTI TAB ══════════ -->
<div class="tab-content active" id="tab-mbti">
  <div class="controls">
    <label>MBTI 선택:</label>
    <select id="mbtiSelect"></select>
    <button class="btn-secondary" onclick="mbtiChange(-1)">← 이전</button>
    <button class="btn-secondary" onclick="mbtiChange(1)">다음 →</button>
    <button class="btn-primary" onclick="mbtiDownloadCurrent()">현재 MBTI 2장 PNG</button>
    <button class="btn-all" onclick="mbtiDownloadAll()">전체 32장 (16×2)</button>
    <span class="progress" id="mbtiProgress"></span>
  </div>
  <div class="template-set" id="mbtiSet"></div>
</div>

<!-- ══════════ PRAKRITI TAB ══════════ -->
<div class="tab-content" id="tab-prakriti">
  <div class="controls">
    <label>프라크리티 선택:</label>
    <select id="prakritiSelect"></select>
    <button class="btn-secondary" onclick="prakritiChange(-1)">← 이전</button>
    <button class="btn-secondary" onclick="prakritiChange(1)">다음 →</button>
    <button class="btn-primary" onclick="prakritiDownloadCurrent()">현재 프라크리티 PNG</button>
    <button class="btn-all" onclick="prakritiDownloadAll()">전체 9장</button>
    <span class="progress" id="prakritiProgress"></span>
  </div>
  <div class="template-set" id="prakritiSet"></div>

/* Triangle chart (prakriti visualization) */
function renderTriangle(code) {
  const b = BALANCE[code] || { V:33, P:33, K:33 };
  const color = PRAKRITI_COLORS[code] || '#E8703A';
  const vx = 160, vy = 50;
  const px = 40, py = 250;
  const kx = 280, ky = 250;
  const total = b.V + b.P + b.K;
  const dotX = (vx * b.V + px * b.P + kx * b.K) / total;
  const dotY = (vy * b.V + py * b.P + ky * b.K) / total;
  const vBg={V:'#F5D6D3',P:'#CDDCE8',K:'#CDDFC8'}, vStr={V:'#D98782',P:'#6B8AA9',K:'#7CA06F'};
  const lbl = (cx,cy,nm,sb,k) => {
    const w=56,h=38;
    return `<rect x="${cx-w/2}" y="${cy-h/2}" width="${w}" height="${h}" rx="4" fill="${vBg[k]}" stroke="${vStr[k]}" stroke-width="0.8"/>
      <text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Pretendard" font-size="11" font-weight="700" fill="${vStr[k]}">${nm}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="Pretendard" font-size="9" fill="${vStr[k]}" opacity="0.85">${sb}</text>`;
  };
  return `<svg viewBox="0 0 320 280" style="width:100%;height:100%;">
    <defs><linearGradient id="triG-${code}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.12"/><stop offset="100%" stop-color="${color}" stop-opacity="0.03"/>
    </linearGradient></defs>
    <polygon points="${vx},${vy} ${kx},${ky} ${px},${py}" fill="url(#triG-${code})" stroke="#D4A04A" stroke-width="1.2"/>
    <line x1="${vx}" y1="${vy}" x2="${(px+kx)/2}" y2="${(py+ky)/2}" stroke="#D4A04A" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.35"/>
    <line x1="${px}" y1="${py}" x2="${(vx+kx)/2}" y2="${(vy+ky)/2}" stroke="#D4A04A" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.35"/>
    <line x1="${kx}" y1="${ky}" x2="${(vx+px)/2}" y2="${(vy+py)/2}" stroke="#D4A04A" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.35"/>
    <circle cx="${dotX}" cy="${dotY}" r="18" fill="none" stroke="${color}" stroke-width="1" opacity="0.2"/>
    <circle cx="${dotX}" cy="${dotY}" r="11" fill="none" stroke="${color}" stroke-width="1" opacity="0.45"/>
    <circle cx="${dotX}" cy="${dotY}" r="6" fill="${color}"/>
    ${lbl(vx,vy-8,'바타','순기','V')}${lbl(px+10,py+8,'피타','진정','P')}${lbl(kx-10,ky+8,'카파','순환','K')}
  </svg>`;
}

/* ══════════════════════════════════════════════════════
   DOWNLOAD (540×675 @ scale:2 = 1080×1350 4:5 Feed)
   ══════════════════════════════════════════════════════ */
async function dl(id, filename) {
  const el = document.getElementById(id);
  const canvas = await html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true, logging: false, width: 540, height: 675 });
  const link = document.createElement('a');
  link.download = `${filename}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function mbtiDownloadCurrent() {
  const t = MBTI_TYPES[mbtiIndex];
  await dl('m-1', `MBTI_${t.code}_01_cover`);
  await new Promise(r => setTimeout(r, 200));
  await dl('m-2', `MBTI_${t.code}_02_prescription`);
}
async function mbtiDownloadAll() {
  const prog = document.getElementById('mbtiProgress');
  for (let i = 0; i < MBTI_TYPES.length; i++) {
    mbtiIndex = i; mbtiSelect.value = i; renderMbti(i);
    await new Promise(r => setTimeout(r, 300));
    prog.textContent = `${i+1}/${MBTI_TYPES.length} · ${MBTI_TYPES[i].code}`;
    await mbtiDownloadCurrent();
  }
  prog.textContent = '완료! 32장 다운로드됨';
  setTimeout(() => prog.textContent = '', 3000);
}

  const p = PRAKRITI_TYPES[prakritiIndex];

}
async function prakritiDownloadAll() {
  const prog = document.getElementById('prakritiProgress');
  for (let i = 0; i < PRAKRITI_TYPES.length; i++) {
    prakritiIndex = i; prakritiSelect.value = i; renderPrakriti(i);
    await new Promise(r => setTimeout(r, 300));
    prog.textContent = `${i+1}/${PRAKRITI_TYPES.length} · ${PRAKRITI_TYPES[i].code}`;
    await prakritiDownloadCurrent();
    await new Promise(r => setTimeout(r, 200));
  }
  prog.textContent = '완료! 9장 다운로드됨';
  setTimeout(() => prog.textContent = '', 3000);
}

async function fragranceDownloadCurrent() {
  const f = FRAGRANCE_TYPES[fragranceIndex];
  await dl('f-1', `FRAGRANCE_${f.nameEn.replace(/\s/g,'')}`);
}
async function fragranceDownloadAll() {
  const prog = document.getElementById('fragranceProgress');
  for (let i = 0; i < FRAGRANCE_TYPES.length; i++) {
    fragranceIndex = i; fragranceSelect.value = i; renderFragrance(i);
    await new Promise(r => setTimeout(r, 300));
    prog.textContent = `${i+1}/${FRAGRANCE_TYPES.length} · ${FRAGRANCE_TYPES[i].nameKo}`;
    await fragranceDownloadCurrent();
    await new Promise(r => setTimeout(r, 200));
  }
  prog.textContent = '완료! 16장 다운로드됨';
  setTimeout(() => prog.textContent = '', 3000);
}
