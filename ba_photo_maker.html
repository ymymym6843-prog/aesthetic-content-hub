<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AESTHETIC - B&A 비교사진 메이커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/fonts-archive/MaruBuri/MaruBuri.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8703A; --orange-light: #F5A070;
    --cream: #FFF8F0; --warm-beige: #F5EDE0;
    --dark: #3D2E24; --dark-mid: #3D2E24;
    --text-muted: #9B8A7A; --warm-bg: #FAF6F1;
    --gold: #D4A04A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    background: var(--warm-bg); color: var(--dark); min-height: 100vh;
    word-break: keep-all; overflow-wrap: break-word;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,112,58,0.06), transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(232,112,58,0.04), transparent 50%);
    pointer-events: none;
  }

  /* ===== PAGE HEADER ===== */
  .page-header {
    background: #FFF8F0;
    padding: 40px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(232,112,58,0.12);
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(232,112,58,0.06) 0%, transparent 70%),
      radial-gradient(ellipse at 70% 50%, rgba(232,112,58,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E8703A, transparent);
  }
  .page-header h1 {
    font-family: 'Pretendard', system-ui, sans-serif;
    font-size: 32px; font-weight: 700;
    color: #3D2E24;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .page-header p {
    color: #9B8A7A;
    font-size: 13px;
    letter-spacing: 2px;
    position: relative; z-index: 1;
  }

  .app { display: flex; min-height: calc(100vh - 140px); }

  /* Editor */
  .editor {
    width: 380px; flex-shrink: 0;
    background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
    border-right: 1px solid rgba(232,112,58,0.08);
    padding: 36px 28px; overflow-y: auto; max-height: calc(100vh - 140px);
    position: sticky; top: 0;
  }
  .editor h1 { font-family: 'Pretendard', system-ui, sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .editor .sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }

  .section-label {
    font-size: 10px; font-weight: 800; color: var(--orange);
    letter-spacing: 3px; text-transform: uppercase;
    margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(232,112,58,0.1);
  }

  /* Upload */
  .upload-group { margin-bottom: 16px; }
  .upload-group-label { font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 6px; letter-spacing: 1px; }
  .upload-box {
    border: 2px dashed rgba(232,112,58,0.2); border-radius: 16px;
    padding: 24px 16px; text-align: center; cursor: pointer;
    transition: all 0.3s; min-height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    background: rgba(255,255,255,0.5); position: relative;
  }
  .upload-box:hover { border-color: var(--orange); background: rgba(232,112,58,0.03); }
  .upload-box.has-image { border-style: solid; padding: 6px; }
  .upload-box .label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
  .upload-box .hint { font-size: 10px; color: #bbb; }
  .upload-box img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; }
  .upload-box input { display: none; }
  .remove-btn {
    display: inline-block; margin-top: 4px; padding: 4px 12px;
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    border: 1px solid rgba(232,112,58,0.2); border-radius: 6px;
    background: transparent; cursor: pointer; transition: all 0.2s;
  }
  .remove-btn:hover { border-color: #e55; color: #e55; }

  /* Zoom controls */
  .zoom-controls {
    display: none; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px;
  }
  .zoom-controls.visible { display: flex; }
  .zoom-controls label { font-size: 10px; font-weight: 700; color: var(--dark); white-space: nowrap; }
  .zoom-controls input[type=range] { width: 70px; accent-color: #E8703A; }
  .zoom-controls span { font-size: 10px; min-width: 30px; }
  .zoom-controls button {
    font-size: 10px; padding: 3px 10px; border-radius: 4px;
    border: 1px solid #E8E2DA; background: #fff; color: #9B8A7A; cursor: pointer;
  }

  /* Toggle buttons */
  .toggle-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .toggle-btn {
    flex: 1; min-width: 80px; padding: 10px 8px; border: 1.5px solid rgba(232,112,58,0.15);
    border-radius: 10px; background: #fff; font-family: inherit;
    font-size: 11px; font-weight: 700; color: var(--dark-mid);
    cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .toggle-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .toggle-btn:hover:not(.active) { border-color: var(--orange-light); }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #5D544D; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; padding: 10px 14px; border: 1px solid rgba(44,24,16,0.1);
    border-radius: 12px; font-size: 13px; font-family: inherit; background: #fff;
    transition: all 0.2s;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,112,58,0.1);
  }

  /* Checkbox toggle */
  .check-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .check-row input[type=checkbox] { accent-color: var(--orange); width: 16px; height: 16px; }
  .check-row label { font-size: 12px; font-weight: 600; color: #5D544D; cursor: pointer; }

  .btn-export {
    width: 100%; padding: 16px; margin-top: 16px;
    background: linear-gradient(135deg, var(--orange), #D4612E);
    color: #fff; border: none; border-radius: 16px;
    font-size: 15px; font-weight: 800; font-family: inherit;
    cursor: pointer; transition: all 0.3s;
  }
  .btn-export:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,112,58,0.35); }

  /* Preview */
  .preview-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px; position: relative;
  }
  .preview-wrapper {
    box-shadow: 0 12px 48px rgba(26,20,16,0.12); border-radius: 4px; overflow: hidden;
    position: relative;
  }
  .preview-wrapper canvas {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 200px);
    height: auto;
  }

  /* Slider handle overlay on preview */
  .slider-handle-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    cursor: ew-resize; display: none;
    pointer-events: none;
  }

  /* AutoSave Toast */
  .autosave-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #3D2E24; color: #FFF8F0; padding: 12px 24px; border-radius: 30px;
    font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .autosave-toast.show { opacity: 1; }

  /* ---- Server Load Modal ---- */
  .modal-overlay {
    position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:10000;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-content {
    background:#FFF8F0;border-radius:16px;width:360px;max-height:70vh;
    overflow:hidden;box-shadow:0 20px 60px rgba(61,46,36,0.15);
  }
  .modal-header {
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid rgba(232,112,58,0.1);
  }
  .modal-header h3 { font-size:16px;font-weight:700;color:#3D2E24;margin:0; }
  .modal-body { max-height:50vh;overflow-y:auto; }
  .session-item:hover { background:rgba(232,112,58,0.04); }

  /* ===== Font Panel ===== */
  .font-panel-toggle {
    width:100%;padding:10px 14px;border:1.5px solid rgba(232,112,58,0.15);
    border-radius:12px;background:#fff;font-family:inherit;font-size:12px;
    font-weight:700;color:var(--dark);cursor:pointer;text-align:left;
    display:flex;align-items:center;justify-content:space-between;
    transition:all 0.2s;margin-bottom:8px;
  }
  .font-panel-toggle:hover{border-color:var(--orange);}
  .font-panel-toggle .arrow{font-size:10px;color:var(--text-muted);transition:transform 0.2s;}
  .font-panel-toggle.open .arrow{transform:rotate(180deg);}
  .font-panel-body{display:none;border:1px solid rgba(232,112,58,0.1);border-radius:12px;padding:14px;background:rgba(255,255,255,0.7);margin-bottom:12px;}
  .font-panel-body.open{display:block;}
  .font-tier{margin-bottom:14px;}
  .font-tier:last-child{margin-bottom:0;}
  .font-tier-label{font-size:10px;font-weight:800;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .font-tier select,.font-tier input[type=range]{
    width:100%;padding:6px 10px;border:1px solid rgba(44,24,16,0.1);
    border-radius:8px;font-size:12px;font-family:inherit;background:#fff;
    margin-bottom:4px;
  }
  .font-tier .weight-row{display:flex;align-items:center;gap:6px;}
  .font-tier .weight-row input{flex:1;}
  .font-tier .weight-row span{font-size:10px;color:var(--text-muted);min-width:28px;text-align:right;}
  .font-reset-btn{
    width:100%;padding:8px;border:1px solid rgba(232,112,58,0.2);border-radius:8px;
    background:transparent;color:var(--text-muted);font-size:11px;font-weight:600;
    font-family:inherit;cursor:pointer;margin-top:4px;
  }
  .font-reset-btn:hover{border-color:var(--orange);color:var(--orange);}

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .editor { width: 100%; max-height: none; position: static; }
    .preview-area { padding: 20px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>B&amp;A Photo Maker</h1>
  <p>IM AESTHETIC · 시술 전후 비교사진 제작</p>
</div>

<div class="app">
  <div class="editor">
    <h1>B&amp;A Photo</h1>
    <p class="sub">시술 전후 비교사진 제작 · PNG 내보내기</p>

    <!-- Photo Uploads -->
    <div class="section-label">Before 사진</div>
    <div class="upload-group">
      <div class="upload-box" id="beforeBox" onclick="document.getElementById('beforeInput').click()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9B8A7A" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <span class="label">BEFORE 사진</span>
        <span class="hint">클릭 또는 드래그하여 업로드</span>
        <input type="file" id="beforeInput" accept="image/*" onchange="handlePhoto('before', this)">
      </div>
      <div class="zoom-controls" id="beforeZoom">
        <label>줌</label>
        <input type="range" min="50" max="200" value="100" oninput="setPhotoZoom('before', this.value)" id="beforeZoomRange">
        <span id="beforeZoomVal">100%</span>
        <button onclick="resetPhotoPos('before')">위치 초기화</button>
      </div>
      <div id="beforeRemoveWrap" style="display:none;margin-top:4px">
        <button class="remove-btn" onclick="removePhoto('before')">이미지 제거</button>
      </div>
    </div>

    <div class="section-label">After 사진</div>
    <div class="upload-group">
      <div class="upload-box" id="afterBox" onclick="document.getElementById('afterInput').click()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9B8A7A" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <span class="label">AFTER 사진</span>
        <span class="hint">클릭 또는 드래그하여 업로드</span>
        <input type="file" id="afterInput" accept="image/*" onchange="handlePhoto('after', this)">
      </div>
      <div class="zoom-controls" id="afterZoom">
        <label>줌</label>
        <input type="range" min="50" max="200" value="100" oninput="setPhotoZoom('after', this.value)" id="afterZoomRange">
        <span id="afterZoomVal">100%</span>
        <button onclick="resetPhotoPos('after')">위치 초기화</button>
      </div>
      <div id="afterRemoveWrap" style="display:none;margin-top:4px">
        <button class="remove-btn" onclick="removePhoto('after')">이미지 제거</button>
      </div>
    </div>

    <!-- Layout -->
    <div class="section-label">레이아웃</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-layout="side" onclick="setLayout('side')">좌우 비교</button>
      <button class="toggle-btn" data-layout="topbottom" onclick="setLayout('topbottom')">상하 비교</button>
      <button class="toggle-btn" data-layout="slider" onclick="setLayout('slider')">슬라이더</button>
    </div>

    <!-- Slider position (only for slider layout) -->
    <div id="sliderPosWrap" style="display:none" class="field">
      <label>슬라이더 위치</label>
      <input type="range" min="10" max="90" value="50" id="sliderPosRange"
             oninput="state.sliderPos=parseInt(this.value);renderPreview();autoSave()"
             style="accent-color:#E8703A">
    </div>

    <!-- Size -->
    <div class="section-label">사이즈</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-size="feed" onclick="setSize('feed')">피드 4:5</button>
      <button class="toggle-btn" data-size="story" onclick="setSize('story')">스토리 9:16</button>
    </div>

    <!-- Labels -->
    <div class="section-label">라벨 정보</div>
    <div class="field">
      <label>회차 번호 (선택)</label>
      <input type="text" id="inputSession" placeholder="예: 3회차" oninput="renderPreview();autoSave()">
    </div>
    <div class="field">
      <label>담당 원장 (선택)</label>
      <input type="text" id="inputDirector" placeholder="예: 유수정 원장" oninput="renderPreview();autoSave()">
    </div>
    <div class="field">
      <label>날짜 (선택)</label>
      <input type="text" id="inputDate" placeholder="예: 2026.03" oninput="renderPreview();autoSave()">
    </div>
    <div class="field">
      <label>시술명 (선택)</label>
      <input type="text" id="inputTreatment" placeholder="예: 쫀쫀 수기 모공 lock 케어" oninput="renderPreview();autoSave()">
    </div>

    <div class="check-row">
      <input type="checkbox" id="showBrand" checked onchange="renderPreview();autoSave()">
      <label for="showBrand">브랜드 워터마크 (IM AESTHETIC)</label>
    </div>

    <button onclick="resetLabelPositions()" style="width:100%;padding:10px;border-radius:10px;border:1px solid rgba(232,112,58,0.2);background:transparent;color:#9B8A7A;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:12px;transition:all 0.2s" onmouseover="this.style.borderColor='#E8703A';this.style.color='#E8703A'" onmouseout="this.style.borderColor='rgba(232,112,58,0.2)';this.style.color='#9B8A7A'">라벨 위치 초기화</button>

    <div class="section-label">라벨 스타일</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-lstyle="badge" onclick="setLabelStyle('badge')">뱃지</button>
      <button class="toggle-btn" data-lstyle="minimal" onclick="setLabelStyle('minimal')">미니멀</button>
      <button class="toggle-btn" data-lstyle="none" onclick="setLabelStyle('none')">없음</button>
    </div>

    <!-- Font Panel -->
    <div class="section-label">폰트 설정</div>
    <div id="fontPanelHost"></div>

    <button class="btn-export" onclick="exportBA()">PNG 내보내기</button>
    <button onclick="clearSaved()" style="padding:12px 24px;border-radius:12px;border:1px solid rgba(232,112,58,0.3);background:transparent;color:#9B8A7A;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;width:100%">새로 시작</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="serverSave()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #E8703A;background:rgba(232,112,58,0.05);color:#E8703A;font-size:13px;font-weight:600;cursor:pointer">서버에 저장</button>
      <button onclick="serverLoad()" style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(232,112,58,0.3);background:transparent;color:#9B8A7A;font-size:13px;font-weight:600;cursor:pointer">불러오기</button>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-wrapper" id="previewWrapper">
      <canvas id="baCanvas" width="1080" height="1350"></canvas>
      <div class="slider-handle-overlay" id="sliderOverlay"></div>
    </div>
  </div>
</div>

<div class="autosave-toast" id="autoToast"></div>

<script>
// ===== State =====
const SIZES = {
  feed:  { w: 1080, h: 1350, label: '1080x1350' },
  story: { w: 1080, h: 1920, label: '1080x1920' }
};

let state = {
  layout: 'side',       // side | topbottom | slider
  size: 'feed',
  labelStyle: 'badge',  // badge | minimal | none
  sliderPos: 50,
  before: { img: null, zoom: 100, offX: 0, offY: 0 },
  after:  { img: null, zoom: 100, offX: 0, offY: 0 }
};

// ===== Label Drag State =====
const labelPositions = {
  beforeBadge: { x: null, y: null },
  afterBadge:  { x: null, y: null },
  info:        { x: null, y: null },
  brand:       { x: null, y: null },
  treatmentName: { x: null, y: null }
};
const labelBounds = {};

function getLabelPos(key, defaultX, defaultY) {
  const p = labelPositions[key];
  return {
    x: p.x !== null ? p.x : defaultX,
    y: p.y !== null ? p.y : defaultY
  };
}

// Loaded Image objects (not serialized)
let beforeImg = null;
let afterImg = null;

// ===== Photo Upload =====
function handlePhoto(which, input) {
  const file = input.files[0];
  if (!file) return;
  loadPhotoFile(which, file);
}

function loadPhotoFile(which, file) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      if (which === 'before') beforeImg = img;
      else afterImg = img;

      // Update thumbnail
      const box = document.getElementById(which + 'Box');
      box.classList.add('has-image');
      box.innerHTML = `<img src="${img.src}" alt="${which}"><input type="file" id="${which}Input" accept="image/*" onchange="handlePhoto('${which}', this)">`;

      // Show controls
      document.getElementById(which + 'Zoom').classList.add('visible');
      document.getElementById(which + 'RemoveWrap').style.display = 'block';

      renderPreview();
      autoSave();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(which) {
  if (which === 'before') beforeImg = null;
  else afterImg = null;
  state[which].zoom = 100;
  state[which].offX = 0;
  state[which].offY = 0;

  const box = document.getElementById(which + 'Box');
  box.classList.remove('has-image');
  box.innerHTML = `
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9B8A7A" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <span class="label">${which.toUpperCase()} 사진</span>
    <span class="hint">클릭 또는 드래그하여 업로드</span>
    <input type="file" id="${which}Input" accept="image/*" onchange="handlePhoto('${which}', this)">`;

  document.getElementById(which + 'Zoom').classList.remove('visible');
  document.getElementById(which + 'RemoveWrap').style.display = 'none';
  document.getElementById(which + 'ZoomRange').value = 100;
  document.getElementById(which + 'ZoomVal').textContent = '100%';

  renderPreview();
  autoSave();
}

function setPhotoZoom(which, val) {
  state[which].zoom = parseInt(val, 10);
  document.getElementById(which + 'ZoomVal').textContent = val + '%';
  renderPreview();
  autoSave();
}

function resetPhotoPos(which) {
  state[which].offX = 0;
  state[which].offY = 0;
  renderPreview();
  autoSave();
}

// ===== Drag & Drop for upload boxes =====
['before', 'after'].forEach(which => {
  const box = document.getElementById(which + 'Box');
  box.addEventListener('dragover', e => { e.preventDefault(); box.style.borderColor = '#E8703A'; });

// ===== Layout / Size / Label Style =====
function setLayout(layout) {

    b.classList.toggle('active', b.dataset.layout === layout));

  document.getElementById('sliderOverlay').style.display = layout === 'slider' ? 'block' : 'none';

}

function setSize(size) {

    b.classList.toggle('active', b.dataset.size === size));

function setLabelStyle(style) {

// ===== Canvas Rendering =====
const canvas = document.getElementById('baCanvas');
const ctx = canvas.getContext('2d');

function renderPreview() {
  const sz = SIZES[state.size];
  canvas.width = sz.w;
  canvas.height = sz.h;

  // Background
  ctx.fillStyle = '#FFF8F0';
  ctx.fillRect(0, 0, sz.w, sz.h);

  const gap = 6;

  if (state.layout === 'side') {
    const halfW = (sz.w - gap) / 2;
    drawPhoto(ctx, beforeImg, state.before, 0, 0, halfW, sz.h);
    drawPhoto(ctx, afterImg, state.after, halfW + gap, 0, halfW, sz.h);
    // Gap line
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(halfW, 0, gap, sz.h);
    // Labels
    drawBALabels(ctx, 0, halfW + gap, 0, 0, halfW, halfW);
  } else if (state.layout === 'topbottom') {
    const halfH = (sz.h - gap) / 2;
    drawPhoto(ctx, beforeImg, state.before, 0, 0, sz.w, halfH);
    drawPhoto(ctx, afterImg, state.after, 0, halfH + gap, sz.w, halfH);
    // Gap line
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, halfH, sz.w, gap);
    // Labels
    drawBALabels(ctx, 0, 0, 0, halfH + gap, sz.w, sz.w);
  } else {
    // Slider
    const splitX = Math.round(sz.w * state.sliderPos / 100);
    // Draw After full
    drawPhoto(ctx, afterImg, state.after, 0, 0, sz.w, sz.h);
    // Draw Before clipped to left of split
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, splitX, sz.h);
    ctx.clip();
    drawPhoto(ctx, beforeImg, state.before, 0, 0, sz.w, sz.h);
    ctx.restore();
    // Split line
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(splitX, 0);
    ctx.lineTo(splitX, sz.h);
    ctx.stroke();
    // Circle handle
    const cy = sz.h / 2;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(splitX, cy, 24, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(232,112,58,0.6)';
    ctx.lineWidth = 3;
    ctx.stroke();
    // Arrows in circle
    ctx.fillStyle = '#E8703A';
    ctx.beginPath();
    ctx.moveTo(splitX - 12, cy); ctx.lineTo(splitX - 4, cy - 6); ctx.lineTo(splitX - 4, cy + 6);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(splitX + 12, cy); ctx.lineTo(splitX + 4, cy - 6); ctx.lineTo(splitX + 4, cy + 6);
    ctx.fill();
    // Labels for slider
    drawBALabels(ctx, 40, splitX + 40, 0, 0, splitX - 40, sz.w - splitX - 40);
  }

  // Treatment name overlay
  drawTreatmentName(ctx, sz);

  // Bottom info area
  drawInfoBar(ctx, sz);

  // Brand watermark
  if (document.getElementById('showBrand').checked) {
    drawBrand(ctx, sz);
  }
}

function drawPhoto(ctx, img, photoState, dx, dy, dw, dh) {
  if (!img) {
    // Placeholder
    ctx.fillStyle = '#F5EDE0';
    ctx.fillRect(dx, dy, dw, dh);
    ctx.fillStyle = '#9B8A7A';
    ctx.font = "400 28px 'Pretendard', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('사진을 업로드하세요', dx + dw / 2, dy + dh / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    return;
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(dx, dy, dw, dh);
  ctx.clip();

  const scale = photoState.zoom / 100;
  const imgRatio = img.naturalWidth / img.naturalHeight;
  const destRatio = dw / dh;

  let drawW, drawH;
  if (imgRatio > destRatio) {
    // Image wider: fit by height, crop width
    drawH = dh * scale;
    drawW = drawH * imgRatio;
  } else {
    // Image taller: fit by width, crop height
    drawW = dw * scale;
    drawH = drawW / imgRatio;
  }

  const x = dx + (dw - drawW) / 2 + photoState.offX * scale;
  const y = dy + (dh - drawH) / 2 + photoState.offY * scale;

  ctx.drawImage(img, x, y, drawW, drawH);
  ctx.restore();
}

function drawBALabels(ctx, beforeX, afterX, beforeY, afterY, beforeW, afterW) {
  if (state.labelStyle === 'none') return;

  const titleCSS = getFontCSS('title');

  if (state.labelStyle === 'badge') {
    const defBX = beforeX + 36, defBY = (beforeY || 0) + 40;
    const defAX = afterX + 36, defAY = (afterY || 0) + 40;
    const bPos = getLabelPos('beforeBadge', defBX, defBY);
    const aPos = getLabelPos('afterBadge', defAX, defAY);
    drawBadge(ctx, 'BEFORE', bPos.x, bPos.y, 'beforeBadge', '#9B8A7A');
    drawBadge(ctx, 'AFTER', aPos.x, aPos.y, 'afterBadge', '#E8703A');
  } else {
    // Minimal style
    const fontSize = Math.round(24 * (titleCSS.sizeMul || 1));
    ctx.font = `700 ${fontSize}px ${titleCSS.family}`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const defBX = beforeX + 36, defBY = (beforeY || 0) + 40;
    const defAX = afterX + 36, defAY = (afterY || 0) + 40;
    const bPos = getLabelPos('beforeBadge', defBX, defBY);
    const aPos = getLabelPos('afterBadge', defAX, defAY);

    // Before label with shadow (gray tone)
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillText('BEFORE', bPos.x + 1, bPos.y + 1);
    ctx.fillStyle = 'rgba(155,138,122,0.9)';
    ctx.fillText('BEFORE', bPos.x, bPos.y);
    const bMetrics = ctx.measureText('BEFORE');
    labelBounds.beforeBadge = { x: bPos.x, y: bPos.y, w: bMetrics.width, h: fontSize };

    // After label — orange
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillText('AFTER', aPos.x + 1, aPos.y + 1);
    ctx.fillStyle = '#E8703A';
    ctx.fillText('AFTER', aPos.x, aPos.y);
    const aMetrics = ctx.measureText('AFTER');
    labelBounds.afterBadge = { x: aPos.x, y: aPos.y, w: aMetrics.width, h: fontSize };

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }
}

function drawBadge(ctx, text, x, y, boundsKey, bgColor) {
  const titleCSS = getFontCSS('title');
  const fontSize = Math.round(24 * (titleCSS.sizeMul || 1));
  ctx.font = `800 ${fontSize}px ${titleCSS.family}`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const metrics = ctx.measureText(text);
  const pw = 24, ph = 10;
  const bw = metrics.width + pw * 2;
  const bh = fontSize + ph * 2;
  const br = bh / 2;

  // Pill background
  ctx.fillStyle = bgColor || '#E8703A';
  ctx.beginPath();
  ctx.moveTo(x + br, y);
  ctx.lineTo(x + bw - br, y);
  ctx.arc(x + bw - br, y + bh / 2, br, -Math.PI / 2, Math.PI / 2);
  ctx.lineTo(x + br, y + bh);
  ctx.arc(x + br, y + bh / 2, br, Math.PI / 2, -Math.PI / 2);
  ctx.closePath();
  ctx.fill();

  // Text
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(text, x + pw, y + bh / 2);

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Record bounding box for hit-testing
  if (boundsKey) {
    labelBounds[boundsKey] = { x: x, y: y, w: bw, h: bh };
  }
}

function drawInfoBar(ctx, sz) {
  const sessionText = document.getElementById('inputSession').value.trim();
  const directorText = document.getElementById('inputDirector').value.trim();
  const dateText = document.getElementById('inputDate').value.trim();

  if (!sessionText && !directorText && !dateText) return;

  const titleCSS = getFontCSS('title');
  const bodyCSS = getFontCSS('body');

  // Compute default info group position
  const barH = 100;
  const defInfoX = sz.w / 2;
  const defInfoY = sz.h - barH + 10;
  const infoPos = getLabelPos('info', defInfoX, defInfoY);

  // Semi-transparent bottom bar (drawn at custom or default Y)
  const gradTop = infoPos.y - 40;
  const grad = ctx.createLinearGradient(0, gradTop, 0, gradTop + barH + 40);
  grad.addColorStop(0, 'rgba(255,248,240,0)');
  grad.addColorStop(0.4, 'rgba(255,248,240,0.85)');
  grad.addColorStop(1, 'rgba(255,248,240,0.95)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gradTop, sz.w, barH + 40);

  let textY = infoPos.y;
  const centerX = infoPos.x;
  ctx.textAlign = 'center';

  let totalH = 0;
  let maxW = 0;

  // Session number
  if (sessionText) {
    const fs = Math.round(32 * (titleCSS.sizeMul || 1));
    ctx.font = `${titleCSS.weight} ${fs}px ${titleCSS.family}`;
    ctx.fillStyle = '#3D2E24';
    ctx.textBaseline = 'top';
    ctx.fillText(sessionText, centerX, textY);
    const mw = ctx.measureText(sessionText).width;
    if (mw > maxW) maxW = mw;
    textY += fs + 12;
    totalH += fs + 12;
  }

  // Director + date
  const infoParts = [directorText, dateText].filter(Boolean);
  if (infoParts.length) {
    const fs = Math.round(22 * (bodyCSS.sizeMul || 1));
    ctx.font = `${bodyCSS.weight} ${fs}px ${bodyCSS.family}`;
    ctx.fillStyle = '#9B8A7A';
    ctx.textBaseline = 'top';
    const infoStr = infoParts.join('  |  ');
    ctx.fillText(infoStr, centerX, textY);
    const mw = ctx.measureText(infoStr).width;
    if (mw > maxW) maxW = mw;
    totalH += fs;
  }

  // Record bounding box (centered text, so x is left edge)
  labelBounds.info = { x: centerX - maxW / 2, y: infoPos.y, w: maxW, h: totalH || 40 };

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawTreatmentName(ctx, sz) {
  const text = document.getElementById('inputTreatment').value.trim();
  if (!text) return;

  const fontSize = 28;
  ctx.font = `600 ${fontSize}px 'Pretendard', sans-serif`;
  const displayText = '\u2018' + text + '\u2019';
  const metrics = ctx.measureText(displayText);
  const pw = 24, ph = 14;
  const boxW = metrics.width + pw * 2;
  const boxH = fontSize + ph * 2;

  const defX = sz.w / 2;
  const defY = sz.h * 0.5;
  const pos = getLabelPos('treatmentName', defX, defY);

  const rx = pos.x - boxW / 2;
  const ry = pos.y - boxH / 2;
  const radius = boxH / 2;

  // Semi-transparent dark background pill
  ctx.fillStyle = 'rgba(61,46,36,0.65)';
  ctx.beginPath();
  ctx.moveTo(rx + radius, ry);
  ctx.lineTo(rx + boxW - radius, ry);
  ctx.arc(rx + boxW - radius, ry + boxH / 2, radius, -Math.PI / 2, Math.PI / 2);
  ctx.lineTo(rx + radius, ry + boxH);
  ctx.arc(rx + radius, ry + boxH / 2, radius, Math.PI / 2, -Math.PI / 2);
  ctx.closePath();
  ctx.fill();

  // White text centered
  ctx.fillStyle = '#FFFFFF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(displayText, pos.x, pos.y);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  labelBounds.treatmentName = { x: rx, y: ry, w: boxW, h: boxH };
}

function drawBrand(ctx, sz) {
  const capCSS = getFontCSS('caption');
  const fs = Math.round(20 * (capCSS.sizeMul || 1));
  ctx.font = `${capCSS.weight} ${fs}px 'Playfair Display', serif`;

  const defBrandX = sz.w / 2;
  const defBrandY = sz.h - 16;
  const brandPos = getLabelPos('brand', defBrandX, defBrandY);

  ctx.fillStyle = 'rgba(232,112,58,0.35)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('IM AESTHETIC', brandPos.x, brandPos.y);

  const mw = ctx.measureText('IM AESTHETIC').width;
  labelBounds.brand = { x: brandPos.x - mw / 2, y: brandPos.y - fs, w: mw, h: fs };

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// ===== Drag to reposition photos on canvas (unified with slider) =====
function getPhotoAtPoint(mx, my) {
  const sz = SIZES[state.size];
  const gap = 6;

  if (state.layout === 'side') {
    const halfW = (sz.w - gap) / 2;
    if (mx < halfW) return 'before';
    if (mx > halfW + gap) return 'after';
    return null;
  } else if (state.layout === 'topbottom') {
    const halfH = (sz.h - gap) / 2;
    if (my < halfH) return 'before';
    if (my > halfH + gap) return 'after';
    return null;
  } else {
    const splitX = Math.round(sz.w * state.sliderPos / 100);
    return mx < splitX ? 'before' : 'after';
  }
}

(function initCanvasDrag() {
  let dragging = false, dragWhich = null, dragSlider = false;
  let startX, startY, origX, origY;

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    // Near slider split line? (within 30px)
    if (state.layout === 'slider') {
      const splitX = Math.round(SIZES[state.size].w * state.sliderPos / 100);
      if (Math.abs(mx - splitX) < 30) {
        dragSlider = true;
        e.preventDefault();
        updateSliderFromEvent(e);
        return;
      }
    }

    // Otherwise, photo drag
    dragWhich = getPhotoAtPoint(mx, my);
    if (!dragWhich) return;
    if ((dragWhich === 'before' && !beforeImg) || (dragWhich === 'after' && !afterImg)) return;

    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origX = state[dragWhich].offX;
    origY = state[dragWhich].offY;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (dragSlider) {
      updateSliderFromEvent(e);
      return;
    }
    if (!dragging || !dragWhich) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const scale = state[dragWhich].zoom / 100;
    state[dragWhich].offX = origX + (e.clientX - startX) * scaleX / scale;
    state[dragWhich].offY = origY + (e.clientY - startY) * scaleY / scale;
    renderPreview();
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      dragWhich = null;
      canvas.style.cursor = '';
      autoSave();
    }
    if (dragSlider) {
      dragSlider = false;
      autoSave();
    }
  });

  function updateSliderFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const pct = Math.max(10, Math.min(90, Math.round(mx / rect.width * 100)));
    state.sliderPos = pct;
    document.getElementById('sliderPosRange').value = pct;
    renderPreview();
  }
})();

// ===== Touch support for mobile =====
(function initTouchDrag() {
  let dragging = false, dragWhich = null, startX, startY, origX, origY;

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (touch.clientX - rect.left) * scaleX;
    const my = (touch.clientY - rect.top) * scaleY;

    dragWhich = getPhotoAtPoint(mx, my);
    if (!dragWhich) return;
    if ((dragWhich === 'before' && !beforeImg) || (dragWhich === 'after' && !afterImg)) return;

    dragging = true;
    startX = touch.clientX;
    startY = touch.clientY;
    origX = state[dragWhich].offX;
    origY = state[dragWhich].offY;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (!dragging || !dragWhich) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const scale = state[dragWhich].zoom / 100;
    state[dragWhich].offX = origX + (touch.clientX - startX) * scaleX / scale;
    state[dragWhich].offY = origY + (touch.clientY - startY) * scaleY / scale;
    renderPreview();
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    if (dragging) { dragging = false; dragWhich = null; autoSave(); }
  });
})();

// ===== Label Drag on Canvas =====
function hitTestLabels(mx, my) {
  const keys = ['beforeBadge', 'afterBadge', 'info', 'brand', 'treatmentName'];
  for (const key of keys) {
    const b = labelBounds[key];
    if (!b) continue;
    // Add padding for easier grabbing
    const pad = 10;
    if (mx >= b.x - pad && mx <= b.x + b.w + pad &&
        my >= b.y - pad && my <= b.y + b.h + pad) {
      return key;
    }
  }
  return null;
}

(function initLabelDrag() {
  let dragKey = null, startX, startY, startPosX, startPosY;

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    const hit = hitTestLabels(mx, my);
    if (!hit) return;

    e.preventDefault();
    e.stopPropagation();
    dragKey = hit;
    startX = e.clientX;
    startY = e.clientY;
    const pos = labelPositions[hit];
    const b = labelBounds[hit];
    // For centered labels (info, brand, treatmentName), use centerX; for others use x
    if (hit === 'info' || hit === 'brand' || hit === 'treatmentName') {
      startPosX = pos.x !== null ? pos.x : b.x + b.w / 2;
      startPosY = pos.y !== null ? pos.y : b.y;
    } else {
      startPosX = pos.x !== null ? pos.x : b.x;
      startPosY = pos.y !== null ? pos.y : b.y;
    }
    canvas.style.cursor = 'move';

    function onMove(ev) {
      const dx = (ev.clientX - startX) * scaleX;
      const dy = (ev.clientY - startY) * scaleY;
      labelPositions[dragKey].x = startPosX + dx;
      labelPositions[dragKey].y = startPosY + dy;
      renderPreview();
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      dragKey = null;
      canvas.style.cursor = '';
      autoSave();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }, true);  // capture phase to intercept before photo drag

  // Hover cursor
  canvas.addEventListener('mousemove', e => {
    if (dragKey) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const hit = hitTestLabels(mx, my);
    canvas.style.cursor = hit ? 'move' : '';
  });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (touch.clientX - rect.left) * scaleX;
    const my = (touch.clientY - rect.top) * scaleY;

    const hit = hitTestLabels(mx, my);
    if (!hit) return;

    e.preventDefault();
    e.stopPropagation();
    dragKey = hit;
    startX = touch.clientX;
    startY = touch.clientY;
    const pos = labelPositions[hit];
    const b = labelBounds[hit];
    if (hit === 'info' || hit === 'brand' || hit === 'treatmentName') {
      startPosX = pos.x !== null ? pos.x : b.x + b.w / 2;
      startPosY = pos.y !== null ? pos.y : b.y;
    } else {
      startPosX = pos.x !== null ? pos.x : b.x;
      startPosY = pos.y !== null ? pos.y : b.y;
    }

    function onTouchMove(ev) {
      if (!dragKey) return;
      const t = ev.touches[0];
      const dx = (t.clientX - startX) * scaleX;
      const dy = (t.clientY - startY) * scaleY;
      labelPositions[dragKey].x = startPosX + dx;
      labelPositions[dragKey].y = startPosY + dy;
      renderPreview();
      ev.preventDefault();
    }
    function onTouchEnd() {
      canvas.removeEventListener('touchmove', onTouchMove);
      canvas.removeEventListener('touchend', onTouchEnd);
      dragKey = null;
      autoSave();
    }
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd);
  }, { passive: false, capture: true });
})();

function resetLabelPositions() {
  Object.keys(labelPositions).forEach(k => {
    labelPositions[k] = { x: null, y: null };
  });
  renderPreview();
  autoSave();
  showToast('라벨 위치가 초기화되었습니다');
}

// ===== PNG Export =====
async function exportBA() {
  const btn = document.querySelector('.btn-export');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  try {
    await document.fonts.ready;
    renderPreview();
    const link = document.createElement('a');
    const sz = SIZES[state.size];
    link.download = `IM_BA_${sz.label}_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('내보내기 실패: ' + e.message);
  } finally {
    const sz = SIZES[state.size];
    btn.disabled = false;
    btn.textContent = `PNG 내보내기`;
  }
}

// ===== Font Customization System =====
const FONT_OPTIONS = [
  { name: 'Pretendard', family: "'Pretendard',system-ui,sans-serif", type: 'sans' },
  { name: 'Noto Sans KR', family: "'Noto Sans KR',sans-serif", type: 'sans' },
  { name: 'Noto Serif KR', family: "'Noto Serif KR',serif", type: 'serif' },
  { name: 'Playfair Display', family: "'Playfair Display',serif", type: 'serif' },
  { name: 'Gowun Batang', family: "'Gowun Batang',serif", type: 'display' },
  { name: 'Gowun Dodum', family: "'Gowun Dodum',sans-serif", type: 'display' },
  { name: 'MaruBuri', family: "'MaruBuri',serif", type: 'display' },
  { name: 'Nanum Myeongjo', family: "'Nanum Myeongjo',serif", type: 'serif' }
];

const FONT_DEFAULTS = {
  title:   { family: 0, size: 100, weight: 700, color: '' },
  body:    { family: 0, size: 100, weight: 400, color: '' },
  caption: { family: 3, size: 100, weight: 600, color: '' }
};

let fontSettings = JSON.parse(JSON.stringify(FONT_DEFAULTS));

function getFontCSS(tier) {
  const s = fontSettings[tier];
  const f = FONT_OPTIONS[s.family];
  return { family: f.family, weight: s.weight, sizeMul: s.size / 100, color: s.color || null };
}

function setFont(tier, prop, val) {
  if (prop === 'family') val = parseInt(val, 10);
  if (prop === 'size') val = parseInt(val, 10);
  if (prop === 'weight') val = parseInt(val, 10);
  fontSettings[tier][prop] = val;
  const sizeSpan = document.querySelector(`[data-font-size="${tier}"]`);
  if (sizeSpan && prop === 'size') sizeSpan.textContent = val + '%';
  renderPreview();
  autoSave();
}

function resetFonts() {
  fontSettings = JSON.parse(JSON.stringify(FONT_DEFAULTS));
  buildFontPanel();
  renderPreview();
  autoSave();
}

function toggleFontPanel() {
  const btn = document.querySelector('.font-panel-toggle');
  const body = document.querySelector('.font-panel-body');
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

function buildFontPanel() {
  const host = document.getElementById('fontPanelHost');
  if (!host) return;

  const tiers = [
    { key: 'title', label: 'TITLE · 제목', desc: 'BEFORE/AFTER 라벨, 회차' },
    { key: 'body', label: 'BODY · 본문', desc: '원장명, 날짜' },
    { key: 'caption', label: 'CAPTION · 캡션', desc: '브랜드 워터마크' }
  ];

  const tiersHtml = tiers.map(t => {
    const s = fontSettings[t.key];
    return `<div class="font-tier">
      <div class="font-tier-label">${t.label}</div>
      <div style="font-size:10px;color:#9B8A7A;margin-bottom:4px">${t.desc}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <select onchange="setFont('${t.key}','family',this.value)" id="fontSel_${t.key}" style="font-size:11px;flex:1;min-width:100px;padding:4px 6px;border-radius:6px;border:1.5px solid #E8E0D8;background:#FFF8F0;color:#3D2E24;cursor:pointer">
          ${FONT_OPTIONS.map((f, i) => `<option value="${i}" ${s.family === i ? 'selected' : ''}>${f.name}</option>`).join('')}
        </select>
        <input type="range" min="60" max="140" value="${s.size}" oninput="setFont('${t.key}','size',this.value)" style="width:55px;accent-color:#E8703A">
        <span data-font-size="${t.key}" style="font-size:10px;min-width:28px;color:#9B8A7A">${s.size}%</span>
        <select onchange="setFont('${t.key}','weight',this.value)" style="font-size:11px;width:55px;padding:4px;border-radius:6px;border:1.5px solid #E8E0D8;background:#FFF8F0;color:#3D2E24;cursor:pointer">
          ${[300, 400, 500, 600, 700, 800].map(w => `<option value="${w}" ${s.weight == w ? 'selected' : ''}>${w}</option>`).join('')}
        </select>
        <input type="color" value="${s.color || '#3D2E24'}" oninput="setFont('${t.key}','color',this.value)" style="width:26px;height:26px;border:none;cursor:pointer;border-radius:4px" title="폰트 색상">
      </div>
    </div>`;
  }).join('');

  host.innerHTML = `
    <button class="font-panel-toggle" onclick="toggleFontPanel()">
      폰트 커스터마이징 <span class="arrow">&#9660;</span>
    </button>
    <div class="font-panel-body">
      ${tiersHtml}
      <button class="font-reset-btn" onclick="resetFonts()">기본값으로 초기화</button>
    </div>`;
}

// ===== AutoSave / AutoLoad =====
const STORAGE_KEY = 'im_ba_state';
const TOOL_NAME = 'ba';
let _currentSessionId = null;
let _saveTimer;

function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    const data = collectState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch(e) {
      try {
        const lite = {...data};
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lite));
      } catch(e2) { console.warn('AutoSave failed:', e2); }
    }
  }, 1000);
}

function collectState() {
  return {
    layout: state.layout,
    size: state.size,
    labelStyle: state.labelStyle,
    sliderPos: state.sliderPos,
    before: { zoom: state.before.zoom, offX: state.before.offX, offY: state.before.offY },
    after: { zoom: state.after.zoom, offX: state.after.offX, offY: state.after.offY },
    sessionNum: document.getElementById('inputSession').value,
    directorName: document.getElementById('inputDirector').value,
    dateText: document.getElementById('inputDate').value,
    treatmentName: document.getElementById('inputTreatment').value,
    showBrand: document.getElementById('showBrand').checked,
    fontSettings: JSON.parse(JSON.stringify(fontSettings)),
    labelPositions: JSON.parse(JSON.stringify(labelPositions))
  };
}

function autoLoad() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const data = JSON.parse(saved);
    restoreState(data);
    return true;
  } catch(e) { console.warn('AutoLoad failed:', e); return false; }
}

function restoreState(data) {
  if (data.layout) setLayout(data.layout);
  if (data.size) setSize(data.size);
  if (data.labelStyle) setLabelStyle(data.labelStyle);
  if (data.sliderPos !== undefined) {
    state.sliderPos = data.sliderPos;
    document.getElementById('sliderPosRange').value = data.sliderPos;
  }
  if (data.before) {
    if (data.before.zoom !== undefined) { state.before.zoom = data.before.zoom; document.getElementById('beforeZoomRange').value = data.before.zoom; document.getElementById('beforeZoomVal').textContent = data.before.zoom + '%'; }
    if (data.before.offX !== undefined) state.before.offX = data.before.offX;
    if (data.before.offY !== undefined) state.before.offY = data.before.offY;
  }
  if (data.after) {
    if (data.after.zoom !== undefined) { state.after.zoom = data.after.zoom; document.getElementById('afterZoomRange').value = data.after.zoom; document.getElementById('afterZoomVal').textContent = data.after.zoom + '%'; }
    if (data.after.offX !== undefined) state.after.offX = data.after.offX;
    if (data.after.offY !== undefined) state.after.offY = data.after.offY;
  }
  if (data.sessionNum !== undefined) document.getElementById('inputSession').value = data.sessionNum;
  if (data.directorName !== undefined) document.getElementById('inputDirector').value = data.directorName;
  if (data.dateText !== undefined) document.getElementById('inputDate').value = data.dateText;
  if (data.treatmentName !== undefined) document.getElementById('inputTreatment').value = data.treatmentName;
  if (data.showBrand !== undefined) document.getElementById('showBrand').checked = data.showBrand;
  if (data.labelPositions) {
    Object.keys(data.labelPositions).forEach(k => {
      if (labelPositions[k]) {
        labelPositions[k] = data.labelPositions[k];
      }
    });
  }
  if (data.fontSettings) {
    fontSettings = JSON.parse(JSON.stringify(data.fontSettings));
    // Migrate old fontIdx/sizeMul schema to family/size schema
    ['title','body','caption'].forEach(k => {
      if (fontSettings[k].fontIdx !== undefined && fontSettings[k].family === undefined) {
        fontSettings[k].family = fontSettings[k].fontIdx;
        delete fontSettings[k].fontIdx;
      }
      if (fontSettings[k].size === undefined) {
        fontSettings[k].size = Math.round((fontSettings[k].sizeMul || 1) * 100);
        delete fontSettings[k].sizeMul;
      }
      if (fontSettings[k].color === undefined) fontSettings[k].color = '';
    });
    buildFontPanel();
  }
  renderPreview();
}

function clearSaved() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function showToast(msg) {
  const t = document.getElementById('autoToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Server Session Management =====
async function serverSave() {
  const data = collectState();
  const name = prompt('세션 이름을 입력하세요:', '') || '이름없음';

  try {
    if (_currentSessionId) {
      await fetch('/api/db/maker-sessions/' + _currentSessionId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ work_data: data, session_name: name })
      });
      showToast('서버에 저장되었습니다');
    } else {
      const res = await fetch('/api/db/maker-sessions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ tool: TOOL_NAME, session_name: name, work_data: data })
      });
      const result = await res.json();
      _currentSessionId = result.id;
      showToast('서버에 저장되었습니다');
    }
  } catch(e) {
    showToast('서버 저장 실패: ' + e.message);
  }
}

async function serverLoad() {
  try {
    const res = await fetch('/api/db/maker-sessions?tool=' + TOOL_NAME);
    const sessions = await res.json();
    if (!sessions.length) { showToast('저장된 작업이 없습니다'); return; }
    showLoadModal(sessions);
  } catch(e) {
    showToast('불러오기 실패: ' + e.message);
  }
}

async function loadSession(id) {
  try {
    const res = await fetch('/api/db/maker-sessions/' + id);
    const session = await res.json();
    _currentSessionId = session.id;
    restoreState(session.work_data);
    closeLoadModal();
    showToast('"' + (session.session_name || '이름없음') + '" 불러왔습니다');
  } catch(e) {
    showToast('불러오기 실패');
  }
}

async function deleteSession(id, el) {
  if (!confirm('이 세션을 삭제하시겠습니까?')) return;
  try {
    await fetch('/api/db/maker-sessions/' + id, { method: 'DELETE' });
    el.closest('.session-item').remove();
    if (_currentSessionId === id) _currentSessionId = null;
  } catch(e) { showToast('삭제 실패'); }
}

function showLoadModal(sessions) {
  let modal = document.getElementById('loadModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'loadModal';
    modal.innerHTML = '<div class="modal-overlay" onclick="closeLoadModal()"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><h3>저장된 작업</h3><button onclick="closeLoadModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9B8A7A">&times;</button></div><div class="modal-body" id="sessionList"></div></div></div>';
    document.body.appendChild(modal);
  }

  const list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<p style="color:#9B8A7A;text-align:center;padding:24px">저장된 작업이 없습니다</p>';
  } else {
    list.innerHTML = sessions.map(s => {
      const date = new Date(s.updated_at);
      const ago = timeAgo(date);
      return '<div class="session-item" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(232,112,58,0.08);cursor:pointer" onclick="loadSession(\'' + s.id + '\')">' +
        '<div style="flex:1">' +
        '<div style="font-weight:600;color:#3D2E24;font-size:14px">' + (s.session_name || '이름없음') + '</div>' +
        '<div style="font-size:11px;color:#9B8A7A;margin-top:2px">' + ago + '</div>' +
        '</div>' +
        '<button onclick="event.stopPropagation();deleteSession(\'' + s.id + '\',this)" style="background:none;border:none;color:#9B8A7A;cursor:pointer;font-size:16px;padding:4px 8px" title="삭제">&times;</button>' +
        '</div>';
    }).join('');
  }
  modal.style.display = 'block';
}

function closeLoadModal() {
  const m = document.getElementById('loadModal');
  if (m) m.style.display = 'none';
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return '방금 전';
  if (s < 3600) return Math.floor(s/60) + '분 전';
  if (s < 86400) return Math.floor(s/3600) + '시간 전';
  return Math.floor(s/86400) + '일 전';
}

// ===== Init =====
buildFontPanel();
renderPreview();
if (autoLoad()) showToast('이전 설정이 복원되었습니다');
</script>
