                            <div className="flex gap-2">
                                <button className="bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded-lg text-sm font-semibold">프로필 편집</button>
                                <button className="bg-gray-100 hover:bg-gray-200 px-4 py-1.5 rounded-lg text-sm font-semibold">보관된 스토리</button>
                            </div>
                        </div>
                        <div className="flex justify-center md:justify-start gap-8 mb-5">
                            <span className="text-sm"><strong>{posts.length}</strong> 게시물</span>
                            <span className="text-sm"><strong>1,248</strong> 팔로워</span>
                            <span className="text-sm"><strong>152</strong> 팔로잉</span>
                        </div>
                        <div className="text-sm">
                            <h2 className="font-bold mb-1 text-gray-900">IM 에스테틱 | 3인 전문가 통합 케어</h2>
                            <p className="font-semibold mb-1 italic" style={{color:'#FF8C42'}}>세 명의 전문가, 하나의 완벽한 솔루션 🍊</p>
                            <p className="text-gray-700 leading-relaxed text-xs">
                                ✔️ 유수정 (메디컬 스킨케어 20년 경력)<br/>
                                ✔️ 우연우 (바른체형 근막 테라피 전문가)<br/>
                                ✔️ 김은경 (39년 내공 7감 리추얼 디렉터)
                            </p>
                            <div className="flex items-center gap-1 text-blue-900 font-semibold mt-3">
                                <LinkIcon size={14} />
                                <a href="#" className="hover:underline text-sm">linktr.ee/im_aesthetic</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div className="flex gap-5 w-full overflow-x-auto py-4 no-scrollbar">
                    {[
                        { name: '소개', icon: <Info size={20} /> },
                        { name: '통합케어', icon: <Sparkles size={20} /> },
                        { name: '후기', icon: <Heart size={20} /> },
                        { name: '이벤트', icon: <CalendarIcon size={20} /> },
                        { name: '공간', icon: <MapPin size={20} /> }
                    ].map((item, i) => (
                        <div key={i} className="flex flex-col items-center gap-2 flex-shrink-0">
                            <div className="w-16 h-16 rounded-full border border-gray-200 p-0.5 bg-white shadow-sm flex items-center justify-center cursor-pointer" style={{color:'#FF8C42'}}>
                                {item.icon}
                            </div>
                            <span className="text-xs font-semibold text-gray-600">{item.name}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );

    const GridView = () => (
        <div className="max-w-2xl mx-auto py-2">
            <div className="flex justify-center border-t border-gray-200 mb-2">
                <button className="flex items-center gap-2 py-4 border-t border-black -mt-px text-xs font-bold tracking-widest uppercase">
                    <Grid size={14} /> 게시물
                </button>
                <button className="flex items-center gap-2 py-4 text-gray-400 text-xs font-bold tracking-widest uppercase mx-16">
                    <Play size={14} /> 릴스
                </button>
                <button className="flex items-center gap-2 py-4 text-gray-400 text-xs font-bold tracking-widest uppercase">
                    <User size={14} /> 태그됨
                </button>
            </div>
            <div className="grid grid-cols-3 gap-0.5 md:gap-1">
                {posts.map((post, index) => (
                    <React.Fragment key={post.id}>
                        {index % 9 === 0 && (
                            <div className="col-span-3 px-3 py-2 border-y flex items-center justify-between" style={{background:'#FFF8F0', borderColor:'rgba(255,140,66,0.1)'}}>
                                <span className="text-xs font-black uppercase tracking-widest" style={{color:'#FF8C42'}}>{post.phase}</span>
                                <span className="text-xs text-gray-400 font-bold uppercase">Week {post.week} ~</span>
                            </div>
                        )}
                        <div
                            className="relative group cursor-pointer overflow-hidden bg-gray-100 shadow-inner"
                            style={{aspectRatio:'3/4'}}
                            onClick={() => handlePostClick(post)}
                        >
                            <img src={post.image} alt={post.title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                            <div className="absolute top-3 right-3 flex flex-col gap-1" style={{filter:'drop-shadow(0 1px 2px rgba(0,0,0,0.5))'}}>
                                {post.type === 'reel' && <Play size={18} className="text-white" />}
                                {post.type === 'carousel' && <Copy size={18} className="text-white" />}
                            </div>
                            <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center text-white">
                                <div className="flex items-center gap-6 font-bold">
                                    <div className="flex items-center gap-1"><Heart size={20} fill="white" /> 124</div>
                                    <div className="flex items-center gap-1"><MessageCircle size={20} fill="white" /> 18</div>
                                </div>
                                <div className="text-xs mt-2 font-bold opacity-80">Click to read caption</div>
                            </div>
                        </div>
                    </React.Fragment>
                ))}
            </div>
        </div>
    );

    const FeedDetailView = ({ post }) => (
        <div className="max-w-2xl mx-auto bg-white min-h-screen pb-20">
            <div className="sticky top-0 bg-white/95 backdrop-blur-md border-b border-gray-200 z-30 flex items-center justify-between p-4">
                <button onClick={() => setView('grid')} className="p-1 hover:bg-gray-100 rounded-full">
                    <ChevronLeft size={24} />
                </button>
                <div className="text-center">
                    <div className="text-xs text-gray-400 font-bold uppercase tracking-widest">게시물 상세</div>
                    <h2 className="font-black tracking-tight text-sm uppercase">{post.title}</h2>
                </div>
                <div className="w-10"></div>
            </div>
            <div className="flex flex-col">
                <div className="flex items-center justify-between p-3 border-b border-gray-50">
                    <div className="flex items-center gap-3">
                        <div className="w-9 h-9 rounded-full p-0.5" style={{background:'linear-gradient(135deg,#FF8C42,#FFB085)'}}>
                            <div className="w-full h-full rounded-full bg-white flex items-center justify-center text-xs font-black border border-white" style={{color:'#FF8C42'}}>IM</div>
                        </div>
                        <div>
                            <div className="text-sm font-bold flex items-center gap-1 uppercase">
                                im_aesthetic_official <Check size={12} className="bg-blue-500 text-white rounded-full p-0.5" />
                            </div>
                            <div className="text-xs text-gray-500 flex items-center gap-0.5 italic"><MapPin size={10} /> 대구 수성구 범어동 마크팰리스</div>
                        </div>
                    </div>
                    <MoreHorizontal size={20} className="text-gray-400" />
                </div>
                <div className="relative w-full bg-gray-50" style={{aspectRatio:'4/5'}}>
                    {post.type === 'reel' && (
                        <div className="absolute top-4 right-4 z-10 bg-black/40 p-2 rounded-full text-white backdrop-blur-sm">
                            <Volume2 size={16} />
                        </div>
                    )}
                    <img src={post.image} alt="" className="w-full h-full object-cover" />
                    {post.type === 'carousel' && (
                        <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 z-20">
                            <div className="w-3 h-1.5 rounded-full" style={{background:'#FF8C42'}}></div>
                            <div className="w-1.5 h-1.5 rounded-full bg-white/60"></div>
                            <div className="w-1.5 h-1.5 rounded-full bg-white/60"></div>
                        </div>
                    )}
                </div>
                <div className="p-4">
                    <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-4">
                            <Heart size={26} className="hover:text-red-500 cursor-pointer" />
                            <MessageCircle size={26} className="hover:text-gray-400 cursor-pointer" />
                            <Send size={26} className="hover:text-gray-400 cursor-pointer" />
                        </div>
                        <Bookmark size={26} className="cursor-pointer" style={{color:'#FF8C42'}} />
                    </div>
                    <div className="text-sm font-bold mb-3">좋아요 1,248개</div>
                    <div className="p-4 rounded-2xl border mb-4" style={{background:'rgba(255,248,240,0.5)',borderColor:'rgba(255,140,66,0.2)'}}>
                        <div className="flex items-center justify-between mb-3 border-b pb-2" style={{borderColor:'rgba(255,140,66,0.3)'}}>
                            <span className="text-xs font-black tracking-widest uppercase italic" style={{color:'#FF8C42'}}>Instagram Caption Copy</span>
                            <button onClick={() => {
                                const text = post.caption + "\n\n" + post.hashtags;
                                navigator.clipboard.writeText(text).then(() => {
                                    const btn = document.activeElement;
                                    const orig = btn.innerHTML;
                                    btn.innerHTML = '✓ 복사됨!';
                                    setTimeout(() => { btn.innerHTML = orig; }, 2000);
                                });
                            }} className="flex items-center gap-1 text-xs font-bold text-white px-2 py-1 rounded-md cursor-pointer" style={{background:'#FF8C42'}}>
                                <Copy size={10} /> 본문 복사
                            </button>
                        </div>
                        <div className="text-sm leading-relaxed mb-4 text-gray-800 whitespace-pre-line">
                            <span className="font-bold text-gray-900 underline decoration-orange-400 underline-offset-4">im_aesthetic_official</span>
                            {"\n"}{post.caption}
                        </div>
                        <div className="text-sm text-blue-800 font-medium leading-relaxed cursor-pointer hover:underline">
                            {post.hashtags}
                        </div>
                    </div>
                    <div className="text-xs text-gray-400 font-bold uppercase tracking-widest flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <span className="px-2 py-0.5 rounded" style={{background:'rgba(255,140,66,0.1)',color:'#FF8C42'}}>{post.phase}</span>
                            <span>Week {post.week} - {post.day}</span>
                        </div>
                        <span>2026년 3월 예정</span>
                    </div>
                </div>
                <div className="border-t border-gray-50 px-4 py-4 mt-2 mb-10">
                    <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-400 border border-gray-200">You</div>
                        <div className="flex-1 bg-gray-50 rounded-full px-4 py-2 text-xs text-gray-400 border border-gray-100 italic">댓글을 달아 고객과 소통해보세요...</div>
                    </div>
                </div>
            </div>
        </div>
    );

    return (
        <div className="bg-gray-50 min-h-screen text-gray-800 font-sans">
            {view === 'grid' ? (
                <div>
                    <ProfileHeader />
                    <GridView />
                </div>
            ) : (
                <FeedDetailView post={selectedPost} />
            )}
            <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 h-16 flex items-center justify-around px-4 z-50">
                <Layout size={24} className={view === 'grid' ? '' : 'text-gray-300'} style={{color: view === 'grid' ? '#FF8C42' : undefined}} onClick={() => setView('grid')} />
                <Play size={24} className="text-gray-300" />
                <div className="w-10 h-10 rounded-full p-0.5 flex items-center justify-center shadow-md" style={{background:'linear-gradient(135deg,#FF8C42,#FFB085)'}}>
                    <div className="w-full h-full rounded-full bg-white flex items-center justify-center text-xs font-black" style={{color:'#FF8C42'}}>IM</div>
                </div>
                <MessageCircle size={24} className="text-gray-300" />
                <User size={24} className="text-gray-300" />
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
