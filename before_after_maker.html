<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AESTHETIC - Before &amp; After Maker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --brand-orange: #E8703A;
    --brand-orange-dark: #C85828;
    --brand-orange-light: #F5A070;
    --brand-cream: #FAF4EA;
    --brand-beige: #F5E8D0;
    --brand-brown: #2C1810;
    --brand-brown-mid: #6B4830;
    --brand-warm-white: #FFF8F0;
    --brand-gray: #8C8279;
    --text-muted: #9B8A7A;
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.35);
    --glass-shadow: 0 8px 32px rgba(26,20,16,0.08);
    --ease: cubic-bezier(0.22, 0.68, 0, 1.2);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    background: #FAF6F1;
    color: var(--brand-brown);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,112,58,0.06), transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(232,112,58,0.04), transparent 50%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,248,240,0.5), transparent 70%);
    pointer-events: none;
  }

  .app { display: flex; min-height: 100vh; }

  /* ═══════ Editor Panel ═══════ */
  .editor {
    width: 420px;
    flex-shrink: 0;
    background: var(--glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid var(--glass-border);
    padding: 32px 24px 36px;
    overflow-y: auto;
    max-height: 100vh;
    position: sticky;
    top: 0;
  }

  .editor-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(232,112,58,0.1);
  }
  .editor-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--brand-brown);
  }
  .editor-header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--brand-orange);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(232,112,58,0.15), transparent);
  }

  /* ═══════ Template Style Selector ═══════ */
  .template-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .template-card {
    aspect-ratio: 3/4;
    border-radius: 10px;
    border: 2px solid rgba(44,24,16,0.08);
    cursor: pointer;
    transition: all 0.3s var(--ease-out);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .template-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .template-card.active {
    border-color: var(--brand-orange);
    box-shadow: 0 4px 16px rgba(232,112,58,0.25);
  }
  .template-card.active::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 14px; height: 14px;
    background: var(--brand-orange);
    border-radius: 50%;
    border: 2px solid #fff;
    z-index: 2;
  }
  .template-card .tpl-name {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 0 2px;
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
  }

  /* Mini previews inside template cards */
  .tpl-preview {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 6px;
  }
  .tpl-preview .mini-box {
    flex: 1;
    height: 60%;
    border-radius: 3px;
  }

  /* Template A: Premium Minimal */
  .tpl-card-minimal { background: #FAF8F5; }
  .tpl-card-minimal .mini-box { background: #E8E2DA; border: 1px solid #D4CEC6; border-radius: 4px; }
  .tpl-card-minimal .tpl-name { color: #8C8279; }
  .tpl-card-minimal .tpl-divider { width: 1px; height: 50%; background: #D4A04A; position: absolute; }

  /* Template B: Bold Orange */
  .tpl-card-orange { background: #E8703A; }
  .tpl-card-orange .mini-box { background: rgba(255,255,255,0.9); border: 2px solid #fff; border-radius: 2px; }
  .tpl-card-orange .tpl-name { color: #fff; }

  /* Template C: Dark Luxury */
  .tpl-card-dark { background: #1A1410; }
  .tpl-card-dark .mini-box { background: #2C2218; border: 1px solid #D4A04A; }
  .tpl-card-dark .tpl-name { color: #D4A04A; }

  /* Template D: Split Clean */
  .tpl-card-split { background: linear-gradient(90deg, #EEEBE7 50%, #FAF5EE 50%); }
  .tpl-card-split .mini-box { background: #D5CFC7; border-radius: 3px; }
  .tpl-card-split .mini-box:last-child { background: #E8DDD0; }
  .tpl-card-split .tpl-name { color: #6B4830; background: rgba(232,112,58,0.1); border-radius: 2px; padding: 1px 4px; bottom: 3px; }

  /* Template E: Editorial Magazine */
  .tpl-card-editorial { background: #fff; }
  .tpl-card-editorial .mini-box:first-child { flex: 1.5; background: #E8E2DA; }
  .tpl-card-editorial .mini-box:last-child { flex: 0.8; background: #F0EBE4; }
  .tpl-card-editorial .tpl-name { color: #2C1810; font-family: 'Playfair Display', serif; font-style: italic; }

  /* ═══════ Category tabs ═══════ */
  .cat-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .cat-tab {
    flex: 1;
    padding: 10px 8px;
    border: 1.5px solid rgba(232,112,58,0.12);
    border-radius: 10px;
    background: rgba(255,255,255,0.6);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--brand-brown-mid);
    cursor: pointer;
    text-align: center;
    transition: all 0.3s var(--ease-out);
    position: relative;
    overflow: hidden;
  }
  .cat-tab::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--brand-orange), var(--brand-orange-dark));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cat-tab span { position: relative; z-index: 1; }
  .cat-tab.active {
    border-color: var(--brand-orange);
    color: #fff;
    box-shadow: 0 4px 16px rgba(232,112,58,0.25);
  }
  .cat-tab.active::before { opacity: 1; }
  .cat-tab:hover:not(.active) {
    border-color: var(--brand-orange-light);
    color: var(--brand-orange);
    background: rgba(232,112,58,0.04);
    transform: translateY(-1px);
  }

  /* ═══════ Image upload ═══════ */
  .upload-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .upload-box {
    flex: 1;
    border: 2px dashed rgba(232,112,58,0.2);
    border-radius: 12px;
    padding: 20px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.35s var(--ease-out);
    position: relative;
    overflow: hidden;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(255,255,255,0.4);
  }
  .upload-box:hover {
    border-color: var(--brand-orange);
    background: rgba(255,255,255,0.7);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,112,58,0.1);
  }
  .upload-box.dragover {
    border-color: var(--brand-orange);
    background: rgba(232,112,58,0.06);
    transform: scale(1.02);
    box-shadow: 0 8px 32px rgba(232,112,58,0.2);
  }
  .upload-box.has-image {
    border-style: solid;
    border-color: var(--brand-orange-light);
    padding: 4px;
    background: rgba(255,255,255,0.6);
  }
  .upload-box .upload-icon {
    width: 28px; height: 28px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1.5;
    transition: stroke 0.3s, transform 0.3s;
  }
  .upload-box:hover .upload-icon {
    stroke: var(--brand-orange);
    transform: translateY(-2px);
  }
  .upload-box .label {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--brand-brown-mid);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .upload-box .hint {
    font-size: 9px;
    color: var(--text-muted);
  }
  .upload-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }
  .upload-box input { display: none; }

  /* ═══════ Text fields ═══════ */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--brand-brown-mid);
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid rgba(232,112,58,0.1);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    color: var(--brand-brown);
    background: rgba(255,255,255,0.6);
    transition: all 0.3s var(--ease-out);
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--brand-orange);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 3px rgba(232,112,58,0.08);
  }
  .field input::placeholder { color: var(--text-muted); }

  /* ═══════ Layout & Size toggle ═══════ */
  .toggle-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .toggle-btn {
    flex: 1;
    padding: 9px;
    border: 1.5px solid rgba(44,24,16,0.1);
    border-radius: 10px;
    background: rgba(255,255,255,0.5);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    color: var(--brand-brown-mid);
    cursor: pointer;
    text-align: center;
    transition: all 0.3s var(--ease-out);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .toggle-btn svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none; stroke-width: 2;
  }
  .toggle-btn.active {
    background: var(--brand-brown);
    border-color: var(--brand-brown);
    color: #fff;
    box-shadow: 0 4px 12px rgba(44,24,16,0.2);
  }
  .toggle-btn:hover:not(.active) {
    border-color: var(--brand-brown-mid);
    transform: translateY(-1px);
  }

  /* ═══════ Export button ═══════ */
  .btn-export {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--brand-orange), var(--brand-orange-dark));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.35s var(--ease-out);
    margin-top: 8px;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
  }
  .btn-export::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .btn-export:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,112,58,0.35), 0 0 40px rgba(232,112,58,0.15);
  }
  .btn-export:hover::before { transform: translateX(100%); }
  .btn-export:active { transform: translateY(0); }
  .btn-export:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ═══════ Preview area ═══════ */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    min-height: 100vh;
  }

  .preview-wrapper {
    position: relative;
    box-shadow: 0 20px 60px rgba(44,24,16,0.12), 0 0 0 1px rgba(232,112,58,0.06);
    border-radius: 4px;
    overflow: hidden;
    transition: box-shadow 0.4s;
  }
  .preview-wrapper:hover {
    box-shadow: 0 24px 72px rgba(44,24,16,0.16), 0 0 0 1px rgba(232,112,58,0.1);
  }

  /* ═══════════════════════════════════════════════════════
     SLIDE BASE
     ═══════════════════════════════════════════════════════ */
  .slide {
    position: relative;
    overflow: hidden;
    font-family: 'Pretendard', sans-serif;
  }
  .slide.square { width: 540px; height: 540px; }
  .slide.portrait { width: 540px; height: 675px; }

  .slide .slide-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  /* ═══════════════════════════════════════════════════════
     TEMPLATE A: PREMIUM MINIMAL
     ═══════════════════════════════════════════════════════ */
  .slide[data-template="minimal"] .slide-bg {
    background: #FAF8F5;
  }

  /* Top decoration */
  .slide[data-template="minimal"] .tpl-top-deco {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 12;
    text-align: center;
    padding: 20px 28px 0;
  }
  .slide[data-template="minimal"] .tpl-top-deco .deco-line-top {
    width: 40px;
    height: 1px;
    background: #D4A04A;
    margin: 0 auto 10px;
    opacity: 0.6;
  }
  .slide[data-template="minimal"] .tpl-top-deco .client-text {
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #6B5E52;
    letter-spacing: 0.5px;
  }
  .slide[data-template="minimal"] .tpl-top-deco .period-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 400;
    font-style: italic;
    color: #B8A898;
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .slide[data-template="minimal"] .tpl-top-deco .deco-line-bottom {
    width: 28px;
    height: 1px;
    background: #D4CEC6;
    margin: 8px auto 0;
  }

  /* Images area */
  .slide[data-template="minimal"] .tpl-images {
    position: absolute;
    z-index: 5;
    display: flex;
  }
  .slide[data-template="minimal"].square .tpl-images.h-layout {
    top: 80px; left: 24px; right: 24px; bottom: 80px;
    gap: 14px;
  }
  .slide[data-template="minimal"].portrait .tpl-images.h-layout {
    top: 80px; left: 24px; right: 24px; bottom: 92px;
    gap: 14px;
  }
  .slide[data-template="minimal"] .tpl-images.v-layout {
    flex-direction: column;
  }
  .slide[data-template="minimal"].square .tpl-images.v-layout {
    top: 80px; left: 24px; right: 24px; bottom: 80px;
    gap: 14px;
  }
  .slide[data-template="minimal"].portrait .tpl-images.v-layout {
    top: 80px; left: 24px; right: 24px; bottom: 92px;
    gap: 14px;
  }
  .slide[data-template="minimal"] .tpl-img-box {
    flex: 1;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: linear-gradient(135deg, #F0EBE4, #E8E2DA);
    box-shadow: 0 4px 20px rgba(44,24,16,0.06);
  }
  .slide[data-template="minimal"] .tpl-img-box img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .slide[data-template="minimal"] .tpl-img-label {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(44,24,16,0.35);
    padding: 4px 16px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .slide[data-template="minimal"] .tpl-img-label-v {
    position: absolute;
    top: 10px;
    left: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(44,24,16,0.35);
    padding: 3px 14px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* Center divider with diamond */
  .slide[data-template="minimal"] .tpl-center-divider {
    position: absolute;
    z-index: 8;
  }
  .slide[data-template="minimal"] .tpl-center-divider.h-divider {
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .slide[data-template="minimal"].square .tpl-center-divider.h-divider {
    top: 80px; bottom: 80px;
  }
  .slide[data-template="minimal"].portrait .tpl-center-divider.h-divider {
    top: 80px; bottom: 92px;
  }
  .slide[data-template="minimal"] .tpl-center-divider.h-divider .divider-line {
    flex: 1;
    width: 1px;
    background: linear-gradient(to bottom, transparent, #D4A04A, transparent);
    opacity: 0.5;
  }
  .slide[data-template="minimal"] .tpl-center-divider.h-divider .divider-diamond {
    width: 10px;
    height: 10px;
    background: #D4A04A;
    transform: rotate(45deg);
    flex-shrink: 0;
    margin: 4px 0;
    opacity: 0.7;
  }
  .slide[data-template="minimal"] .tpl-center-divider.v-divider {
    top: 50%;
    transform: translateY(-50%);
    left: 24px; right: 24px;
    height: 1px;
    display: flex;
    align-items: center;
  }
  .slide[data-template="minimal"] .tpl-center-divider.v-divider .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #D4A04A, transparent);
    opacity: 0.5;
  }
  .slide[data-template="minimal"] .tpl-center-divider.v-divider .divider-diamond {
    width: 8px;
    height: 8px;
    background: #D4A04A;
    transform: rotate(45deg);
    flex-shrink: 0;
    margin: 0 6px;
    opacity: 0.7;
  }

  /* Bottom bar */
  .slide[data-template="minimal"] .tpl-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 12;
    text-align: center;
    padding: 12px 28px 18px;
  }
  .slide[data-template="minimal"] .tpl-bottom .concern-text {
    font-size: 11px;
    font-weight: 500;
    color: #8C8279;
    letter-spacing: 0.3px;
  }
  .slide[data-template="minimal"] .tpl-bottom .brand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 6px;
  }
  .slide[data-template="minimal"] .tpl-bottom .brand-row::before,
  .slide[data-template="minimal"] .tpl-bottom .brand-row::after {
    content: '';
    width: 28px;
    height: 1px;
    background: #D4A04A;
    opacity: 0.4;
  }
  .slide[data-template="minimal"] .tpl-bottom .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    font-weight: 500;
    color: #B8A898;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════════════════
     TEMPLATE B: BOLD ORANGE
     ═══════════════════════════════════════════════════════ */
  .slide[data-template="orange"] .slide-bg {
    background: #E8703A;
  }
  .slide[data-template="orange"] .slide-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 20%, rgba(255,255,255,0.08), transparent),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(0,0,0,0.12), transparent);
  }

  .slide[data-template="orange"] .tpl-top-deco {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 12;
    text-align: center;
    padding: 18px 28px 0;
  }
  .slide[data-template="orange"] .tpl-top-deco .title-big {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .slide[data-template="orange"] .tpl-top-deco .client-text {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

<script>
let state = {
  template: 'minimal',
  category: 'skin',
  layout: 'horizontal',
  size: 'square',
  beforeImg: null,
  afterImg: null,
};

const CATEGORY_DEFAULTS = {
  skin:    { client: '30대 예비신부님', period: '3개월 관리', concern: '홍조 개선', treatment: '웨딩 피부케어 프로그램' },
  body:    { client: '40대 여성 고객님', period: '2개월 관리', concern: '어깨 비대칭 개선', treatment: '바른체형 근막 테라피' },
  wedding: { client: '예비신부님', period: 'D-90 웨딩케어', concern: '피부결 정돈 · 톤 업', treatment: 'IM 웨딩케어 프로그램' },
};

const placeholderSVG = `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>`;

function getValues() {
  return {
    client: document.getElementById('clientLabel').value,
    period: document.getElementById('period').value,
    concern: document.getElementById('concern').value,
    treatment: document.getElementById('treatment').value,
  };
}

function imgOrPlaceholder(src, label) {
  if (src) {
    return `<img src="${src}" alt="${label}">`;
  }
  return `<div class="tpl-img-placeholder">${placeholderSVG}<span>${label}</span></div>`;
}

/* ═══════ Template renderers ═══════ */
function renderMinimal() {
  const v = getValues();
  const isH = state.layout === 'horizontal';
  const layoutClass = isH ? 'h-layout' : 'v-layout';
  const labelClass = isH ? 'tpl-img-label' : 'tpl-img-label-v';
  const dividerClass = isH ? 'h-divider' : 'v-divider';

  return `
    <div class="slide-bg"></div>
    <div class="tpl-top-deco">
      <div class="deco-line-top"></div>
      <div class="client-text">${v.client}</div>
      <div class="period-text">${v.period}</div>
      <div class="deco-line-bottom"></div>
    </div>
    <div class="tpl-images ${layoutClass}">
      <div class="tpl-img-box">
        ${imgOrPlaceholder(state.beforeImg, 'Before')}
        <span class="${labelClass}">Before</span>
      </div>
      <div class="tpl-img-box">
        ${imgOrPlaceholder(state.afterImg, 'After')}
        <span class="${labelClass}">After</span>
      </div>
    </div>
    <div class="tpl-center-divider ${dividerClass}">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <div class="tpl-bottom">
      <div class="concern-text">${v.concern} · ${v.treatment}</div>
      <div class="brand-row">
        <span class="brand-name">IM Aesthetic</span>
      </div>
    </div>
  `;
}

function renderOrange() {
  const v = getValues();
  const isH = state.layout === 'horizontal';
  const layoutClass = isH ? 'h-layout' : 'v-layout';
  const labelClass = isH ? 'tpl-img-label' : 'tpl-img-label-v';
  const dividerClass = isH ? 'h-divider' : 'v-divider';

  return `
    <div class="slide-bg"></div>

      <div class="title-big">Before &amp; After</div>

      <div class="tpl-img-box">

      </div>
      <div class="tpl-img-box">

    <div class="tpl-center-divider ${dividerClass}">

    </div>
    <div class="tpl-bottom">
      <div class="concern-text">${v.concern} · ${v.treatment}</div>
      <div class="brand-row">
        <span class="brand-name">IM Aesthetic</span>
      </div>

}

function renderDark() {
  const v = getValues();

    <div class="tpl-corner br"></div>
    <div class="tpl-top-deco">
      <div class="deco-flourish">
        <div class="fl-line"></div>
        <div class="fl-diamond"></div>
        <div class="fl-line"></div>
      </div>
      <div class="client-text">${v.client}</div>
      <div class="period-text">${v.period}</div>
    </div>
    <div class="tpl-images ${layoutClass}">
      <div class="tpl-img-box">
        ${imgOrPlaceholder(state.beforeImg, 'Before')}
        <span class="${labelClass}">Before</span>
      </div>
      <div class="tpl-img-box">
        ${imgOrPlaceholder(state.afterImg, 'After')}
        <span class="${labelClass}">After</span>
      </div>
    </div>
    <div class="tpl-center-divider ${dividerClass}">
      <div class="divider-line"></div>
    </div>

        <span class="brand-name">IM Aesthetic</span>

function renderSplit() {
  const v = getValues();

  const layoutClass = isH ? 'h-layout' : 'v-layout';
  const dividerClass = isH ? 'h-divider' : 'v-divider';
  const bgClass = isH ? '' : 'v-bg';

  return `

function renderEditorial() {
  const v = getValues();
  const isH = state.layout === 'horizontal';
  const layoutClass = isH ? 'h-layout' : 'v-layout';
  const labelClass = isH ? 'tpl-img-label' : 'tpl-img-label-v';

  return `
    <div class="slide-bg"></div>
    <div class="tpl-letter-b">B</div>

      <span class="editorial-title">Before &amp; After</span>
      <span class="editorial-issue">${v.period}</span>
    </div>

        ${imgOrPlaceholder(state.beforeImg, 'Before')}
        <span class="${labelClass}">B.</span>

      <div class="tpl-img-box">
        ${imgOrPlaceholder(state.afterImg, 'After')}
        <span class="${labelClass}">A.</span>
      </div>
    </div>
    <div class="tpl-center-divider"></div>
    <div class="tpl-bottom">
      <div class="client-text-bottom">${v.client}</div>
      <div class="concern-text">${v.concern} · ${v.treatment}</div>
      <div class="brand-row">
        <span class="brand-name">IM Aesthetic</span>
      </div>
    </div>
  `;
}

const RENDERERS = {
  minimal: renderMinimal,
  orange: renderOrange,
  dark: renderDark,
  split: renderSplit,
  editorial: renderEditorial,
};

function renderSlide() {
  const slide = document.getElementById('slide');
  slide.innerHTML = RENDERERS[state.template]();
}

function setTemplate(tpl) {
  state.template = tpl;
  document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
  const cards = { minimal: 0, orange: 1, dark: 2, split: 3, editorial: 4 };
  document.querySelectorAll('.template-card')[cards[tpl]].classList.add('active');
  const slide = document.getElementById('slide');
  slide.setAttribute('data-template', tpl);
  renderSlide();
}

function setCategory(cat) {
  state.category = cat;
  document.querySelectorAll('.cat-tab').forEach((t, i) => {
    t.classList.toggle('active', ['skin','body','wedding'][i] === cat);
  });
  const defaults = CATEGORY_DEFAULTS[cat];
  document.getElementById('clientLabel').value = defaults.client;
  document.getElementById('period').value = defaults.period;
  document.getElementById('concern').value = defaults.concern;
  document.getElementById('treatment').value = defaults.treatment;
  renderSlide();
}

function setLayout(layout) {
  state.layout = layout;
  document.querySelectorAll('.toggle-row')[0].querySelectorAll('.toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', ['horizontal','vertical'][i] === layout);
  });
  renderSlide();
}

function setSize(size) {
  state.size = size;
  const slide = document.getElementById('slide');
  slide.classList.remove('square', 'portrait');
  slide.classList.add(size);
  // Update size buttons (second toggle-row)
  document.querySelectorAll('.toggle-row')[1].querySelectorAll('.toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', ['square','portrait'][i] === size);
  });
  renderSlide();
}

function handleImage(type, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state[type + 'Img'] = reader.result;
    renderSlide();

    const box = document.getElementById(type + 'Box');
    box.classList.add('has-image');
    box.innerHTML = `<img src="${reader.result}" alt="${type}"><input type="file" id="${type}Input" accept="image/*" onchange="handleImage('${type}', this)">`;
  };
  reader.readAsDataURL(file);
}

function updatePreview() {
  renderSlide();
}

async function exportPNG() {
  const btn = document.querySelector('.btn-export');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  const slide = document.getElementById('slide');
  const scale = 1080 / 540;

  try {
    const canvas = await html2canvas(slide, {
      scale: scale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
    });

    const link = document.createElement('a');
    const catLabel = { skin: '피부케어', body: '바디케어', wedding: '웨딩케어' }[state.category];
    link.download = `IM_BA_${catLabel}_${state.template}_${state.layout}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    console.error(err);
    alert('내보내기 실패: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'PNG 내보내기';
  }
}

// Drag and drop support
['beforeBox', 'afterBox'].forEach(id => {
  const box = document.getElementById(id);
  const type = id.replace('Box', '');

  box.addEventListener('dragover', e => {
    e.preventDefault();
    box.classList.add('dragover');
  });
  box.addEventListener('dragleave', () => {
    box.classList.remove('dragover');
  });
  box.addEventListener('drop', e => {
    e.preventDefault();
    box.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = () => {
        state[type + 'Img'] = reader.result;
        renderSlide();
        box.classList.add('has-image');
        box.innerHTML = `<img src="${reader.result}" alt="${type}"><input type="file" id="${type}Input" accept="image/*" onchange="handleImage('${type}', this)">`;
      };
      reader.readAsDataURL(file);
    }
  });
});

// Initial render
renderSlide();
</script>
</body>
