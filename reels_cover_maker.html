<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AESTHETIC - 릴스 커버 메이커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/fonts-archive/MaruBuri/MaruBuri.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --orange: #E8703A; --orange-light: #F5A070;
    --cream: #FFF8F0; --warm-beige: #F5EDE0;
    --dark: #3D2E24; --dark-mid: #3D2E24;
    --text-muted: #9B8A7A; --warm-bg: #FAF6F1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    background: var(--warm-bg); color: var(--dark); min-height: 100vh;
    word-break: keep-all; overflow-wrap: break-word;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,112,58,0.06), transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 90%, rgba(232,112,58,0.04), transparent 50%);
    pointer-events: none;
  }

  /* ===== PAGE HEADER ===== */
  .page-header {
    background: #FFF8F0;
    padding: 40px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(232,112,58,0.12);
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(232,112,58,0.06) 0%, transparent 70%),
      radial-gradient(ellipse at 70% 50%, rgba(232,112,58,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .page-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E8703A, transparent);
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 400;
    color: #3D2E24;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .page-header p {
    color: #9B8A7A;
    font-size: 13px;
    letter-spacing: 2px;
    position: relative; z-index: 1;
  }

  .app { display: flex; min-height: calc(100vh - 140px); }

  /* Editor */
  .editor {
    width: 380px; flex-shrink: 0;
    background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
    border-right: 1px solid rgba(232,112,58,0.08);
    padding: 36px 28px; overflow-y: auto; max-height: calc(100vh - 140px);
    position: sticky; top: 0;
  }
  .editor h1 { font-family: 'Pretendard', system-ui, sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .editor .sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }

  .section-label {
    font-size: 10px; font-weight: 800; color: var(--orange);
    letter-spacing: 3px; text-transform: uppercase;
    margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid rgba(232,112,58,0.1);
  }

  /* Category badges */
  .cat-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .cat-chip {
    padding: 8px 16px; border-radius: 50px; font-size: 11px; font-weight: 700;
    border: 1.5px solid rgba(232,112,58,0.15); background: #fff;
    color: var(--dark-mid); cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .cat-chip.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .cat-chip:hover:not(.active) { border-color: var(--orange-light); }

  /* Upload */
  .upload-box {
    border: 2px dashed rgba(232,112,58,0.2); border-radius: 16px;
    padding: 32px 16px; text-align: center; cursor: pointer;
    transition: all 0.3s; min-height: 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    background: rgba(255,255,255,0.5);
  }
  .upload-box:hover { border-color: var(--orange); background: rgba(232,112,58,0.03); }
  .upload-box.has-image { border-style: solid; padding: 6px; }
  .upload-box .label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
  .upload-box .hint { font-size: 10px; color: #bbb; }
  .upload-box img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; }
  .upload-box input { display: none; }

  /* Fields */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #5D544D; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; padding: 10px 14px; border: 1px solid rgba(44,24,16,0.1);
    border-radius: 12px; font-size: 13px; font-family: inherit; background: #fff;
    transition: all 0.2s;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,112,58,0.1);
  }

  /* Overlay style */
  .overlay-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .overlay-btn {
    flex: 1; padding: 10px; border: 1.5px solid rgba(44,24,16,0.1);
    border-radius: 10px; background: #fff; font-family: inherit;
    font-size: 11px; font-weight: 700; color: var(--dark-mid);
    cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .overlay-btn.active { background: var(--dark-mid); color: #fff; border-color: var(--dark-mid); }

  .btn-export {
    width: 100%; padding: 16px; margin-top: 16px;
    background: linear-gradient(135deg, var(--orange), #D4612E);
    color: #fff; border: none; border-radius: 16px;
    font-size: 15px; font-weight: 800; font-family: inherit;
    cursor: pointer; transition: all 0.3s;
  }
  .btn-export:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,112,58,0.35); }

  /* Preview */
  .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .preview-wrapper { box-shadow: 0 12px 48px rgba(26,20,16,0.12); border-radius: 4px; overflow: hidden; }

  /* Slide 9:16 (540x960 preview) */
  .slide {
    width: 360px; height: 640px;
    position: relative; overflow: hidden;
    background: #f0f0f0;
  }
  .slide .bg-image {
    position: absolute; inset: 0; z-index: 0;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
  }
  .slide .bg-image img { width: 100%; height: 100%; object-fit: cover; }
  .slide .bg-image .placeholder { color: #666; font-size: 12px; text-align: center; }

  /* Orange bottom gradient overlay */
  .slide .overlay-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
    height: 55%;
    background: linear-gradient(to top, rgba(232,112,58,0.92) 0%, rgba(232,112,58,0.6) 40%, transparent 100%);
  }
  .slide .overlay-dark {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
    height: 55%;
    background: linear-gradient(to top, rgba(255,248,240,0.92) 0%, rgba(255,248,240,0.5) 40%, transparent 100%);
  }
  .slide .overlay-full {
    position: absolute; inset: 0; z-index: 5;
    background: rgba(232,112,58,0.75);
  }

  /* Top logo */
  .slide .top-logo {
    position: absolute; top: 24px; left: 24px; z-index: 10;
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700; font-style: normal;
    color: rgba(255,255,255,0.8); letter-spacing: 5px; text-transform: uppercase;
  }

  /* Category badge */
  .slide .cat-badge {
    position: absolute; top: 24px; right: 24px; z-index: 10;
    padding: 5px 14px; border-radius: 50px;
    font-size: 8px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(255,255,255,0.2); color: #fff;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
  }

  /* Bottom text */
  .slide .bottom-text {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 0 28px 36px; color: #fff;
  }
  .slide .bottom-text .title {
    font-family: 'Pretendard', sans-serif;
    font-size: 24px; font-weight: 800;
    line-height: 1.35; margin-bottom: 12px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .slide .bottom-text .sub-info {
    font-size: 11px; font-weight: 500;
    opacity: 0.7; letter-spacing: 0.5px;
  }
  .slide .bottom-text .brand-mark {
    margin-top: 16px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.2);
    font-family: 'Playfair Display', serif;
    font-size: 12px; font-weight: 600; font-style: normal;
    letter-spacing: 6px; opacity: 0.55; text-transform: uppercase;
  }

  /* Play icon overlay */
  .slide .play-icon {
    position: absolute; top: 50%; left: 50%; z-index: 8;
    transform: translate(-50%, -70%);
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(6px);
    border: 1.5px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .slide .play-icon svg { margin-left: 3px; }

  /* AutoSave Toast */
  .autosave-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #3D2E24; color: #FFF8F0; padding: 12px 24px; border-radius: 30px;
    font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .autosave-toast.show { opacity: 1; }

  /* ---- Server Load Modal ---- */
  .modal-overlay {
    position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:10000;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-content {
    background:#FFF8F0;border-radius:16px;width:360px;max-height:70vh;
    overflow:hidden;box-shadow:0 20px 60px rgba(61,46,36,0.15);
  }
  .modal-header {
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid rgba(232,112,58,0.1);
  }
  .modal-header h3 { font-size:16px;font-weight:700;color:#3D2E24;margin:0; }
  .modal-body { max-height:50vh;overflow-y:auto; }
  .session-item:hover { background:rgba(232,112,58,0.04); }

  /* ===== Font Panel ===== */
  .font-panel-toggle {
    width:100%;padding:10px 14px;border:1.5px solid rgba(232,112,58,0.15);
    border-radius:12px;background:#fff;font-family:inherit;font-size:12px;
    font-weight:700;color:var(--dark);cursor:pointer;text-align:left;
    display:flex;align-items:center;justify-content:space-between;
    transition:all 0.2s;margin-bottom:8px;
  }
  .font-panel-toggle:hover{border-color:var(--orange);}
  .font-panel-toggle .arrow{font-size:10px;color:var(--text-muted);transition:transform 0.2s;}
  .font-panel-toggle.open .arrow{transform:rotate(180deg);}
  .font-panel-body{display:none;border:1px solid rgba(232,112,58,0.1);border-radius:12px;padding:14px;background:rgba(255,255,255,0.7);margin-bottom:12px;}
  .font-panel-body.open{display:block;}
  .font-tier{margin-bottom:14px;}
  .font-tier:last-child{margin-bottom:0;}
  .font-tier-label{font-size:10px;font-weight:800;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .font-tier select,.font-tier input[type=range]{
    width:100%;padding:6px 10px;border:1px solid rgba(44,24,16,0.1);
    border-radius:8px;font-size:12px;font-family:inherit;background:#fff;
    margin-bottom:4px;
  }
  .font-tier .weight-row{display:flex;align-items:center;gap:6px;}
  .font-tier .weight-row input{flex:1;}
  .font-tier .weight-row span{font-size:10px;color:var(--text-muted);min-width:28px;text-align:right;}
  .font-reset-btn{
    width:100%;padding:8px;border:1px solid rgba(232,112,58,0.2);border-radius:8px;
    background:transparent;color:var(--text-muted);font-size:11px;font-weight:600;
    font-family:inherit;cursor:pointer;margin-top:4px;
  }
  .font-reset-btn:hover{border-color:var(--orange);color:var(--orange);}

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .editor { width: 100%; max-height: none; position: static; }
    .slide { width: 280px; height: 497px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Reels Cover Maker</h1>
  <p>IM AESTHETIC · 릴스 커버 이미지 제작 (1080×1920)</p>
</div>

<div class="app">
  <div class="editor">
    <h1>Reels Cover</h1>
    <p class="sub">릴스 커버 이미지 제작 (1080x1920)</p>

    <div class="section-label">카테고리</div>
    <div class="cat-row">
      <button class="cat-chip active" onclick="setCat('wedding')">WEDDING CARE</button>
      <button class="cat-chip" onclick="setCat('asmr')">ASMR</button>
      <button class="cat-chip" onclick="setCat('skin')">SKIN CARE</button>
      <button class="cat-chip" onclick="setCat('body')">BODY CARE</button>
    </div>

    <div class="section-label">배경 이미지</div>
    <div class="upload-box" id="bgBox" onclick="document.getElementById('bgInput').click()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9B8A7A" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <span class="label">시술 사진 또는 영상 캡처</span>
      <span class="hint">클릭 또는 드래그하여 업로드</span>
      <input type="file" id="bgInput" accept="image/*" onchange="handleBgImage(this)">
    </div>
    <div id="imgZoomControls" style="margin-top:8px;display:none;gap:8px;align-items:center;flex-wrap:wrap">
      <label style="font-size:10px;font-weight:700;color:var(--dark);white-space:nowrap">줌</label>
      <input type="range" id="imgZoomRange" min="50" max="200" value="100"
             oninput="updateImgZoom(this.value)" style="width:70px;accent-color:#E8703A">
      <span id="imgZoomVal" style="font-size:10px;min-width:30px">100%</span>
      <button onclick="resetImgPosition()" style="font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid #E8E2DA;background:#fff;color:#9B8A7A;cursor:pointer">위치 초기화</button>
    </div>

    <div class="section-label">릴스 제목</div>
    <div class="field">
      <input type="text" id="reelsTitle" value="손이 기억하는 온도,,," oninput="updatePreview();autoSave()">
    </div>
    <div class="field">
      <label>부제 (선택)</label>
      <input type="text" id="reelsSub" value="웨딩 피부 관리 ASMR" oninput="updatePreview();autoSave()">
    </div>

    <div class="section-label">폰트 설정</div>
    <div id="fontPanelHost"></div>

    <div class="section-label">오버레이 스타일</div>
    <div class="overlay-row">
      <button class="overlay-btn active" onclick="setOverlay('orange')">오렌지</button>
      <button class="overlay-btn" onclick="setOverlay('dark')">크림</button>
      <button class="overlay-btn" onclick="setOverlay('full')">풀 오렌지</button>
    </div>

    <button class="btn-export" onclick="exportPNG()">PNG 내보내기 (1080x1920)</button>
    <button onclick="clearSaved()" style="padding:12px 24px;border-radius:12px;border:1px solid rgba(232,112,58,0.3);background:transparent;color:#9B8A7A;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;width:100%">새로 시작</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="serverSave()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #E8703A;background:rgba(232,112,58,0.05);color:#E8703A;font-size:13px;font-weight:600;cursor:pointer">서버에 저장</button>
      <button onclick="serverLoad()" style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(232,112,58,0.3);background:transparent;color:#9B8A7A;font-size:13px;font-weight:600;cursor:pointer">불러오기</button>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-wrapper">
      <div class="slide" id="slide">
        <div class="bg-image" id="bgImage">
          <div class="placeholder">배경 이미지를<br>업로드하세요</div>
        </div>

        <div class="overlay-bottom" id="overlayLayer"></div>

        <div class="top-logo">IM AESTHETIC</div>
        <div class="cat-badge" id="catBadge">WEDDING CARE</div>

        <div class="play-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="none">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </div>

        <div class="bottom-text">
          <div class="title" id="previewTitle">손이 기억하는 온도,,,</div>
          <div class="sub-info" id="previewSub">웨딩 피부 관리 ASMR</div>
          <div class="brand-mark">IM AESTHETIC</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let state = { cat: 'wedding', overlay: 'orange', bgImg: null, imgZoom: 100, imgOffsetX: 0, imgOffsetY: 0 };

const CATS = { wedding: 'WEDDING CARE', asmr: 'ASMR', skin: 'SKIN CARE', body: 'BODY CARE' };

function setCat(cat) {
  state.cat = cat;
  document.querySelectorAll('.cat-chip').forEach(c =>
    c.classList.toggle('active', c.textContent === CATS[cat]));
  document.getElementById('catBadge').textContent = CATS[cat];
  autoSave();
}

function setOverlay(type) {
  state.overlay = type;
  document.querySelectorAll('.overlay-btn').forEach((b, i) =>
    b.classList.toggle('active', ['orange','dark','full'][i] === type));
  const layer = document.getElementById('overlayLayer');
  layer.className = type === 'orange' ? 'overlay-bottom' : type === 'dark' ? 'overlay-dark' : 'overlay-full';
  autoSave();
}

function handleBgImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state.bgImg = reader.result;
    document.getElementById('bgImage').innerHTML = `<img src="${reader.result}" alt="업로드된 이미지">`;
    const box = document.getElementById('bgBox');
    box.classList.add('has-image');
    box.innerHTML = `<img src="${reader.result}" alt="업로드된 이미지"><input type="file" id="bgInput" accept="image/*" onchange="handleBgImage(this)">`;
    showZoomControls();
    applyImgTransform();
    autoSave();
  };
  reader.readAsDataURL(file);
}

function updatePreview() {
  document.getElementById('previewTitle').textContent = document.getElementById('reelsTitle').value;
  document.getElementById('previewSub').textContent = document.getElementById('reelsSub').value;
  applyFontSettings();
}

async function exportPNG() {
  const btn = document.querySelector('.btn-export');
  btn.disabled = true; btn.textContent = '생성 중...';
  try {
    await document.fonts.ready;
    const canvas = await html2canvas(document.getElementById('slide'), {
      scale: 1080 / 360, useCORS: true, allowTaint: true, backgroundColor: null,
    });
    const link = document.createElement('a');
    link.download = `IM_Reels_${state.cat}_cover.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) { alert('실패: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'PNG 내보내기 (1080x1920)'; }
}

// Drag & drop
const bgBox = document.getElementById('bgBox');
bgBox.addEventListener('dragover', e => { e.preventDefault(); bgBox.style.borderColor = '#E8703A'; });
bgBox.addEventListener('dragleave', () => { bgBox.style.borderColor = ''; });
bgBox.addEventListener('drop', e => {
  e.preventDefault(); bgBox.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file?.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = () => {
      state.bgImg = reader.result;
      document.getElementById('bgImage').innerHTML = `<img src="${reader.result}" alt="업로드된 이미지">`;
      bgBox.classList.add('has-image');
      bgBox.innerHTML = `<img src="${reader.result}" alt="업로드된 이미지"><input type="file" id="bgInput" accept="image/*" onchange="handleBgImage(this)">`;
      showZoomControls();
      applyImgTransform();
    };
    reader.readAsDataURL(file);
  }
});

// ===== Image Zoom/Crop/Position =====
function updateImgZoom(val) {
  state.imgZoom = parseInt(val, 10);
  document.getElementById('imgZoomVal').textContent = state.imgZoom + '%';
  applyImgTransform();
  autoSave();
}
function resetImgPosition() {
  state.imgOffsetX = 0; state.imgOffsetY = 0;
  applyImgTransform();
  autoSave();
}
function applyImgTransform() {
  const img = document.querySelector('#bgImage img');
  if (!img) return;
  img.style.transform = `scale(${state.imgZoom/100}) translate(${state.imgOffsetX}px, ${state.imgOffsetY}px)`;
  img.style.transformOrigin = 'center center';
}
function showZoomControls() {
  const ctrl = document.getElementById('imgZoomControls');
  if (ctrl) ctrl.style.display = 'flex';
}
function initImgDrag() {
  const target = document.getElementById('bgImage');
  if (!target) return;
  let dragging = false, startX, startY, origX, origY;
  target.addEventListener('mousedown', e => {
    if (!state.bgImg) return;
    dragging = true; startX = e.clientX; startY = e.clientY;
    origX = state.imgOffsetX; origY = state.imgOffsetY;
    target.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const scale = state.imgZoom / 100;
    state.imgOffsetX = origX + (e.clientX - startX) / scale;
    state.imgOffsetY = origY + (e.clientY - startY) / scale;
    applyImgTransform();
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; target.style.cursor = ''; autoSave(); }
  });
}

// ===== AutoSave / AutoLoad =====
const STORAGE_KEY = 'im_reels_state';
const TOOL_NAME = 'reels';
let _currentSessionId = null;
let _saveTimer;
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    const data = collectState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch(e) {
      try {
        const lite = {...data};
        delete lite.bgImg;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lite));
      } catch(e2) { console.warn('AutoSave failed:', e2); }
    }
  }, 1000);
}
function collectState() {
  return {
    cat: state.cat,
    overlay: state.overlay,
    title: document.getElementById('reelsTitle').value,
    sub: document.getElementById('reelsSub').value,
    bgImg: state.bgImg,
    imgZoom: state.imgZoom,
    imgOffsetX: state.imgOffsetX,
    imgOffsetY: state.imgOffsetY,
    fontSettings: JSON.parse(JSON.stringify(fontSettings))
  };
}
function autoLoad() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const data = JSON.parse(saved);
    restoreState(data);
    return true;
  } catch(e) { console.warn('AutoLoad failed:', e); return false; }
}
function restoreState(data) {
  if (data.cat) setCat(data.cat);
  if (data.overlay) setOverlay(data.overlay);
  if (data.title) document.getElementById('reelsTitle').value = data.title;
  if (data.sub) document.getElementById('reelsSub').value = data.sub;
  if (data.imgZoom !== undefined) state.imgZoom = data.imgZoom;
  if (data.imgOffsetX !== undefined) state.imgOffsetX = data.imgOffsetX;
  if (data.imgOffsetY !== undefined) state.imgOffsetY = data.imgOffsetY;
  if (data.fontSettings) {
    fontSettings = JSON.parse(JSON.stringify(data.fontSettings));
    // Migrate old fontIdx schema to family schema
    ['title','body','caption'].forEach(k => {
      if (fontSettings[k].fontIdx !== undefined && fontSettings[k].family === undefined) {
        fontSettings[k].family = fontSettings[k].fontIdx;
        delete fontSettings[k].fontIdx;
      }
      if (fontSettings[k].size === undefined) fontSettings[k].size = 100;
      if (fontSettings[k].color === undefined) fontSettings[k].color = '';
    });
    buildFontPanel();
    applyFontSettings();
  }
  if (data.bgImg) {
    state.bgImg = data.bgImg;
    document.getElementById('bgImage').innerHTML = `<img src="${data.bgImg}" alt="업로드된 이미지">`;
    showZoomControls();
    const zr = document.getElementById('imgZoomRange');
    if (zr) zr.value = state.imgZoom;
    const zv = document.getElementById('imgZoomVal');
    if (zv) zv.textContent = state.imgZoom + '%';
    applyImgTransform();
  }
  updatePreview();
}
function clearSaved() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
function showToast(msg) {
  const t = document.getElementById('autoToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Server Session Management =====
async function serverSave() {
  const data = collectState();
  const serverData = {...data};
  delete serverData.reviewImage; delete serverData.bgImg;
  delete serverData.uploadedImage; delete serverData.imgs;

  const name = prompt('세션 이름을 입력하세요:', '') || '이름없음';

  try {
    if (_currentSessionId) {
      await fetch('/api/db/maker-sessions/' + _currentSessionId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ work_data: serverData, session_name: name })
      });
      showToast('서버에 저장되었습니다');
    } else {
      const res = await fetch('/api/db/maker-sessions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ tool: TOOL_NAME, session_name: name, work_data: serverData })
      });
      const result = await res.json();
      _currentSessionId = result.id;
      showToast('서버에 저장되었습니다');
    }
  } catch(e) {
    showToast('서버 저장 실패: ' + e.message);
  }
}

async function serverLoad() {
  try {
    const res = await fetch('/api/db/maker-sessions?tool=' + TOOL_NAME);
    const sessions = await res.json();
    if (!sessions.length) { showToast('저장된 작업이 없습니다'); return; }
    showLoadModal(sessions);
  } catch(e) {
    showToast('불러오기 실패: ' + e.message);
  }
}

async function loadSession(id) {
  try {
    const res = await fetch('/api/db/maker-sessions/' + id);
    const session = await res.json();
    _currentSessionId = session.id;
    restoreState(session.work_data);
    closeLoadModal();
    showToast('"' + (session.session_name || '이름없음') + '" 불러왔습니다');
  } catch(e) {
    showToast('불러오기 실패');
  }
}

async function deleteSession(id, el) {
  if (!confirm('이 세션을 삭제하시겠습니까?')) return;
  try {
    await fetch('/api/db/maker-sessions/' + id, { method: 'DELETE' });
    el.closest('.session-item').remove();
    if (_currentSessionId === id) _currentSessionId = null;
  } catch(e) { showToast('삭제 실패'); }
}

function showLoadModal(sessions) {
  let modal = document.getElementById('loadModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'loadModal';
    modal.innerHTML = '<div class="modal-overlay" onclick="closeLoadModal()"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><h3>저장된 작업</h3><button onclick="closeLoadModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9B8A7A">&times;</button></div><div class="modal-body" id="sessionList"></div></div></div>';
    document.body.appendChild(modal);
  }

  const list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<p style="color:#9B8A7A;text-align:center;padding:24px">저장된 작업이 없습니다</p>';
  } else {
    list.innerHTML = sessions.map(s => {
      const date = new Date(s.updated_at);
      const ago = timeAgo(date);
      return '<div class="session-item" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(232,112,58,0.08);cursor:pointer" onclick="loadSession(\'' + s.id + '\')">' +
        '<div style="flex:1">' +
        '<div style="font-weight:600;color:#3D2E24;font-size:14px">' + (s.session_name || '이름없음') + '</div>' +
        '<div style="font-size:11px;color:#9B8A7A;margin-top:2px">' + ago + '</div>' +
        '</div>' +
        '<button onclick="event.stopPropagation();deleteSession(\'' + s.id + '\',this)" style="background:none;border:none;color:#9B8A7A;cursor:pointer;font-size:16px;padding:4px 8px" title="삭제">&times;</button>' +
        '</div>';
    }).join('');
  }
  modal.style.display = 'block';
}

function closeLoadModal() {
  const m = document.getElementById('loadModal');
  if (m) m.style.display = 'none';
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return '방금 전';
  if (s < 3600) return Math.floor(s/60) + '분 전';
  if (s < 86400) return Math.floor(s/3600) + '시간 전';
  return Math.floor(s/86400) + '일 전';
}

// ===== Font Customization System =====
const FONT_OPTIONS = [
  { name: 'Pretendard', family: "'Pretendard',system-ui,sans-serif", type: 'sans' },
  { name: 'Noto Sans KR', family: "'Noto Sans KR',sans-serif", type: 'sans' },
  { name: 'Noto Serif KR', family: "'Noto Serif KR',serif", type: 'serif' },
  { name: 'Playfair Display', family: "'Playfair Display',serif", type: 'serif' },
  { name: 'Gowun Batang', family: "'Gowun Batang',serif", type: 'display' },
  { name: 'Gowun Dodum', family: "'Gowun Dodum',sans-serif", type: 'display' },
  { name: 'MaruBuri', family: "'MaruBuri',serif", type: 'display' },
  { name: 'Nanum Myeongjo', family: "'Nanum Myeongjo',serif", type: 'serif' }
];

const FONT_DEFAULTS = {
  title:   { family: 0, size: 100, weight: 800, color: '' },
  body:    { family: 0, size: 100, weight: 500, color: '' },
  caption: { family: 3, size: 100, weight: 700, color: '' }
};

let fontSettings = JSON.parse(JSON.stringify(FONT_DEFAULTS));

function getFontCSS(tier) {
  const s = fontSettings[tier];
  const f = FONT_OPTIONS[s.family];
  return { family: f.family, weight: s.weight, sizeMul: s.size / 100, color: s.color || null };
}

function setFont(tier, prop, val) {
  if (prop === 'family') val = parseInt(val, 10);
  if (prop === 'size') val = parseInt(val, 10);
  if (prop === 'weight') val = parseInt(val, 10);
  fontSettings[tier][prop] = val;
  const sizeSpan = document.querySelector(`[data-font-size="${tier}"]`);
  if (sizeSpan && prop === 'size') sizeSpan.textContent = val + '%';
  applyFontSettings();
  autoSave();
}

function resetFonts() {
  fontSettings = JSON.parse(JSON.stringify(FONT_DEFAULTS));
  applyFontSettings();
  buildFontPanel();
  autoSave();
}

function toggleFontPanel() {
  const btn = document.querySelector('.font-panel-toggle');
  const body = document.querySelector('.font-panel-body');
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

function buildFontPanel() {
  const host = document.getElementById('fontPanelHost');
  if (!host) return;

  const tiers = [
    { key: 'title', label: 'TITLE · 제목', desc: '릴스 제목' },
    { key: 'body', label: 'BODY · 본문', desc: '부제/서브 정보' },
    { key: 'caption', label: 'CAPTION · 캡션', desc: '로고, 카테고리, 브랜드마크' }
  ];

  const tiersHtml = tiers.map(t => {
    const s = fontSettings[t.key];
    return `<div class="font-tier">
      <div class="font-tier-label">${t.label}</div>
      <div style="font-size:10px;color:#9B8A7A;margin-bottom:4px">${t.desc}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <select onchange="setFont('${t.key}','family',this.value)" id="fontSel_${t.key}" style="font-size:11px;flex:1;min-width:100px;padding:4px 6px;border-radius:6px;border:1.5px solid #E8E0D8;background:#FFF8F0;color:#3D2E24;cursor:pointer">
          ${FONT_OPTIONS.map((f, i) => `<option value="${i}" ${s.family === i ? 'selected' : ''}>${f.name}</option>`).join('')}
        </select>
        <input type="range" min="60" max="140" value="${s.size}" oninput="setFont('${t.key}','size',this.value)" style="width:55px;accent-color:#E8703A">
        <span data-font-size="${t.key}" style="font-size:10px;min-width:28px;color:#9B8A7A">${s.size}%</span>
        <select onchange="setFont('${t.key}','weight',this.value)" style="font-size:11px;width:55px;padding:4px;border-radius:6px;border:1.5px solid #E8E0D8;background:#FFF8F0;color:#3D2E24;cursor:pointer">
          ${[300, 400, 500, 600, 700, 800].map(w => `<option value="${w}" ${s.weight == w ? 'selected' : ''}>${w}</option>`).join('')}
        </select>
        <input type="color" value="${s.color || '#3D2E24'}" oninput="setFont('${t.key}','color',this.value)" style="width:26px;height:26px;border:none;cursor:pointer;border-radius:4px" title="폰트 색상">
      </div>
    </div>`;
  }).join('');

  host.innerHTML = `
    <button class="font-panel-toggle" onclick="toggleFontPanel()">
      🔤 폰트 커스터마이징 <span class="arrow">▼</span>
    </button>
    <div class="font-panel-body">
      ${tiersHtml}
      <button class="font-reset-btn" onclick="resetFonts()">기본값으로 초기화</button>
    </div>`;
}

function applyFontSettings() {
  const titleCSS = getFontCSS('title');
  const bodyCSS = getFontCSS('body');
  const captionCSS = getFontCSS('caption');

  function applyCSS(el, css) {
    if (!el) return;
    el.style.fontFamily = css.family;
    el.style.fontWeight = css.weight;
    if (css.sizeMul !== 1) {
      const orig = parseFloat(getComputedStyle(el).fontSize);
      el.style.fontSize = (orig * css.sizeMul) + 'px';
    }
    if (css.color) el.style.color = css.color;
  }

  // Title tier: bottom title
  applyCSS(document.querySelector('.slide .bottom-text .title'), titleCSS);

  // Body tier: sub-info
  applyCSS(document.querySelector('.slide .bottom-text .sub-info'), bodyCSS);

  // Caption tier: top-logo, cat-badge, brand-mark
  applyCSS(document.querySelector('.slide .top-logo'), captionCSS);
  applyCSS(document.querySelector('.slide .cat-badge'), captionCSS);
  applyCSS(document.querySelector('.slide .bottom-text .brand-mark'), captionCSS);
}

initImgDrag();
buildFontPanel();
if (autoLoad()) showToast('이전 작업을 불러왔습니다');
</script>
<div class="autosave-toast" id="autoToast"></div>
<script src="/nav-shared.js"></script>
</body>
