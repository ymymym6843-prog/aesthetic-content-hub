<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AESTHETIC · 콘텐츠 관리 시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:#FFF8F0;color:#333;min-height:100vh;display:flex;flex-direction:column}
header{background:#4A3728;padding:40px 24px;text-align:center}
header h1{font-size:36px;font-weight:300;color:#FFF8F0;letter-spacing:8px;margin-bottom:8px}
header p{font-size:16px;color:rgba(255,248,240,0.6);letter-spacing:2px}
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:48px 24px}
.section-title{font-size:13px;font-weight:600;color:#FF8C42;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px}
.card{background:#fff;border-radius:12px;padding:28px 24px;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;box-shadow:0 2px 12px rgba(74,55,40,0.08);border-left:3px solid transparent;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(74,55,40,0.14);border-left-color:#FF8C42}
.card-icon{width:48px;height:48px;color:#FF8C42;flex-shrink:0}
.card-title{font-size:20px;font-weight:700;color:#333;line-height:1.2}
.card-desc{font-size:14px;color:#888;line-height:1.6}
.badge{position:absolute;top:16px;right:16px;background:#FF8C42;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px}
.stats{display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(74,55,40,0.08)}
.stat{flex:1;background:#fff;padding:24px 20px;text-align:center;border-right:1px solid #f0e8e0}
.stat:last-child{border-right:none}
.stat-num{font-size:32px;font-weight:700;color:#4A3728;line-height:1}
.stat-label{font-size:13px;color:#999;margin-top:6px;letter-spacing:0.5px}
footer{background:#4A3728;padding:24px;text-align:center}
footer p{color:rgba(255,248,240,0.5);font-size:13px;line-height:1.8}
footer .divider{width:40px;height:1px;background:rgba(255,248,240,0.2);margin:12px auto}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}.stats{flex-wrap:wrap}.stat{flex:1 1 50%;border-bottom:1px solid #f0e8e0}.stat:nth-child(2n){border-right:none}}
@media(max-width:480px){.grid{grid-template-columns:1fr}.stats{flex-direction:column}.stat{border-right:none}.header h1{font-size:28px;letter-spacing:5px}}
</style>
</head>
<body>

<header>
  <h1>IM AESTHETIC</h1>
  <p>콘텐츠 관리 시스템</p>
</header>

<main>
  <p class="section-title">Tools &amp; Pages</p>

  <div class="grid">

    <a class="card" href="dashboard.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="14" height="14" rx="2"/>
        <rect x="28" y="6" width="14" height="14" rx="2"/>
        <rect x="6" y="28" width="14" height="14" rx="2"/>
        <rect x="28" y="28" width="14" height="14" rx="2"/>
      </svg>
      <div class="card-title">콘텐츠 대시보드</div>
      <div class="card-desc">12주 콘텐츠 캘린더 · 포스트 상세 보기</div>
    </a>

    <a class="card" href="instagram_preview_react.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="6" width="10" height="10" rx="1.5"/>
        <rect x="19" y="6" width="10" height="10" rx="1.5"/>
        <rect x="32" y="6" width="10" height="10" rx="1.5"/>
        <rect x="6" y="19" width="10" height="10" rx="1.5"/>
        <rect x="19" y="19" width="10" height="10" rx="1.5"/>
        <rect x="32" y="19" width="10" height="10" rx="1.5"/>
        <rect x="6" y="32" width="10" height="10" rx="1.5"/>
        <rect x="19" y="32" width="10" height="10" rx="1.5"/>
        <rect x="32" y="32" width="10" height="10" rx="1.5"/>
      </svg>
      <div class="card-title">피드 프리뷰</div>
      <div class="card-desc">인스타그램 그리드 미리보기 · 36개 포스트</div>
    </a>

    <a class="card" href="card_news_maker.html">
      <span class="badge">NEW</span>
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="12" width="32" height="24" rx="2"/>
        <rect x="12" y="8" width="32" height="24" rx="2" fill="none"/>
        <line x1="14" y1="20" x2="34" y2="20"/>
        <line x1="14" y1="26" x2="28" y2="26"/>
      </svg>
      <div class="card-title">카드뉴스 메이커</div>
      <div class="card-desc">목요일 카드뉴스 제작 · PNG 내보내기</div>
    </a>

    <a class="card" href="carousel_templates.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="10" y="10" width="28" height="28" rx="2"/>
        <line x1="10" y1="18" x2="38" y2="18"/>
        <line x1="18" y1="18" x2="18" y2="38"/>
        <circle cx="40" cy="24" r="3" fill="currentColor" stroke="none" opacity=".4"/>
        <circle cx="8" cy="24" r="3" fill="currentColor" stroke="none" opacity=".4"/>
      </svg>
      <div class="card-title">캐러셀 가이드</div>
      <div class="card-desc">4가지 템플릿 디자인 가이드</div>
    </a>

    <a class="card" href="현장촬영_체크리스트.html">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="14" width="32" height="26" rx="3"/>
        <path d="M18 14v-3a6 6 0 0 1 12 0v3"/>
        <circle cx="24" cy="27" r="5"/>
        <circle cx="24" cy="27" r="2" fill="currentColor" stroke="none"/>
      </svg>
      <div class="card-title">촬영 체크리스트</div>
      <div class="card-desc">현장답사 촬영 가이드 · 체크리스트</div>
    </a>

  </div>

  <p class="section-title">Quick Stats</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">36</div>
      <div class="stat-label">총 포스트</div>
    </div>
    <div class="stat">
      <div class="stat-num">67</div>
      <div class="stat-label">캐러셀 슬라이드</div>
    </div>
    <div class="stat">
      <div class="stat-num">8</div>
      <div class="stat-label">프로그램</div>
    </div>
    <div class="stat">
      <div class="stat-num">12</div>
      <div class="stat-label">운영 기간 (주)</div>
    </div>
  </div>

</main>

<footer>
  <p>IM 에스테틱 콘텐츠 관리 시스템 v1.0</p>
  <div class="divider"></div>
  <p>2026년 3월~</p>
</footer>

</body>
</html>
