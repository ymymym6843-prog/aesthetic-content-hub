<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이벤트 카드 메이커 | IM AESTHETIC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --orange: #E8703A;
  --orange-glow: rgba(232,112,58,0.15);
  --cream: #FFF8F0;
  --warm-beige: #F5EDE0;
  --warm-bg: #FAF6F1;
  --dark: #3D2E24;
  --dark-mid: #3D2E24;
  --text: #3D2E24;
  --text-muted: #9B8A7A;
  --border: rgba(232,112,58,0.08);
  --shadow: 0 4px 24px rgba(26,20,16,0.06);
  --shadow-hover: 0 20px 60px rgba(26,20,16,0.12);
  --radius: 20px;
  --ease: cubic-bezier(0.22, 0.68, 0, 1.2);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --transition: .3s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Pretendard', system-ui, sans-serif;
  background: var(--warm-bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232,112,58,0.06), transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 90%, rgba(232,112,58,0.04), transparent 50%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,248,240,0.5), transparent 70%);
  pointer-events: none;
}

/* ════════ HEADER ════════ */
header {
  background: #FFF8F0;
  padding: 40px 32px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(232,112,58,0.12);
}
header::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(232,112,58,0.06) 0%, transparent 70%),
    radial-gradient(ellipse at 70% 50%, rgba(232,112,58,0.04) 0%, transparent 60%);
  pointer-events: none;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #E8703A, transparent);
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 400;
  color: #3D2E24; letter-spacing: 10px;
  text-transform: uppercase;
  position: relative; z-index: 1;
}
header .subtitle {
  font-size: 12px; font-weight: 400;
  color: #9B8A7A;
  letter-spacing: 3px; text-transform: uppercase;
  position: relative; z-index: 1;
  margin-top: 8px;
}
.accent-line {
  display: none; /* replaced by header::after */
}

/* ════════ LAYOUT ════════ */
.workspace {
  display: grid;
  grid-template-columns: 200px 1fr 320px;
  gap: 24px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
  min-height: calc(100vh - 160px);
}

/* ════════ LEFT: PRESET SELECTOR ════════ */
.preset-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.preset-panel h3 {
  font-size: 11px; font-weight: 700;
  color: var(--orange); letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.preset-thumb {
  background: #fff;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 14px 12px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow);
  text-align: center;
}
.preset-thumb:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.preset-thumb.active {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(232,112,58,0.15);
}
.preset-thumb .thumb-icon {
  font-size: 24px;
  margin-bottom: 6px;
}
.preset-thumb .thumb-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}
.preset-thumb .thumb-sub {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ════════ CENTER: PREVIEW ════════ */
.preview-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.preview-wrapper {
  width: 100%;
  max-width: 480px;
  aspect-ratio: 1080 / 1350;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(26,20,16,0.12);
}
.preview-wrapper .canvas-scaler {
  width: 1080px;
  height: 1350px;
  transform-origin: top left;
  position: absolute;
  top: 0; left: 0;
}
.export-actions {
  display: flex; gap: 12px;
}
.btn-export {
  background: var(--dark);
  color: #FFF8F0;
  border: none;
  padding: 12px 28px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
}
.btn-export:hover {
  background: var(--orange);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232,112,58,0.35);
}
.btn-export svg { width: 16px; height: 16px; }

/* ════════ RIGHT: EDIT PANEL ════════ */
.edit-panel {
  background: #fff;
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  overflow-y: auto;
  max-height: calc(100vh - 200px);
}
.edit-panel h3 {
  font-size: 11px; font-weight: 700;
  color: var(--orange); letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.edit-panel h3::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}
.field-group {
  margin-bottom: 16px;
}
.field-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.field-group input,
.field-group textarea {
  width: 100%;
  border: 1px solid rgba(232,112,58,0.15);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  background: var(--cream);
  transition: border-color var(--transition);
  resize: vertical;
}
.field-group input:focus,
.field-group textarea:focus {
  outline: none;
  border-color: var(--orange);
}
.field-group textarea {
  min-height: 60px;
}
.field-sep {
  border: none;
  border-top: 1px solid var(--border);
  margin: 18px 0;
}

/* ════════ CARD CANVAS STYLES ════════ */
.event-card {
  width: 1080px;
  height: 1350px;
  background: #FFF8F0;
  position: relative;
  overflow: hidden;
  font-family: 'Pretendard', system-ui, sans-serif;
}

/* Decorative elements */
.card-deco-circle {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(232,112,58,0.12);
  pointer-events: none;
}
.card-deco-line {
  position: absolute;
  background: rgba(232,112,58,0.15);
  pointer-events: none;
}

/* Card header */
.card-header {
  text-align: center;
  padding: 80px 80px 0;
}
.card-header .logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--orange);
  letter-spacing: 10px;
  text-transform: uppercase;
}
.card-header .logo-line {
  width: 60px;
  height: 2px;
  background: var(--orange);
  margin: 20px auto;
}

/* Card title area */
.card-title-area {
  text-align: center;
  padding: 20px 80px;
}
.card-title-area .main-title {
  font-family: 'Pretendard', sans-serif;
  font-size: 52px;
  font-weight: 800;
  color: var(--dark);
  line-height: 1.3;
  letter-spacing: -0.5px;
}
.card-title-area .sub-title {
  font-size: 24px;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 16px;
  line-height: 1.5;
}

/* Card body */
.card-body {
  padding: 30px 80px;
}

/* Card footer */
.card-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--orange);
  padding: 36px 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-footer .footer-ig {
  font-size: 20px;
  color: rgba(255,255,255,0.95);
  letter-spacing: 1px;
}
.card-footer .footer-addr {
  font-size: 18px;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.5px;
}

/* ═══ Preset 1: Wedding Care ═══ */
.preset-wedding .program-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 30px;
}
.preset-wedding .program-item {
  background: #fff;
  border-radius: 16px;
  padding: 32px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 20px rgba(26,20,16,0.04);
  border-left: 4px solid var(--orange);
}
.preset-wedding .program-name {
  font-size: 26px;
  font-weight: 700;
  color: var(--dark);
}
.preset-wedding .program-sessions {
  font-size: 18px;
  color: var(--text-muted);
  margin-top: 4px;
}
.preset-wedding .program-price {
  font-family: 'Pretendard', system-ui, sans-serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--orange);
  white-space: nowrap;
}

/* ═══ Preset 2: Season Event ═══ */
.preset-season .event-badge {
  display: inline-block;
  background: var(--orange);
  color: #fff;
  font-size: 18px;
  font-weight: 800;
  padding: 8px 28px;
  border-radius: 50px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.preset-season .event-details {
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  margin-top: 20px;
  box-shadow: 0 2px 20px rgba(26,20,16,0.04);
  text-align: center;
}
.preset-season .event-desc {
  font-size: 24px;
  color: var(--dark-mid);
  line-height: 1.8;
  white-space: pre-line;
}
.preset-season .event-period {
  margin-top: 28px;
  padding-top: 28px;
  border-top: 1px solid rgba(232,112,58,0.1);
  font-size: 22px;
  color: var(--text-muted);
  letter-spacing: 1px;
}
.preset-season .event-period strong {
  color: var(--orange);
  font-weight: 700;
}

/* ═══ Preset 3: First Visit ═══ */
.preset-first .benefits-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 30px;
}
.preset-first .benefit-item {
  background: #fff;
  border-radius: 16px;
  padding: 28px 36px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: 0 2px 20px rgba(26,20,16,0.04);
}
.preset-first .benefit-num {
  width: 48px; height: 48px;
  background: var(--orange);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Pretendard', system-ui, sans-serif;
  font-size: 22px;
  font-weight: 700;
  flex-shrink: 0;
}
.preset-first .benefit-text {
  font-size: 24px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.4;
}
.preset-first .cta-box {
  text-align: center;
  margin-top: 40px;
}
.preset-first .cta-btn {
  display: inline-block;
  background: var(--orange);
  color: #fff;
  font-size: 26px;
  font-weight: 700;
  padding: 20px 60px;
  border-radius: 60px;
  letter-spacing: 2px;
  box-shadow: 0 8px 30px rgba(232,112,58,0.3);
}

/* ═══ Preset 4: Referral ═══ */
.preset-referral .referral-desc {
  text-align: center;
  font-size: 24px;
  color: var(--dark-mid);
  line-height: 1.7;
  margin-top: 10px;
  padding: 0 20px;
}
.preset-referral .referral-boxes {
  display: flex;
  gap: 24px;
  margin-top: 36px;
}
.preset-referral .ref-box {
  flex: 1;
  background: #fff;
  border-radius: 16px;
  padding: 36px 28px;
  text-align: center;
  box-shadow: 0 2px 20px rgba(26,20,16,0.04);
}
.preset-referral .ref-box .ref-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.preset-referral .ref-box .ref-label {
  font-size: 20px;
  font-weight: 800;
  color: var(--orange);
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.preset-referral .ref-box .ref-benefit {
  font-size: 22px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.5;
}
.preset-referral .ref-note {
  text-align: center;
  margin-top: 30px;
  font-size: 18px;
  color: var(--text-muted);
}

/* ════════ FOOTER ════════ */
footer {
  background: var(--dark);
  padding: 24px; text-align: center;
  position: relative;
}
footer::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(232,112,58,0.2), transparent);
}
footer p {
  color: rgba(255,248,240,0.3);
  font-size: 12px; letter-spacing: 0.5px;
}
footer .brand-foot {
  font-family: 'Playfair Display', serif;
  color: rgba(255,248,240,0.15);
  font-size: 14px; letter-spacing: 6px;
  margin-bottom: 6px;
}

/* ════════ RESPONSIVE ════════ */
@media (max-width: 1100px) {
  .workspace {
    grid-template-columns: 1fr;
    padding: 20px 16px;
  }
  .preset-panel {
    flex-direction: row;
    overflow-x: auto;
    gap: 10px;
  }
  .preset-thumb { min-width: 140px; }
  .edit-panel { max-height: none; }
}
@media (max-width: 540px) {
  header h1 { font-size: 24px; letter-spacing: 5px; }
  header { padding: 32px 16px 28px; }
}

/* Hidden export area */
#export-area {
  position: fixed;
  left: -9999px;
  top: 0;
}

/* ════════ AUTOSAVE TOAST ════════ */
.autosave-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #3D2E24; color: #FFF8F0; padding: 12px 24px; border-radius: 30px;
  font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
.autosave-toast.show { opacity: 1; }

/* ════════ IMAGE UPLOAD SECTION ════════ */
.img-upload-zone {
  border: 2px dashed rgba(232,112,58,0.35);
  border-radius: 12px;
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  background: var(--cream);
  position: relative;
}
.img-upload-zone:hover,
.img-upload-zone.drag-over {
  border-color: var(--orange);
  background: rgba(232,112,58,0.05);
}
.img-upload-zone .upload-icon {
  width: 32px;
  height: 32px;
  margin: 0 auto 8px;
  color: rgba(232,112,58,0.5);
}
.img-upload-zone .upload-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.3px;
  line-height: 1.5;
}
.img-upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.img-preview-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.img-preview-thumb {
  width: 52px;
  height: 52px;
  border-radius: 8px;
  object-fit: cover;
  border: 2px solid rgba(232,112,58,0.2);
  flex-shrink: 0;
}
.btn-remove-img {
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #c0392b;
  border: none;
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity var(--transition);
  letter-spacing: 0.3px;
}
.btn-remove-img:hover { opacity: 0.8; }
.range-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.range-row label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 38px;
}
.range-row input[type="range"] {
  flex: 1;
  accent-color: var(--orange);
  height: 4px;
  cursor: pointer;
}
.range-row .range-val {
  font-size: 11px;
  font-weight: 700;
  color: var(--orange);
  min-width: 32px;
  text-align: right;
}
.pos-options {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.pos-btn {
  flex: 1;
  padding: 7px 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  border-radius: 8px;
  border: 1px solid rgba(232,112,58,0.2);
  background: var(--cream);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.2px;
}
.pos-btn:hover { border-color: var(--orange); color: var(--orange); }
.pos-btn.active {
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
}
/* Card image layer */
.card-bg-image {
  position: absolute;
  pointer-events: none;
  z-index: 0;
}
.card-bg-image.pos-cover {
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-bg-image.pos-bottom {
  bottom: 0; left: 0; right: 0;
  width: 100%;
  height: 50%;
  object-fit: cover;
  object-position: center top;
}
.card-bg-image.pos-right {
  top: 0; right: 0; bottom: 0;
  width: 40%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}
/* Gradient overlay for text readability */
.card-bg-gradient {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.card-bg-gradient.pos-cover {
  background: linear-gradient(
    160deg,
    rgba(255,248,240,0.72) 0%,
    rgba(255,248,240,0.55) 50%,
    rgba(255,248,240,0.65) 100%
  );
}
.card-bg-gradient.pos-bottom {
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(255,248,240,0.0) 45%,
    rgba(255,248,240,0.85) 55%,
    rgba(255,248,240,1) 70%
  );
}
.card-bg-gradient.pos-right {
  background: linear-gradient(
    to right,
    rgba(255,248,240,1) 0%,
    rgba(255,248,240,0.9) 50%,
    rgba(255,248,240,0.2) 65%,
    rgba(255,248,240,0.0) 100%
  );
}
/* Ensure card content sits above image layers */
.event-card .card-header,
.event-card .card-title-area,
.event-card .card-body,
.event-card .card-footer,
.event-card .card-deco-circle,
.event-card .card-deco-line {
  position: relative;
  z-index: 2;
}

/* ---- Server Load Modal ---- */
.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:10000;
  display:flex;align-items:center;justify-content:center;
}
.modal-content {
  background:#FFF8F0;border-radius:16px;width:360px;max-height:70vh;
  overflow:hidden;box-shadow:0 20px 60px rgba(61,46,36,0.15);
}
.modal-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(232,112,58,0.1);
}
.modal-header h3 { font-size:16px;font-weight:700;color:#3D2E24;margin:0; }
.modal-body { max-height:50vh;overflow-y:auto; }
.session-item:hover { background:rgba(232,112,58,0.04); }
</style>
</head>
<body>

<header>
  <h1>IM AESTHETIC</h1>
  <p class="subtitle">Event Card Maker</p>
</header>
<div class="accent-line"></div>

<div class="workspace">
  <!-- LEFT: Preset Selector -->
  <div class="preset-panel">
    <h3>Templates</h3>
    <div class="preset-thumb active" onclick="selectPreset(0)">
      <div class="thumb-icon">💍</div>
      <div class="thumb-title">웨딩케어 스페셜</div>
      <div class="thumb-sub">패키지 안내</div>
    </div>
    <div class="preset-thumb" onclick="selectPreset(1)">
      <div class="thumb-icon">🌿</div>
      <div class="thumb-title">시즌 이벤트</div>
      <div class="thumb-sub">계절별 프로모션</div>

let currentPreset = 0;

let uploadedImage = null;   // data URL string or null
let imageOpacity = 80;      // 50–100
let imagePosition = 'cover'; // 'cover' | 'bottom' | 'right'

// ════════ PRESET SELECTION ════════
function selectPreset(idx) {

// ════════ EDIT PANEL BUILDER ════════
function buildEditPanel() {

function buildImageUploadSection() {
  const thumbHtml = uploadedImage
    ? `<div class="img-preview-row">
        <img class="img-preview-thumb" src="${uploadedImage}" alt="preview">
        <button class="btn-remove-img" onclick="removeImage()">이미지 제거</button>
       </div>`
    : '';

  const activeBottom = imagePosition === 'bottom' ? ' active' : '';
  const activeRight  = imagePosition === 'right'  ? ' active' : '';

  return `
    <h3>배경 이미지</h3>
    <div class="img-upload-zone" id="imgUploadZone">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <div class="upload-label">클릭하여 이미지 업로드<br><span style="font-weight:400;font-size:10px;">JPG, PNG, WEBP</span></div>
      <input type="file" id="imgFileInput" accept="image/*" onchange="handleImageUpload(event)">
    </div>
    ${thumbHtml}
    <div class="range-row" style="margin-top:12px;">
      <label>투명도</label>
      <input type="range" min="50" max="100" value="${imageOpacity}"
             oninput="updateImageOpacity(this.value)" id="opacityRange">

    </div>
    <div class="field-group" style="margin-top:10px;">
      <label>이미지 위치</label>
      <div class="pos-options">
        <button class="pos-btn${activeCover}"  onclick="updateImagePosition('cover')">전체 배경</button>
        <button class="pos-btn${activeBottom}" onclick="updateImagePosition('bottom')">하단</button>
        <button class="pos-btn${activeRight}"  onclick="updateImagePosition('right')">우측</button>
      </div>
    </div>`;
}

function initUploadZone() {
  const zone = document.getElementById('imgUploadZone');
  if (!zone) return;
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) readImageFile(file);
  });
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (file) readImageFile(file);
}

function readImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedImage = ev.target.result;
    buildEditPanel();
    renderCard();
    autoSave();
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  uploadedImage = null;
  buildEditPanel();
  renderCard();
  autoSave();
}

function updateImageOpacity(val) {
  imageOpacity = parseInt(val, 10);
  const valEl = document.getElementById('opacityVal');
  if (valEl) valEl.textContent = imageOpacity + '%';
  renderCard();
  autoSave();
}

function updateImagePosition(pos) {
  imagePosition = pos;
  // Update button active states without full rebuild
  document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active'));
  const map = { cover: 0, bottom: 1, right: 2 };
  const btns = document.querySelectorAll('.pos-btn');
  if (btns[map[pos]]) btns[map[pos]].classList.add('active');
  renderCard();
  autoSave();
}

function field(key, label, val) {
  return `<div class="field-group"><label>${label}</label><input data-key="${key}" value="${esc(val)}" oninput="updateField('${key}',this.value)"></div>`;
}
function fieldArea(key, label, val) {
  return `<div class="field-group"><label>${label}</label><textarea data-key="${key}" oninput="updateField('${key}',this.value)">${esc(val)}</textarea></div>`;
}
function esc(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function updateField(key, val) {
  currentData[key] = val;
  renderCard();
  autoSave();
}
function updateProg(idx, prop, val) {
  currentData.programs[idx][prop] = val;
  renderCard();
  autoSave();
}
function updateBenefit(idx, val) {
  currentData.benefits[idx] = val;
  renderCard();
  autoSave();
}

// ════════ CARD RENDERER ════════
function renderCard() {
  const d = currentData;
  const scaler = document.getElementById('canvasScaler');
  let html = '';

  // Background image layer (behind all content)
  if (uploadedImage) {
    const opacityVal = imageOpacity / 100;
    html += `<img class="card-bg-image pos-${imagePosition}" src="${uploadedImage}" style="opacity:${opacityVal};" alt="">`;
    html += `<div class="card-bg-gradient pos-${imagePosition}"></div>`;
  }

  // Decorative elements
  html += `<div class="card-deco-circle" style="width:300px;height:300px;top:-80px;right:-60px;border-width:1.5px;"></div>`;
  html += `<div class="card-deco-circle" style="width:200px;height:200px;bottom:140px;left:-60px;"></div>`;
  html += `<div class="card-deco-line" style="width:1px;height:120px;top:60px;right:100px;"></div>`;
  html += `<div class="card-deco-line" style="width:80px;height:1px;bottom:160px;left:80px;"></div>`;

  if (currentPreset === 0) {
    html += renderWedding(d);
  } else if (currentPreset === 1) {
    html += renderSeason(d);
  } else if (currentPreset === 2) {
    html += renderFirst(d);
  } else if (currentPreset === 3) {
    html += renderReferral(d);
  }

  scaler.innerHTML = `<div class="event-card ${getPresetClass()}">${html}</div>`;
  scalePreview();
}

function getPresetClass() {
  return ['preset-wedding','preset-season','preset-first','preset-referral'][currentPreset];

// ════════ SCALE PREVIEW ════════
function scalePreview() {
  const wrapper = document.getElementById('previewWrapper');
  const scaler = document.getElementById('canvasScaler');
  const wrapW = wrapper.clientWidth;
  const scale = wrapW / 1080;
  scaler.style.transform = `scale(${scale})`;
  wrapper.style.height = (1350 * scale) + 'px';
}

// ════════ EXPORT ════════
async function exportPNG() {
  const btn = document.querySelector('.btn-export');
  const origText = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 생성 중...';
  btn.style.pointerEvents = 'none';

  try {
    // Clone card to export area at full size
    const exportArea = document.getElementById('export-area');
    const card = document.querySelector('.event-card');
    const clone = card.cloneNode(true);
    clone.style.transform = 'none';
    exportArea.innerHTML = '';
    exportArea.appendChild(clone);

    const canvas = await html2canvas(clone, {
      width: 1080,
      height: 1350,
      scale: 1,
      useCORS: true,
      backgroundColor: '#FFF8F0',
      logging: false
    });

    exportArea.innerHTML = '';

    const link = document.createElement('a');
    const names = ['wedding_care','season_event','first_visit','referral'];
    link.download = `im_aesthetic_${names[currentPreset]}_${Date.now()}.png`;
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = link.download;
      a.href = url;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  } catch(e) {
    console.error('Export failed:', e);
    alert('이미지 생성에 실패했습니다. 다시 시도해주세요.');
  }

  btn.innerHTML = origText;
  btn.style.pointerEvents = '';
}

// ════════ AUTOSAVE / AUTOLOAD ════════
const STORAGE_KEY = 'im_event_state';
const TOOL_NAME = 'event';
let _currentSessionId = null;
let _saveTimer;
function collectState() {
  return {
    preset: currentPreset,
    data: currentData,
    uploadedImage: uploadedImage,
    imageOpacity: imageOpacity,
    imagePosition: imagePosition
  };
}
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    const data = collectState();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    catch(e) {
      try {
        const lite = {...data};
        delete lite.uploadedImage;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lite));
      } catch(e2) { console.warn('AutoSave failed:', e2); }
    }
  }, 1000);
}
function restoreState(data) {
  if (data.preset !== undefined) {
    currentPreset = data.preset;
    document.querySelectorAll('.preset-thumb').forEach((c, i) =>
      c.classList.toggle('active', i === data.preset));
  }
  if (data.data) currentData = data.data;
  if (data.uploadedImage) uploadedImage = data.uploadedImage;
  if (data.imageOpacity !== undefined) imageOpacity = data.imageOpacity;
  if (data.imagePosition) imagePosition = data.imagePosition;
  buildEditPanel();
  renderCard();
}
function autoLoad() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    restoreState(JSON.parse(saved));
    return true;
  } catch(e) { console.warn('AutoLoad failed:', e); return false; }
}
function clearSaved() { localStorage.removeItem(STORAGE_KEY); location.reload(); }
function showToast(msg) {
  const t = document.getElementById('autoToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════ INIT ════════
window.addEventListener('DOMContentLoaded', () => {
  selectPreset(0);
  // initUploadZone is called inside buildEditPanel after each render
  if (autoLoad()) showToast('이전 작업을 불러왔습니다');
});
window.addEventListener('resize', scalePreview);

// ════════ Server Session Management ════════
async function serverSave() {
  const data = collectState();
  const serverData = {...data};
  delete serverData.reviewImage; delete serverData.bgImg;
  delete serverData.uploadedImage; delete serverData.imgs;

  const name = prompt('세션 이름을 입력하세요:', '') || '이름없음';

  try {
    if (_currentSessionId) {
      await fetch('/api/db/maker-sessions/' + _currentSessionId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ work_data: serverData, session_name: name })
      });
      showToast('서버에 저장되었습니다');
    } else {
      const res = await fetch('/api/db/maker-sessions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ tool: TOOL_NAME, session_name: name, work_data: serverData })
      });
      const result = await res.json();
      _currentSessionId = result.id;
      showToast('서버에 저장되었습니다');
    }
  } catch(e) {
    showToast('서버 저장 실패: ' + e.message);
  }
}

async function serverLoad() {
  try {
    const res = await fetch('/api/db/maker-sessions?tool=' + TOOL_NAME);
    const sessions = await res.json();
    if (!sessions.length) { showToast('저장된 작업이 없습니다'); return; }
    showLoadModal(sessions);
  } catch(e) {
    showToast('불러오기 실패: ' + e.message);
  }
}

async function loadSession(id) {
  try {
    const res = await fetch('/api/db/maker-sessions/' + id);
    const session = await res.json();
    _currentSessionId = session.id;
    restoreState(session.work_data);
    closeLoadModal();
    showToast('"' + (session.session_name || '이름없음') + '" 불러왔습니다');
  } catch(e) {
    showToast('불러오기 실패');
  }
}

async function deleteSession(id, el) {
  if (!confirm('이 세션을 삭제하시겠습니까?')) return;
  try {
    await fetch('/api/db/maker-sessions/' + id, { method: 'DELETE' });
    el.closest('.session-item').remove();
    if (_currentSessionId === id) _currentSessionId = null;
  } catch(e) { showToast('삭제 실패'); }
}

function showLoadModal(sessions) {
  let modal = document.getElementById('loadModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'loadModal';
    modal.innerHTML = '<div class="modal-overlay" onclick="closeLoadModal()"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><h3>저장된 작업</h3><button onclick="closeLoadModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9B8A7A">&times;</button></div><div class="modal-body" id="sessionList"></div></div></div>';
    document.body.appendChild(modal);
  }

  const list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<p style="color:#9B8A7A;text-align:center;padding:24px">저장된 작업이 없습니다</p>';
  } else {
    list.innerHTML = sessions.map(s => {
      const date = new Date(s.updated_at);
      const ago = timeAgo(date);
      return '<div class="session-item" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(232,112,58,0.08);cursor:pointer" onclick="loadSession(\'' + s.id + '\')">' +
        '<div style="flex:1">' +
        '<div style="font-weight:600;color:#3D2E24;font-size:14px">' + (s.session_name || '이름없음') + '</div>' +
        '<div style="font-size:11px;color:#9B8A7A;margin-top:2px">' + ago + '</div>' +
        '</div>' +
        '<button onclick="event.stopPropagation();deleteSession(\'' + s.id + '\',this)" style="background:none;border:none;color:#9B8A7A;cursor:pointer;font-size:16px;padding:4px 8px" title="삭제">&times;</button>' +
        '</div>';
    }).join('');
  }
  modal.style.display = 'block';
}

function closeLoadModal() {
  const m = document.getElementById('loadModal');
  if (m) m.style.display = 'none';
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60) return '방금 전';
  if (s < 3600) return Math.floor(s/60) + '분 전';
  if (s < 86400) return Math.floor(s/3600) + '시간 전';
  return Math.floor(s/86400) + '일 전';
}
</script>
<div class="autosave-toast" id="autoToast"></div>
